<!doctype html><html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tipovačka</title><style>
body{margin:0;background:#f4f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:#111;padding-bottom:85px}.app{max-width:520px;margin:auto}.top{padding:16px;display:flex;justify-content:space-between;align-items:center}.h{font-size:24px;font-weight:900}.sub,.note{font-size:13px;color:#667085}.card{background:white;margin:12px 14px;padding:16px;border-radius:22px;box-shadow:0 8px 25px #0001}.hero{margin:12px 14px;padding:18px;border-radius:26px;color:white;background:linear-gradient(135deg,#0f172a,#2563eb)}.big{font-size:32px;font-weight:900}.btn,.tip{border:0;border-radius:15px;padding:12px;font-weight:900;background:#e8f0ff;color:#1d4ed8}.btn.primary,.tip.on{background:#2563eb;color:white}.btn.good{background:#dcfce7;color:#166534}.btn.danger{background:#fee2e2;color:#991b1b}.btn.dark{background:#111827;color:white}.full{width:100%}.input{width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:14px;padding:12px;margin:6px 0}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.notice{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:16px;padding:12px}.ok{background:#ecfdf3;color:#027a48}.bottom{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(500px,calc(100% - 16px));background:white;border-radius:24px;box-shadow:0 12px 30px #0002;display:grid;grid-template-columns:repeat(5,1fr);padding:7px}.bottom button{border:0;background:transparent;border-radius:16px;padding:8px 2px;font-size:11px;font-weight:900;color:#667085}.bottom .act{background:#e8f0ff;color:#1d4ed8}.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin:13px 0}.team{text-align:center;font-weight:900}.flag{font-size:34px}.vs{background:#f2f4f7;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center}.rank{display:flex;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid #eee}.ava{width:42px;height:42px;border-radius:50%;background:#2563eb;color:white;display:flex;align-items:center;justify-content:center;font-weight:900}.grow{flex:1}.name{font-weight:900}.pts{font-weight:900;font-size:18px}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.login-card{background:white;width:100%;max-width:430px;border-radius:26px;padding:18px;box-shadow:0 18px 44px #0002}.hide{display:none}.table{width:100%;border-collapse:collapse}.table td{border-bottom:1px solid #eee;padding:9px 4px}.right{text-align:right}
</style></head><body><div id="root"></div><script>
const API="/api";let S={me:null,d:null,page:"home",loading:true};const $=q=>document.querySelector(q);function e(s){return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]))}
async function req(p,o={}){let h={"content-type":"application/json"},t=localStorage.tok;if(t)h.authorization="Bearer "+t;let r=await fetch(API+p,{...o,headers:h}),txt=await r.text(),d={};try{d=txt?JSON.parse(txt):{}}catch{throw Error(txt||"Server nevrátil JSON")}if(!r.ok)throw Error(d.error||"Chyba");return d}
async function load(){S.loading=true;rend();try{S.me=(await req("/me")).user;S.d=await req("/app");S.page=(location.hash||"#home").slice(1)}catch{localStorage.removeItem("tok");S.me=null;S.d=null}S.loading=false;rend()}onhashchange=()=>{S.page=(location.hash||"#home").slice(1);rend()};function go(p){location.hash=p;S.page=p;rend()}
function nav(){let ad=S.me&&["admin","superadmin"].includes(S.me.role),it=[["home","🏠","Domů"],["tips","🏒","Tipy"],["rank","🏆","Pořadí"],["archive","📦","Archiv"],["admin","⚙️","Admin"]];return `<div class=bottom>${it.map(i=>i[0]=="admin"&&!ad?"":`<button class="${S.page==i[0]?"act":""}" onclick="go('${i[0]}')"><span>${i[1]}</span><br>${i[2]}</button>`).join("")}</div>`}
function top(t,s){return `<div class=top><div><div class=h>${t}</div><div class=sub>${s}</div></div><div class=ava>${e(S.me?.avatar||"?")}</div></div>`}
function loginPage(){return `<div class=login><div class=login-card><h1>Tipovačka</h1><p class=note>Reálné přihlášení, databáze, tipy a admin.</p><div id=msg class=note></div><input id=le class=input value="admin@demo.cz"><input id=lp class=input type=password value="admin123"><button class="btn primary full" onclick=login()>Přihlásit</button><button class="btn full" onclick="reg.classList.toggle('hide')">Registrace</button><div id=reg class=hide><input id=rn class=input placeholder=Jméno><input id=re class=input placeholder=E-mail><input id=rp class=input type=password placeholder=Heslo><button class="btn primary full" onclick=register()>Registrovat</button></div><p class=note>Admin: admin@demo.cz / admin123<br>Hráč: tomas@demo.cz / 1234</p></div></div>`}
async function login(){try{let r=await req("/auth/login",{method:"POST",body:JSON.stringify({email:le.value,password:lp.value})});localStorage.tok=r.token;load()}catch(x){msg.textContent=x.message}}
async function register(){try{let r=await req("/auth/register",{method:"POST",body:JSON.stringify({name:rn.value,email:re.value,password:rp.value})});localStorage.tok=r.token;load()}catch(x){msg.textContent=x.message}}
function logout(){localStorage.removeItem("tok");S.me=null;rend()}
function home(){let d=S.d,pay=d.settings.admin_fee+d.settings.game_fee;return top("Tipovačka",e(d.season.name))+`<section class=hero><div class=big>${e(d.season.name)}</div><div>${e(d.season.description||"Soukromá soutěž")}<br>${d.pool.players} hráčů • bank ${d.pool.game} Kč</div></section><section class=card>${S.me.approved&&S.me.paid?`<div class="notice ok">✅ Účet aktivní.</div>`:`<div class=notice>⏳ Zaplať ${pay} Kč. Admin tě aktivuje.</div>`}</section><section class=card><h3>O co se hraje</h3><table class=table>${d.settings.split.map((x,i)=>`<tr><td>${i+1}. místo</td><td>${x}%</td><td class=right>${Math.round(d.pool.game*x/100)} Kč</td></tr>`).join("")}</table></section><section class=card><button class="btn full" onclick=logout()>Odhlásit</button></section>`}
async function setBet(mid,p){try{await req("/bets",{method:"POST",body:JSON.stringify({matchId:mid,pick:p})});load()}catch(x){alert(x.message)}}
function tips(){let d=S.d;return top("Tipy","Tipuje se jen 1 / X / 2")+(d.matches.length?d.matches.map(m=>{let b=d.bets.find(x=>x.match_id==m.id),lock=m.status!="open"||!S.me.approved||!S.me.paid;return `<section class=card><h3>${e(m.phase||"Zápas")}</h3><div class=note>${m.start_time?new Date(m.start_time).toLocaleString("cs-CZ"):""}</div><div class=teams><div class=team><div class=flag>${e(m.home_flag||"🏒")}</div>${e(m.home)}</div><div class=vs>VS</div><div class=team><div class=flag>${e(m.away_flag||"🏒")}</div>${e(m.away)}</div></div><div class=grid3>${["1","X","2"].map(p=>`<button ${lock?"disabled":""} class="tip ${b?.pick==p?"on":""}" onclick="setBet('${m.id}','${p}')">${p}</button>`).join("")}</div><p class=note>${e(m.info||"")} ${m.score?`<b>Výsledek ${e(m.score)}</b>`:""}</p></section>`}).join(""):`<section class=card><div class=notice>Zatím nejsou zápasy.</div></section>`)}
function rank(){let d=S.d;return top("Pořadí","Body po potvrzení výsledků")+`<section class=card>${d.ranking.map((u,i)=>`<div class=rank><div>${i+1}.</div><div class=ava>${e(u.avatar)}</div><div class=grow><div class=name>${e(u.name)}</div><div class=note>${e(u.email)}</div></div><div class=pts>${u.points}</div></div>`).join("")}</section>`}
function archive(){let d=S.d;return top("Archiv","Soutěže")+`<section class=card>${d.seasons.map(s=>`<div class=rank><div class=ava>${s.sport=="football"?"⚽":"🏒"}</div><div class=grow><div class=name>${e(s.name)}</div><div class=note>${e(s.description||"")}<br>${e(s.status)}${s.active?" • aktivní":""}</div></div></div>`).join("")}</section>`}
async function approve(id){await req("/admin/approve",{method:"POST",body:JSON.stringify({userId:id})});load()}async function setSeason(id){await req("/admin/season",{method:"POST",body:JSON.stringify({seasonId:id})});load()}async function createSeason(){await req("/admin/create-season",{method:"POST",body:JSON.stringify({name:newName.value,description:newDesc.value,sport:newSport.value})});load()}async function archiveSeason(){await req("/admin/archive",{method:"POST"});load()}async function syncApi(){try{let r=await req("/admin/sync",{method:"POST"});alert("Hotovo. Načteno: "+(r.imported||0));load()}catch(x){alert(x.message)}}async function proposal(id,act){await req("/admin/proposal",{method:"POST",body:JSON.stringify({proposalId:id,action:act})});load()}async function saveSettings(){await req("/admin/settings",{method:"POST",body:JSON.stringify({admin_fee:+af.value,game_fee:+gf.value,split:[s1.value,s2.value,s3.value].map(Number),api_league_id:league.value,api_season:season.value})});alert("Uloženo");load()}async function addMatch(){await req("/admin/add-match",{method:"POST",body:JSON.stringify({phase:phase.value,home:homeTeam.value,away:awayTeam.value,start_time:startTime.value})});load()}
function admin(){let d=S.d;if(!["admin","superadmin"].includes(S.me.role))return top("Admin","Bez oprávnění")+`<section class=card>Nemáš oprávnění.</section>`;return top("Admin","Soutěže, uživatelé, API")+`<section class=card><h3>Soutěže</h3>${d.seasons.map(s=>`<div class=rank><div class=ava>${s.sport=="football"?"⚽":"🏒"}</div><div class=grow><div class=name>${e(s.name)}</div><div class=note>${e(s.status)}${s.active?" • aktivní":""}</div></div><button class="btn ${s.active?"good":"primary"}" onclick="setSeason('${s.id}')">${s.active?"Aktivní":"Zapnout"}</button></div>`).join("")}<button class="btn dark full" onclick=archiveSeason()>Ukončit aktivní soutěž do archivu</button></section><section class=card><h3>Nová soutěž</h3><input id=newName class=input placeholder="MS ve fotbale 2026"><input id=newDesc class=input placeholder="O co jde"><select id=newSport class=input><option value=hockey>Hokej</option><option value=football>Fotbal</option></select><button class="btn primary full" onclick=createSeason()>Vytvořit</button></section><section class=card><h3>Nastavení</h3><input id=af class=input type=number value="${d.settings.admin_fee}"><input id=gf class=input type=number value="${d.settings.game_fee}"><div class=grid3><input id=s1 class=input value="${d.settings.split[0]}"><input id=s2 class=input value="${d.settings.split[1]}"><input id=s3 class=input value="${d.settings.split[2]}"></div><input id=league class=input placeholder="API league id" value="${e(d.settings.api_league_id||"")}"><input id=season class=input placeholder="API season" value="${e(d.settings.api_season||"2026")}"><button class="btn primary full" onclick=saveSettings()>Uložit</button></section><section class=card><button class="btn primary full" onclick=syncApi()>Načíst z API</button></section><section class=card><h3>Ručně přidat zápas</h3><input id=phase class=input placeholder=Fáze><input id=homeTeam class=input placeholder=Domácí><input id=awayTeam class=input placeholder=Hosté><input id=startTime class=input type=datetime-local><button class="btn primary full" onclick=addMatch()>Přidat</button></section><section class=card><h3>Čekající uživatelé</h3>${d.pending.map(u=>`<div class=rank><div class=ava>${e(u.avatar)}</div><div class=grow><div class=name>${e(u.name)}</div><div class=note>${e(u.email)}</div></div><button class="btn good" onclick="approve('${u.id}')">Aktivovat</button></div>`).join("")||"<div class='notice ok'>Nikdo nečeká.</div>"}</section><section class=card><h3>Návrhy z API</h3>${d.proposals.map(p=>`<div class=notice><b>${e(p.text)}</b><div class=grid2><button class="btn good" onclick="proposal('${p.id}','accept')">Potvrdit</button><button class="btn danger" onclick="proposal('${p.id}','reject')">Zamítnout</button></div></div>`).join("")||"<div class='notice ok'>Žádné návrhy.</div>"}</section>`}
function rend(){if(S.loading)return root.innerHTML=`<div class=login><div class=login-card><h1>Tipovačka</h1><p>Načítám…</p></div></div>`;if(!S.me)return root.innerHTML=loginPage();let pages={home,tips,rank,archive,admin};root.innerHTML=`<div class=app>${(pages[S.page]||home)()}</div>`+nav()}load();
</script></body></html>
