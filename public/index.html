body{background:#080d12!important;background-image:none!important}.app{max-width:1180px}.top.v25{padding:16px 18px 14px!important;background:linear-gradient(180deg,#080d12 0%,#0b1118 100%)!important;border-bottom:1px solid rgba(39,209,91,.48)!important;box-shadow:0 18px 44px rgba(0,0,0,.42)}.topbar.v25{display:grid!important;grid-template-columns:minmax(290px,1fr) minmax(260px,420px)!important;grid-template-areas:"brand meta" "stats stats"!important;gap:16px 26px!important;align-items:center!important;max-width:1180px!important;margin:0 auto!important}.header-left{grid-area:brand;display:flex;align-items:center;gap:18px;min-width:0}.header-left .tipmark{width:104px!important;height:104px!important;border-radius:28px!important;box-shadow:0 18px 44px rgba(39,209,91,.24)!important;flex:0 0 auto}.app-name{font-size:38px;font-weight:950;letter-spacing:-.045em;line-height:.92;white-space:nowrap;text-transform:uppercase}.app-sub{font-size:19px;font-weight:950;color:var(--green2);margin-top:10px;white-space:nowrap;text-transform:uppercase;letter-spacing:.01em}.top-center{grid-area:meta;text-align:left!important;min-width:0;display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch}.meta-box{border-left:1px solid rgba(124,255,91,.34);padding-left:16px;display:flex;align-items:center;gap:10px;min-width:0}.meta-ico{font-size:26px;color:var(--green2);line-height:1}.meta-label{font-size:13px;color:#9aa6b2;font-weight:750;white-space:nowrap}.meta-value{font-size:22px;font-weight:950;color:#fff;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta-value.green{color:var(--green2)}.top-title,.top-user{display:none!important}.top-stats{grid-area:stats;display:grid!important;grid-template-columns:repeat(4,1fr);gap:0!important;margin-top:0!important;border-top:1px solid rgba(255,255,255,.10);padding-top:15px}.stat-chip{display:flex;align-items:center;justify-content:center;gap:12px;color:#fff;font-weight:850;border-right:1px solid rgba(255,255,25 <body>
<div id="root"></div>
<script>
const API="/api";
let tok=localStorage.tip_token||"",me=null,data=null,page="home",msg="",filter="all",phase="all",betsFilter="all",timer=null;
const esc=s=>String(s??"").replace(/[&<>\"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));
const norm=s=>String(s||"").trim();
function setTheme(t){document.documentElement.dataset.theme="dark";localStorage.tip_theme="dark"}
setTheme("dark");
async function api(p,o={}){let h={"content-type":"application/json"};if(tok)h.authorization="Bearer "+tok;let r=await fetch(API+p,{...o,headers:h});let txt=await r.text();let j={};try{j=txt?JSON.parse(txt):{}}catch{throw Error("Server nevrátil JSON")};if(!r.ok)throw Error(j.error||"Chyba API");return j}
async function load(silent=false){try{if(tok){me=(await api('/me')).user;data=await api('/app')}else{me=null;data=null}}catch(e){if(!silent){msg=e.message}localStorage.removeItem('tip_token');tok='';me=null;data=null}render()}
async function refreshSilent(){if(!me)return;try{data=await api('/app');me=(await api('/me')).user;render()}catch(e){}}
function startRealtime(){clearInterval(timer);timer=setInterval(refreshSilent,5000)}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&me)refreshSilent()});
function go(p){page=p;render()}function out(){localStorage.removeItem('tip_token');tok='';me=null;data=null;render()}
function sectionTitle(){return ({home:'Domů',tips:'Zápasy',rank:'Tabulka',profile:'Profil',bets:'Tipy všech',admin:'Admin'})[page]||'Tipovačka'}
function competition(){let s=data.settings||{};return {name:s.competition_name||'FIFA World Cup 2026', subtitle:s.competition_subtitle||'MS ve fotbale 2026', logo:s.competition_logo_url||'/worldcup2026-logo.png'}}
function topbar(){let c=competition(),u=me?(me.public_name||me.full_name||'hráč'):'hráč',st=data.meStats||me||{},pos=(data.ranking||[]).findIndex(x=>x.id==st.id)+1,pct=st&&st.evaluated_count?Math.round(((st.hit_1||0)+(st.hit_3||0))/(st.evaluated_count||1)*100):0;let medal=pos==1?'🥇':pos==2?'🥈':pos==3?'🥉':'🏆';return `<div class="top v25"><div class="topbar v25"><div class=header-left><img class=tipmark src="/app-icon.png" alt="TIP"><div><div class=app-name>Tipovačka</div><div class=app-sub>${esc(c.name)}</div></div></div><div class=top-center><div class=meta-box><div class=meta-ico>📍</div><div><div class=meta-label>Kde jsi</div><div class=meta-value>${esc(sectionTitle())}</div></div></div><div class=meta-box><div class=meta-ico>👤</div><div><div class=meta-label>Přihlášen</div><div class="meta-value green">${esc(u)}</div></div></div></div><div class=top-stats><div class=stat-chip><div class=stat-ico>${medal}</div><div><strong>${pos||'—'}.</strong><span>místo</span></div></div><div class=stat-chip><div class=stat-ico>⭐</div><div><strong>${st.points||0}</strong><span>bodů</span></div></div><div class=stat-chip><div class=stat-ico>🎯</div><div><strong>${pct}%</strong><span>úspěšnost</span></div></div><div class=stat-chip><div class=stat-ico>📊</div><div><strong>${st.tips_count||0}</strong><span>tipů</span></div></div></div></div></div>`}
function navIcon(k){return {home:'<svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/><path d="M9.5 20v-6h5v6"/></svg>',tips:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>',rank:'<svg viewBox="0 0 24 24"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v4a5 5 0 0 1-10 0V4Z"/><path d="M7 6H4a3 3 0 0 0 3 5"/><path d="M17 6h3a3 3 0 0 1-3 5"/></svg>',profile:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>',admin:'<svg viewBox="0 0 24 24"><path d="M12 3 20 6v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3Z"/><path d="M9 12l2 2 4-5"/></svg>'}[k]||''}
function nav(){if(!me)return'';let admin=['admin','superadmin'].includes(me.role);let items=[['home','Domů'],['tips','Zápasy'],['rank','Tabulka'],['profile','Profil'],['admin','Admin']];return `<div class=bottom>${items.map(i=>i[0]=='admin'&&!admin?'':`<button title="${i[1]}" aria-label="${i[1]}" class="${page==i[0]?'on':''}" onclick="go('${i[0]}')">${navIcon(i[0])}<span class="nav-label">${i[1]}</span></button>`).join('')}</div>`}
function loginScreen(){return `${topbar()}<div class=login><div class=login-card><img class=login-logo src="/app-icon.png"><h1 class=center>Tipovačka MS 2026</h1><p class="note center">Přihlášení jménem, příjmením a heslem. V aplikaci se veřejně zobrazuje jen přezdívka.</p>${msg?`<div class="notice bad">${esc(msg)}</div>`:''}<input id=loginFirst class=input placeholder="Jméno"><input id=loginLast class=input placeholder="Příjmení"><input id=lp class=input type=password placeholder="Heslo"><button class="btn primary full" onclick=login()>Přihlásit</button><button class="btn full" onclick="document.getElementById('reg').classList.toggle('hide')">Registrace</button><div id=reg class=hide><div class=grid2><input id=first class=input placeholder="Jméno"><input id=last class=input placeholder="Příjmení"></div><input id=nick class=input placeholder="Přezdívka veřejně v tabulce"><div class=grid2><input id=email class=input placeholder="E-mail"><input id=phone class=input placeholder="Telefon"></div><input id=rp class=input type=password placeholder="Heslo"><input id=code class=input placeholder="Vstupní kód od admina"><button class="btn primary full" onclick=register()>Registrovat</button></div><p class=note>Admin po registraci uvidí jméno, příjmení, kontakt a údaj do platby. Ostatní hráči vidí jen přezdívku.</p></div></div>`}
async function login(){try{msg='';let full=(norm(loginFirst.value)+' '+norm(loginLast.value)).trim();let r=await api('/auth/login',{method:'POST',body:JSON.stringify({name:full,password:lp.value})});tok=r.token;localStorage.tip_token=tok;await load()}catch(e){msg=e.message;render()}}
async function register(){try{msg='';let r=await api('/auth/register',{method:'POST',body:JSON.stringify({first:first.value,last:last.value,nick:nick.value,email:email.value,phone:phone.value,password:rp.value,code:code.value})});tok=r.token;localStorage.tip_token=tok;await load()}catch(e){msg=e.message;render()}}
function hero(t,s){return `<section class=hero><div class=hero-row><div><div class=big>${t}</div><div class=sub>${s}</div></div></div></section>`}
function badge(m){let st=m.effective_status;return st=='open'?`<span class="badge open">lze tipovat</span>`:st=='finished'?`<span class="badge done">vyhodnoceno</span>`:`<span class="badge locked">zamčeno</span>`}
function dateKey(dt){let d=new Date(dt),n=new Date();let t=new Date(n.getFullYear(),n.getMonth(),n.getDate()).getTime();let x=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();return x==t?'today':x==t+86400000?'tomorrow':'other'}
function left(m){let d=new Date(m.start_time)-new Date();if(d<=0)return'uzamčeno';let s=Math.floor(d/1000),days=Math.floor(s/86400);s%=86400;let h=Math.floor(s/3600);s%=3600;let min=Math.floor(s/60);return days?`${days}d ${h}h ${min}m`:`${h}h ${min}m`}
function displayUser(u){return esc(u.nick||u.public_name||u.full_name||'?')}function av(u){let n=(u.nick||u.public_name||u.full_name||'?').slice(0,2).toUpperCase();return `<div class=avatar>${esc(n)}</div>`}
function home(){let p=data.pool||{},c=competition();return `<div class=cards><div class="card mini"><b>${p.players||0}</b><span>aktivních hráčů</span></div><div class="card mini"><b>${p.game||0} Kč</b><span>bank hry</span></div><div class="card mini"><b>${data.matches.length}</b><span>zápasů</span></div></div><div class=card>${me.role!='player'?`<div class="notice ok">Jsi přihlášen jako admin.</div>`:me.approved&&me.paid?`<div class="notice ok">✅ Účet je aktivní. Můžeš tipovat.</div>`:`<div class=notice>⏳ Účet čeká na aktivaci po platbě.<br><b>Uveď do platby:</b> ${esc(me.payment_note||'TIP-'+me.nick)}</div>`}</div>`}
function phases(){return ['all',...Array.from(new Set((data.matches||[]).map(m=>m.phase))).filter(Boolean)]}function filtered(){let arr=[...(data.matches||[])];if(filter=='today')arr=arr.filter(m=>dateKey(m.start_time)=='today');if(filter=='tomorrow')arr=arr.filter(m=>dateKey(m.start_time)=='tomorrow');if(filter=='missing')arr=arr.filter(m=>!data.bets.find(b=>b.match_id==m.id)&&m.effective_status=='open');if(filter=='open')arr=arr.filter(m=>m.effective_status=='open');if(filter=='locked')arr=arr.filter(m=>m.effective_status=='locked');if(filter=='finished')arr=arr.filter(m=>m.effective_status=='finished');if(phase!='all')arr=arr.filter(m=>m.phase==phase);return arr}
function scoreStepper(id,val,lock){return `<div class=stepper><button class=btn ${lock?'disabled':''} ${lock?'disabled':''} onclick="step('${id}',-1)" ${lock?'disabled':''}>−</button><div id="${id}" class=stepper-value>${val??0}</div><button class=btn onclick="step('${id}',1)" ${lock?'disabled':''}>+</button></div>`}
function step(id,delta){let el=document.getElementById(id);let v=Math.max(0,Number(el.textContent||0)+delta);el.textContent=v}
async function bet(id){try{let h=Number(document.getElementById('h_'+id).textContent),a=Number(document.getElementById('a_'+id).textContent);await api('/bets',{method:'POST',body:JSON.stringify({matchId:id,homeGoals:h,awayGoals:a})});await refreshSilent()}catch(e){alert(e.message)}}
function scoreClass(x,m){if(!m.score)return'';let [h,a]=m.score.split(':').map(Number);if(Number(x.home_goals)==h&&Number(x.away_goals)==a)return'exact-hit';let pick=h>a?'1':h<a?'2':'X';return x.pick==pick?'win':''}
function otherBetsHtml(m){let arr=(data.publicBets||[]).filter(x=>x.match_id==m.id);if(m.effective_status=='open')return `<div class=note>Tipy ostatních se zobrazí po uzamčení zápasu.</div>`;return `<div class=others><b>Tipy ostatních</b>${arr.length?arr.map(x=>`<div class=others-row><span>${esc(x.nick||x.public_name)}</span><b class="${scoreClass(x,m)}">${x.home_goals}:${x.away_goals}</b></div>`).join(''):`<div class=note>Nikdo zatím netipoval.</div>`}</div>`}
function tips(){let arr=filtered();return hero('Zápasy','Tipuje se přesný výsledek. Tipy ostatních se ukážou až po zamčení zápasu.')+`<div class=tabs>${[['all','Vše'],['today','Dnes'],['tomorrow','Zítra'],['missing','Netipnuté'],['open','Otevřené'],['locked','Zamčené'],['finished','Vyhodnocené']].map(x=>`<button class="btn ${filter==x[0]?'active':''}" onclick="filter='${x[0]}';render()">${x[1]}</button>`).join('')}</div><div class=phase-filter><select class=input onchange="phase=this.value;render()">${phases().map(p=>`<option value="${esc(p)}" ${phase==p?'selected':''}>${p=='all'?'Všechny skupiny a fáze':esc(p)}</option>`).join('')}</select></div><div class=card>${arr.length?arr.map(m=>{let b=data.bets.find(x=>x.match_id==m.id)||{};let lock=m.effective_status!='open'||!me.approved||!me.paid||me.role!='player';return `<div class=match><div class=match-head><div>${badge(m)}</div><div class=note>${new Date(m.start_time).toLocaleString('cs-CZ')} • ${esc(m.phase)} • ${left(m)}</div></div><div class=teams><div class=team><div class=flag>${esc(m.home_flag||'')}</div>${esc(m.home)}</div><div class=score>${m.score?esc(m.score):'VS'}</div><div class=team><div class=flag>${esc(m.away_flag||'')}</div>${esc(m.away)}</div></div><div class=exact>${scoreStepper('h_'+m.id,b.home_goals??0,lock)}<b>:</b>${scoreStepper('a_'+m.id,b.away_goals??0,lock)}</div><button class="btn primary full" ${lock?'disabled':''} onclick="bet('${m.id}')">${b.match_id?'Upravit tip':'Potvrdit tip'}</button>${b.match_id?`<div class=saved-tip>✓ Tvůj tip: ${b.home_goals}:${b.away_goals}</div>`:''}${otherBetsHtml(m)}</div>`}).join(''):'<div class=notice>Pro filtr nejsou zápasy.</div>'}</div>`}
function rank(){let top=data.ranking||[];return hero('Pořadí','Veřejně se zobrazuje jen přezdívka. TOP 3 mají medaile.')+`<div class=card>${top.length?top.map((u,i)=>`<div class=rank><div class=medal>${i==0?'🥇':i==1?'🥈':i==2?'🥉':i+1}</div>${av(u)}<div class=grow><div class=public-name>${displayUser(u)}</div><div class=note>${u.evaluated_count||0} vyhodnoceno • přesně ${u.hit_3||0}× • vítěz ${u.hit_1||0}×</div></div><div class=points>${u.points} b</div></div>`).join(''):'<div class=notice>Zatím nejsou vyhodnocené tipy.</div>'}</div>`}
function betsPage(){let ms=(data.matches||[]).filter(m=>m.effective_status!='open');if(betsFilter=='mine')ms=ms.filter(m=>data.bets.find(b=>b.match_id==m.id));return hero('Tipy všech','Zobrazují se jen u zamčených nebo vyhodnocených zápasů.')+`<div class=tabs><button class="btn ${betsFilter=='all'?'active':''}" onclick="betsFilter='all';render()">Vše</button><button class="btn ${betsFilter=='mine'?'active':''}" onclick="betsFilter='mine';render()">Moje zápasy</button></div><div class=card>${ms.length?ms.map(m=>`<div class=match><b>${esc(m.home_flag)} ${esc(m.home)} vs ${esc(m.away_flag)} ${esc(m.away)}</b><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString('cs-CZ')} ${m.score?'• výsledek '+esc(m.score):''}</div>${otherBetsHtml(m)}</div>`).join(''):'<div class=notice>Zatím není žádný zamčený zápas.</div>'}</div>`}
async function approve(id){await api('/admin/approve',{method:'POST',body:JSON.stringify({userId:id})});await refreshSilent()}async function deactivate(id){await api('/admin/deactivate',{method:'POST',body:JSON.stringify({userId:id})});await refreshSilent()}async function role(id,r){await api('/admin/role',{method:'POST',body:JSON.stringify({userId:id,role:r})});await refreshSilent()}async function delUser(id){if(confirm('Smazat hráče i jeho tipy?')){await api('/admin/delete-user',{method:'POST',body:JSON.stringify({userId:id})});await refreshSilent()}}async function setStatus(id,st){await api('/admin/status',{method:'POST',body:JSON.stringify({matchId:id,status:st})});await refreshSilent()}async function result(id){let score=prompt('Výsledek např. 2:1');if(score){await api('/admin/result',{method:'POST',body:JSON.stringify({matchId:id,score})});await refreshSilent()}}async function editMatch(m){let home=prompt('Domácí tým',m.home);if(!home)return;let away=prompt('Hostující tým',m.away);if(!away)return;let start_time=prompt('Čas ve formátu 2026-06-11T21:00',m.start_time);if(!start_time)return;let ph=prompt('Fáze/skupina',m.phase)||m.phase;await api('/admin/edit-match',{method:'POST',body:JSON.stringify({matchId:m.id,home,away,start_time,phase:ph})});await refreshSilent()}async function addMatch(){await api('/admin/add-match',{method:'POST',body:JSON.stringify({phase:phaseIn.value,home:homeTeam.value,away:awayTeam.value,start_time:startTime.value})});await refreshSilent()}async function imp(){await api('/admin/import',{method:'POST',body:JSON.stringify({text:bulk.value})});await refreshSilent();alert('Import hotový')}async function saveSettings(){await api('/admin/settings',{method:'POST',body:JSON.stringify({admin_fee:+af.value||0,game_fee:+gf.value||0,bank_account:bank.value,access_code:access.value,rules_html:rulesText.value,competition_name:compName.value,competition_subtitle:compSub.value,competition_logo_url:compLogo.value})});await refreshSilent();alert('Uloženo')}async function recalc(){await api('/admin/recalc',{method:'POST'});await refreshSilent();alert('Přepočítáno')}

function profile(){let u=data.meStats||me;let pos=(data.ranking||[]).findIndex(x=>x.id==u.id)+1;let pct=u.evaluated_count?Math.round(((u.hit_1||0)+(u.hit_3||0))/(u.evaluated_count||1)*100):0;return hero('Profil','Veřejně se zobrazuje přezdívka. Kontakty vidí jen admin.')+`<div class=card><div class="brand-lockup"><img src="/app-icon.png"><div><b>${esc(u.public_name||u.nick||me.public_name)}</b><div class=note>${esc(u.role||me.role)} • ${u.approved&&u.paid?'aktivní':'čeká na aktivaci'}</div></div></div></div><div class="card profile-grid"><div class=profile-stat><b>${pos||'—'}</b><span>pořadí</span></div><div class=profile-stat><b>${u.points||0}</b><span>bodů</span></div><div class=profile-stat><b>${u.tips_count||0}</b><span>tipů</span></div><div class=profile-stat><b>${pct}%</b><span>úspěšnost</span></div></div><div class=card><div class=title>Platba</div><div class=subtle-chip>${esc(u.payment_note||'TIP')}</div><p class=note>Tenhle údaj uveď do poznámky platby. Stav platby potvrzuje admin.</p></div><div class=card><button class="btn danger full" onclick=out()>Odhlásit</button></div>`}
function admin(){if(!['admin','superadmin'].includes(me.role))return hero('Admin','Bez oprávnění');let phasesList=['Skupina A','Skupina B','Skupina C','Skupina D','Skupina E','Skupina F','Skupina G','Skupina H','Skupina I','Skupina J','Skupina K','Skupina L','32 postupujících','Osmifinále','Čtvrtfinále','Semifinále','O 3. místo','Finále'];return hero('Admin','Ruční správa hráčů, plateb, zápasů a výsledků.')+`<div class=card><div class=title>Nastavení soutěže</div><input id=compName class=input value="${esc(data.settings.competition_name||'FIFA World Cup 2026')}" placeholder="Název soutěže"><input id=compSub class=input value="${esc(data.settings.competition_subtitle||'MS ve fotbale 2026')}" placeholder="Podtitulek soutěže"><input id=compLogo class=input value="${esc(data.settings.competition_logo_url||'/worldcup2026-logo.png')}" placeholder="Logo soutěže – URL nebo cesta, např. /worldcup2026-logo.png"><div class=note>Pro jinou soutěž později změníš název a logo. Zápasy upravíme ručně/importem.</div><hr style="border:0;border-top:1px solid var(--line);margin:14px 0"><div class=title>Nastavení hry</div><div class=grid2><input id=af class=input type=number value="${data.settings.admin_fee||0}" placeholder="Poplatek adminovi"><input id=gf class=input type=number value="${data.settings.game_fee||0}" placeholder="Vklad do hry"></div><input id=bank class=input value="${esc(data.settings.bank_account||'')}" placeholder="Bankovní účet"><input id=access class=input value="${esc(data.settings.access_code||'TIP2026')}" placeholder="Vstupní kód"><textarea id=rulesText class=input placeholder="Pravidla">${esc(data.settings.rules_html||'')}</textarea><button class="btn primary full" onclick=saveSettings()>Uložit nastavení</button></div><div class=card><button class="btn good full" onclick=recalc()>Přepočítat body</button></div><div class=card><div class=title>Přidat zápas</div><select id=phaseIn class=input>${phasesList.map(x=>`<option>${x}</option>`).join('')}</select><div class=grid2><input id=homeTeam class=input list=teams placeholder="Domácí"><input id=awayTeam class=input list=teams placeholder="Hosté"></div><datalist id=teams>${data.teamOptions.map(t=>`<option value="${esc(t)}">`).join('')}</datalist><input id=startTime class=input type=datetime-local><button class="btn primary full" onclick=addMatch()>Přidat zápas</button></div><div class=card><div class=title>Import zápasů</div><p class=note>Formát řádku: 2026-06-11 21:00; Skupina A; Mexiko; Jihoafrická republika</p><textarea id=bulk class=input></textarea><button class="btn primary full" onclick=imp()>Importovat</button></div><div class=card><div class=title>Hráči, kontakty a platby</div><div class=admin-list>${data.users.map(u=>`<div class=admin-row><div class=rank>${av(u)}<div class=grow><b>${esc(u.first)} ${esc(u.last)}</b><div class=note>Veřejně: <b>${displayUser(u)}</b> • ${esc(u.email||'bez e-mailu')} • ${esc(u.phone||'bez telefonu')}<br>Platba: <b>${esc(u.payment_note||'')}</b></div><span class="role ${u.role}">${esc(u.role)}</span> ${u.approved&&u.paid?'<span class="role player">aktivní</span>':'<span class="role admin">čeká</span>'}</div><div class=points>${u.points||0} b</div></div><div class=admin-actions><button class="btn good small" onclick="approve('${u.id}')">Aktivovat</button><button class="btn small" onclick="deactivate('${u.id}')">Deaktivovat</button><button class="btn small" onclick="role('${u.id}','player')">Hráč</button><button class="btn small" onclick="role('${u.id}','admin')">Admin</button><button class="btn danger small" onclick="delUser('${u.id}')">Smazat</button></div></div>`).join('')}</div></div><div class=card><div class=title>Správa zápasů</div>${data.matches.map(m=>`<div class=match><div class=match-head><b>${esc(m.home_flag||'')} ${esc(m.home)} vs ${esc(m.away_flag||'')} ${esc(m.away)}</b>${badge(m)}</div><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString('cs-CZ')} ${m.score?'• '+esc(m.score):''}</div><div class=admin-actions><button class="btn small" onclick='editMatch(${JSON.stringify(m).replace(/'/g,"&#39;")})'>Upravit</button><button class="btn small" onclick="setStatus('${m.id}','open')">Otevřít</button><button class="btn small" onclick="setStatus('${m.id}','locked')">Zamknout</button><button class="btn good small" onclick="result('${m.id}')">Výsledek</button><button class="btn small" onclick="setStatus('${m.id}','finished')">Dohráno</button></div></div>`).join('')}</div>`}
function render(){if(!me){document.getElementById('root').innerHTML=loginScreen();return}let pages={home,tips,rank,profile,bets:betsPage,admin};document.getElementById('root').innerHTML=topbar()+`<div class=app>${(pages[page]||home)()}</div>`+nav();startRealtime()}
load();if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
</body>
</html>
