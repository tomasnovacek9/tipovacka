<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tipovačka</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:16px;
max-width:500px;
margin:auto;
}

input,button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
}

.match{
padding:12px;
background:#334155;
border-radius:12px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
<h1>🏒 Tipovačka MS</h1>

<p>Přihlášení demo:</p>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Heslo">

<button onclick="login()">Přihlásit</button>

<div id="app"></div>
</div>

<script>
async function login(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(email==="admin@demo.cz" && password==="admin123"){
loadMatches();
}else{
alert("Špatné přihlášení");
}

}

async function loadMatches(){

document.getElementById("app").innerHTML="<p>Načítání zápasů...</p>";

try{

const res=await fetch("https://v1.hockey.api-sports.io/games?league=57&season=2025",{
headers:{
"x-apisports-key":"049189c8f924c7c32f483c577cf8e77d"
}
});

const data=await res.json();

let html="<h2>Zápasy</h2>";

(data.response || []).slice(0,10).forEach(match=>{

html+=`
<div class="match">
<b>${match.teams.home.name}</b>
vs
<b>${match.teams.away.name}</b><br><br>

<button>Domácí</button>
<button>Remíza</button>
<button>Hosté</button>
</div>
`;

});

document.getElementById("app").innerHTML=html;

}catch(e){

document.getElementById("app").innerHTML="Chyba načtení API";

}

}
</script>

</body>
</html>
