<!doctype html><html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#07111f"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="icon" href="/favicon.svg"><link rel="apple-touch-icon" href="/apple-touch-icon.png"><link rel="manifest" href="/manifest.json"><title>Tipovačka</title><style>
:root{--bg:#07111f;--panel:#0d1828;--panel2:#111f32;--card:#101d30;--soft:#15243a;--text:#f8fafc;--muted:#93a4b8;--line:rgba(255,255,255,.09);--green:#22c55e;--green2:#16a34a;--lime:#86efac;--gold:#fbbf24;--red:#fb7185;--blue:#38bdf8;--shadow:0 18px 45px rgba(0,0,0,.35);}
*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;min-height:100vh;background:radial-gradient(circle at 18% -10%,rgba(34,197,94,.22),transparent 38%),radial-gradient(circle at 90% 0,rgba(56,189,248,.15),transparent 30%),linear-gradient(180deg,#07111f,#0a1321 52%,#07111f);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;color:var(--text);padding-bottom:104px}.app{max-width:980px;margin:auto}.hero{margin:14px;padding:22px;border-radius:32px;background:linear-gradient(135deg,rgba(15,23,42,.98),rgba(10,32,30,.96));color:white;position:relative;overflow:hidden;min-height:138px;padding-right:154px;box-shadow:var(--shadow);border:1px solid var(--line)}.hero:before{content:"";position:absolute;inset:auto -65px -95px auto;width:220px;height:220px;border:26px solid rgba(34,197,94,.22);border-radius:50%;transform:rotate(-18deg)}.hero:after{content:"TIP";position:absolute;right:32px;top:34px;width:88px;height:88px;border-radius:28px;background:linear-gradient(145deg,#0b1220,#111827);border:4px solid var(--green);box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 16px 35px rgba(0,0,0,.35);display:grid;place-items:center;font-weight:1000;font-size:25px;letter-spacing:-1px}.hero-logo{display:none}.big{font-size:38px;font-weight:1000;letter-spacing:-1.4px}.card{background:linear-gradient(180deg,rgba(16,29,48,.96),rgba(12,22,38,.96));margin:12px 14px;padding:16px;border-radius:26px;box-shadow:var(--shadow);border:1px solid var(--line);backdrop-filter:blur(14px)}.input,select,textarea{width:100%;box-sizing:border-box;border:1px solid rgba(255,255,255,.11);border-radius:16px;padding:13px;margin:6px 0;background:#0a1424;color:var(--text);outline:none}.input:focus{border-color:rgba(34,197,94,.75);box-shadow:0 0 0 4px rgba(34,197,94,.12)}.btn{border:0;border-radius:16px;padding:12px 14px;font-weight:950;background:#14243a;color:#d5e2f2;transition:.16s transform,.16s background,.16s box-shadow}.btn:hover{transform:translateY(-1px)}.btn:disabled{opacity:.38;transform:none}.btn.primary,.btn.active{background:linear-gradient(135deg,var(--green),var(--green2));color:#02130a;box-shadow:0 10px 24px rgba(34,197,94,.22)}.btn.good{background:rgba(34,197,94,.15);color:var(--lime)}.btn.danger{background:rgba(251,113,133,.14);color:#fecdd3}.btn.dark{background:#030712;color:white}.full{width:100%}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.notice{background:rgba(251,191,36,.1);color:#fde68a;border:1px solid rgba(251,191,36,.22);border-radius:18px;padding:12px}.ok{background:rgba(34,197,94,.12);color:#bbf7d0;border-color:rgba(34,197,94,.24)}.bad{background:rgba(251,113,133,.12);color:#fecdd3;border-color:rgba(251,113,133,.24)}.note{font-size:13px;color:var(--muted)}.title{font-size:21px;font-weight:1000;margin-bottom:10px;letter-spacing:-.4px}.match{border:1px solid var(--line);border-radius:22px;padding:14px;margin:10px 0;background:linear-gradient(180deg,rgba(19,34,55,.9),rgba(13,24,40,.9));box-shadow:0 12px 28px rgba(0,0,0,.2)}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:13px 0}.team{text-align:center;font-weight:950}.flag{font-size:31px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.28))}.score{font-size:28px;font-weight:1000;color:#fff}.badge{border-radius:999px;padding:5px 10px;font-size:12px;font-weight:950;border:1px solid transparent}.open{background:rgba(34,197,94,.15);color:#bbf7d0;border-color:rgba(34,197,94,.22)}.locked{background:rgba(251,191,36,.12);color:#fde68a;border-color:rgba(251,191,36,.22)}.done{background:rgba(148,163,184,.12);color:#cbd5e1;border-color:rgba(148,163,184,.18)}.rank{display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding:12px 0}.rank:last-child{border-bottom:0}.avatar{width:48px;height:48px;border-radius:50%;position:relative;display:grid;place-items:center;font-weight:1000;flex:0 0 auto;box-shadow:0 8px 20px rgba(0,0,0,.25);border:2px solid rgba(255,255,255,.18);background:linear-gradient(145deg,#123,#243)}.avatar.bigAvatar{width:74px;height:74px}.ava-face{position:absolute;inset:9px;border-radius:50%;background:var(--skin,#f5c58b);overflow:hidden}.ava-hair{position:absolute;left:8px;right:8px;top:5px;height:18px;background:var(--hair,#2b1b16);border-radius:18px 18px 8px 8px}.ava-eyes{position:absolute;left:17px;right:17px;top:22px;height:6px}.ava-eyes:before,.ava-eyes:after{content:"";position:absolute;width:5px;height:5px;border-radius:50%;background:#111}.ava-eyes:before{left:0}.ava-eyes:after{right:0}.ava-mouth{position:absolute;left:21px;top:33px;width:13px;height:6px;border-bottom:3px solid #8b2635;border-radius:0 0 15px 15px}.ava-acc{position:absolute;right:-4px;bottom:-4px;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:#0b1220;border:2px solid rgba(255,255,255,.2);font-size:13px}.grow{flex:1}.points{font-weight:1000;font-size:18px}.medal{font-size:28px;width:34px;text-align:center}.bottom{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(930px,calc(100% - 16px));background:rgba(13,24,40,.86);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);display:grid;grid-template-columns:repeat(5,1fr);padding:7px;backdrop-filter:blur(18px);z-index:5}.bottom button{border:0;background:transparent;border-radius:18px;padding:8px 2px;font-size:11px;font-weight:950;color:#8fa2b8}.bottom .on{background:linear-gradient(135deg,var(--green),var(--green2));color:#02130a}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.login-card{background:linear-gradient(180deg,rgba(16,29,48,.96),rgba(12,22,38,.96));width:100%;max-width:460px;border-radius:30px;padding:20px;box-shadow:var(--shadow);border:1px solid var(--line)}.login-card h1{margin-top:0;font-size:32px;letter-spacing:-1px}.brandMark{width:86px;height:86px;border-radius:28px;background:#0b1220;border:5px solid var(--green);display:grid;place-items:center;margin:0 auto 12px;font-weight:1000;font-size:24px;box-shadow:0 18px 38px rgba(0,0,0,.35)}.hide{display:none}.table{width:100%;border-collapse:collapse}.table td,.table th{border-bottom:1px solid var(--line);padding:10px 4px}.right{text-align:right}.center{text-align:center}textarea.input{min-height:120px}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 14px}.exact{display:grid;grid-template-columns:1fr auto 1fr;gap:7px;align-items:center;margin-top:8px}.count{font-weight:1000;color:var(--lime)}.phase-select{margin:8px 14px}.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.statbox{background:#0a1424;border:1px solid var(--line);border-radius:16px;padding:10px;text-align:center}.statbox b{display:block;font-size:19px}.others{background:#0a1424;border:1px solid var(--line);border-radius:18px;padding:11px;margin-top:10px}.others-row{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:8px 0}.others-row:last-child{border-bottom:0}.stepper{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}.stepper button{border:0;border-radius:16px;background:#14243a;color:var(--lime);font-weight:1000;font-size:20px;padding:12px}.stepper-value{text-align:center;background:#07111f;border:1px solid var(--line);border-radius:16px;padding:12px;font-weight:1000;font-size:20px}.saved-tip{margin-top:8px;background:rgba(34,197,94,.12);color:#bbf7d0;border:1px solid rgba(34,197,94,.25);border-radius:16px;padding:9px;font-weight:900;text-align:center}.admin-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}.small{font-size:12px;padding:8px}.logged{margin-top:10px;font-size:13px;color:#d8f7e2}.winner-score{background:rgba(34,197,94,.16);color:#bbf7d0;border-radius:12px;padding:4px 8px;font-weight:1000}.exact-hit{background:rgba(251,191,36,.16);color:#fde68a;border-radius:12px;padding:4px 8px;font-weight:1000}.role-active{background:linear-gradient(135deg,var(--green),var(--green2))!important;color:#02130a!important}.status-active{background:rgba(34,197,94,.18)!important;color:#bbf7d0!important}.admin-tabs{display:flex;gap:8px;overflow:auto;margin:0 14px 8px}.admin-tabs button{white-space:nowrap}.role-pill{display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(34,197,94,.25);background:rgba(34,197,94,.12);color:#bbf7d0;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:950}.avatar-builder{background:#0a1424;border:1px solid var(--line);border-radius:22px;padding:12px;margin:10px 0}.avatar-preview{display:flex;align-items:center;gap:14px;margin-bottom:8px}.chips{display:flex;gap:6px;overflow:auto;padding:4px 0}.chip{white-space:nowrap;border:1px solid var(--line);background:#101d30;color:#d5e2f2;border-radius:999px;padding:8px 11px;font-weight:900}.chip.on{background:linear-gradient(135deg,var(--green),var(--green2));color:#02130a}.leader-card{display:flex;align-items:center;gap:12px;background:#0a1424;border:1px solid var(--line);border-radius:22px;margin:9px 0;padding:12px}.leader-card.top1{background:linear-gradient(135deg,rgba(251,191,36,.18),rgba(16,29,48,.9));border-color:rgba(251,191,36,.26)}.leader-card.top2{background:linear-gradient(135deg,rgba(203,213,225,.16),rgba(16,29,48,.9))}.leader-card.top3{background:linear-gradient(135deg,rgba(180,83,9,.18),rgba(16,29,48,.9))}.miniStats{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px}.miniStats span{background:#07111f;border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px;color:#cbd5e1;font-weight:800}.section-title{margin:16px 14px 6px;font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:#86efac;font-weight:1000}@media(max-width:700px){.tabs,.statgrid{grid-template-columns:1fr 1fr}.admin-actions{grid-template-columns:1fr 1fr}.hero{padding-right:118px;min-height:126px}.hero:after{right:18px;top:30px;width:76px;height:76px;border-radius:24px;font-size:21px}.big{font-size:31px}.table{font-size:13px}.teams{grid-template-columns:1fr 58px 1fr}.card{margin-left:10px;margin-right:10px}.tabs{margin-left:10px;margin-right:10px}}
</style></head><body><div id="root"></div><script>
const API="/api";let tok=localStorage.tip_v16||"",me=null,data=null,page="home",msg="",filter="all",phase="all",betsFilter="all";
const AVA={skin:["#f5c58b","#d99b66","#7c4a2d","#f1d0a5","#b76e42"],hair:["#1f130f","#5b351c","#f3c567","#0f172a","#7c2d12"],bg:["#22c55e","#38bdf8","#a78bfa","#f59e0b","#fb7185","#14b8a6"],acc:["⚽","🏆","🧢","🤓","🎧","🔥","👑","🛡️","🚀","📊"],names:["Kanonýr","Trenér","VAR mág","Gaučák","Král remíz","Statistik","Ultras","Brankář","Tipér","Legenda"]};
let avatarDraft=JSON.parse(localStorage.tip_avatar||'{"skin":0,"hair":0,"bg":0,"acc":0,"name":0}');
function normalizeAvatar(a){a=a&&typeof a==='object'?a:{};return {skin:+a.skin||0,hair:+a.hair||0,bg:+a.bg||0,acc:+a.acc||0,name:+a.name||0}}
function avatarStyle(a){a=normalizeAvatar(a);return `--skin:${AVA.skin[a.skin%AVA.skin.length]};--hair:${AVA.hair[a.hair%AVA.hair.length]};background:radial-gradient(circle at 35% 25%,rgba(255,255,255,.35),transparent 22%),linear-gradient(145deg,${AVA.bg[a.bg%AVA.bg.length]},#07111f)`}
function avatarHtml(a,cls=""){a=normalizeAvatar(a);return `<div class="avatar ${cls}" style="${avatarStyle(a)}"><div class=ava-face></div><div class=ava-hair></div><div class=ava-eyes></div><div class=ava-mouth></div><div class=ava-acc>${AVA.acc[a.acc%AVA.acc.length]}</div></div>`}
function pickAv(k,i){avatarDraft[k]=i;localStorage.tip_avatar=JSON.stringify(avatarDraft);render()}
function builder(){let row=(k,arr)=>`<div class=chips>${arr.map((x,i)=>`<button type=button class="chip ${avatarDraft[k]==i?'on':''}" onclick="pickAv('${k}',${i})">${esc(x)}</button>`).join("")}</div>`;return `<div class=avatar-builder><div class=avatar-preview>${avatarHtml(avatarDraft,'bigAvatar')}<div><b>Vytvoř si avatara</b><div class=note>Vyber styl, doplněk a vtipnou roli. Uloží se k profilu.</div></div></div><div class=note>Barva profilu</div>${row('bg',["Trávník","Ledová","Fialová","Zlatá","Růžová","Tyrkys"])}<div class=note>Obličej</div>${row('skin',["Klasik","Opálený","Tmavý","Světlý","Bronz"])}<div class=note>Vlasy / styl</div>${row('hair',["Černé","Hnědé","Blond","Tmavé","Zrzavé"])}<div class=note>Doplněk</div>${row('acc',AVA.acc)}<div class=note>Vtipný titul</div>${row('name',AVA.names)}</div>`}

const $=id=>document.getElementById(id), esc=s=>String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
async function api(p,o={}){let h={"content-type":"application/json"};if(tok)h.authorization="Bearer "+tok;let r=await fetch(API+p,{...o,headers:h}),t=await r.text(),j={};try{j=t?JSON.parse(t):{}}catch{throw Error("Server nevrátil JSON: "+t.slice(0,120))}if(!r.ok)throw Error(j.error||"Chyba API");return j}
async function refresh(){if(tok){try{data=await api("/app");me=(await api("/me")).user}catch(e){}}}
async function load(){try{me=(await api("/me")).user;data=await api("/app")}catch(e){localStorage.removeItem("tip_v16");tok="";me=null;data=null}render()}
setInterval(()=>{if(me&&page=="tips")updateCountdowns()},1000);
document.addEventListener("visibilitychange",()=>{if(!document.hidden&&me)load()});
function updateCountdowns(){document.querySelectorAll("[data-count]").forEach(el=>{let m=(data.matches||[]).find(x=>x.id==el.dataset.count);if(m)el.textContent=left(m)})}
function go(p){page=p;render()}function out(){localStorage.removeItem("tip_v16");tok="";me=null;data=null;render()}
function av(u){return avatarHtml(u.avatar,{true:""}.true)}
function nav(){if(!me)return"";let admin=["admin","superadmin"].includes(me.role),it=[["home","🏠","Domů"],["tips","⚽","Tipy"],["rank","🏆","Pořadí"],["bets","📋","Tipy všech"],["admin","⚙️","Admin"]];return `<div class=bottom>${it.map(i=>i[0]=="admin"&&!admin?"":`<button class="${page==i[0]?"on":""}" onclick="go('${i[0]}')">${i[1]}<br>${i[2]}</button>`).join("")}</div>`}
function loginScreen(){return `<div class=login><div class=login-card><div class=brandMark>TIP</div><h1>Tipovačka MS 2026</h1><p class=note>Moderní tipovačka s vlastním avatarem, body a tabulkou.</p>${msg?`<div class="notice bad">${esc(msg)}</div>`:""}<input id=loginFirst class=input placeholder="Jméno"><input id=loginLast class=input placeholder="Příjmení"><input id=lp class=input type=password placeholder="Heslo"><button class="btn primary full" onclick=login()>Přihlásit</button><button class="btn full" onclick="reg.classList.toggle('hide')">Registrace</button><div id=reg class=hide><input id=code class=input placeholder="Vstupní kód"><input id=first class=input placeholder="Jméno"><input id=last class=input placeholder="Příjmení"><input id=rp class=input type=password placeholder="Heslo">${builder()}<button class="btn primary full" onclick=register()>Registrovat a vstoupit do hry</button></div><p class=note>Vstupní kód dostaneš od admina.</p></div></div>`}
async function login(){try{msg="";let full=((loginFirst.value||"").trim()+" "+(loginLast.value||"").trim()).trim();let r=await api("/auth/login",{method:"POST",body:JSON.stringify({name:full,password:lp.value})});tok=r.token;localStorage.tip_v16=tok;await load()}catch(e){msg=e.message;render()}}
async function register(){try{msg="";let r=await api("/auth/register",{method:"POST",body:JSON.stringify({first:first.value,last:last.value,password:rp.value,code:code.value,avatar:avatarDraft})});tok=r.token;localStorage.tip_v16=tok;await load()}catch(e){msg=e.message;render()}}
function hero(t,s){return `<div class=hero><img class=hero-logo src="/worldcup2026-logo.png" alt="FIFA World Cup 2026"><div class=big>${t}</div><div>${s}</div>${me?`<div class=logged>👤 ${esc(me.full_name)} • <span class=role-pill>${me.role=="superadmin"?"👑 Superadmin":me.role=="admin"?"🛡️ Admin":"⚽ Hráč"}</span></div>`:""}</div>`}
function dateKey(dt){let d=new Date(dt),now=new Date();return d.toDateString()==now.toDateString()?"today":d.toDateString()==new Date(now.getTime()+86400000).toDateString()?"tomorrow":"other"}
function left(m){let d=new Date(m.start_time)-new Date();if(d<=0)return"uzamčeno";let sec=Math.floor(d/1000),days=Math.floor(sec/86400);sec%=86400;let h=Math.floor(sec/3600);sec%=3600;let min=Math.floor(sec/60);sec%=60;return days>0?`${days}d ${h}h ${min}m ${sec}s`:`${h}h ${min}m ${sec}s`}
function badge(m){return m.effective_status=="open"?`<span class="badge open">lze tipovat</span>`:m.effective_status=="finished"?`<span class="badge done">dohráno</span>`:`<span class="badge locked">zamčeno</span>`}
function home(){let p=data.pool,pay=(data.settings.admin_fee||0)+(data.settings.game_fee||0),mine=data.meStats||me;return hero("Tipovačka",`${esc(data.season.name)}<br>${p.players} hráčů • bank ${p.game} Kč`)+`<div class=card><div style="display:flex;align-items:center;gap:14px">${avatarHtml(me.avatar,"bigAvatar")}<div><div class=title style="margin:0">${esc(me.full_name)}</div><span class=role-pill>${me.role=="superadmin"?"👑 Superadmin":me.role=="admin"?"🛡️ Admin":"⚽ Hráč"}</span><div class=miniStats><span>${mine.points||0} b</span><span>${mine.hit_3||0} přesně</span><span>${mine.tips_count||0} tipů</span></div></div></div></div>`+`<div class=card>${me.role!="player"?`<div class=notice>Jsi admin. Admin netipuje a není v pořadí.</div>`:me.approved&&me.paid?`<div class="notice ok">✅ Účet aktivní.</div>`:`<div class=notice>⏳ Čekáš na aktivaci po zaplacení.</div>`}</div><div class=card><div class=title>Platba</div>${data.settings.bank_account?`Celkem <b>${pay} Kč</b><br>Účet: <b>${esc(data.settings.bank_account)}</b><br>Poznámka: <b>${esc(me.full_name)}</b>`:`<span class=note>Admin zatím nedoplnil účet a částku.</span>`}</div><div class=card><button class="btn full" onclick=out()>Odhlásit</button></div>`}
function phases(){return ["all",...new Set((data.matches||[]).map(m=>m.phase).filter(Boolean))]}
function filtered(){let a=data.matches||[];if(filter=="today")a=a.filter(m=>dateKey(m.start_time)=="today");if(filter=="tomorrow")a=a.filter(m=>dateKey(m.start_time)=="tomorrow");if(filter=="open")a=a.filter(m=>m.effective_status=="open");if(filter=="locked")a=a.filter(m=>m.effective_status=="locked");if(filter=="finished")a=a.filter(m=>m.effective_status=="finished");if(filter=="missing")a=a.filter(m=>m.effective_status=="open"&&!data.bets.find(b=>b.match_id==m.id));if(phase!="all")a=a.filter(m=>m.phase==phase);return a}
function stepValue(id,delta){let el=$(id);if(!el)return;let v=parseInt(el.value||"0",10);v=Math.max(0,v+delta);el.value=v;let box=$("box_"+id);if(box)box.textContent=v}
function scoreStepper(id,val,disabled){val=(val==null||val==="")?0:val;return `<div class=stepper><button type=button ${disabled?"disabled":""} onclick="stepValue('${id}',-1)">−</button><input id="${id}" type=hidden value="${val}"><div id="box_${id}" class=stepper-value>${val}</div><button type=button ${disabled?"disabled":""} onclick="stepValue('${id}',1)">+</button></div>`}
async function bet(id){try{let h=$("h_"+id)?.value,a=$("a_"+id)?.value;if(h===""||a===""){alert("Zadej přesný výsledek.");return}await api("/bets",{method:"POST",body:JSON.stringify({matchId:id,homeGoals:h,awayGoals:a})});await load();alert("Tip uložen.")}catch(e){alert(e.message)}}
function scoreClass(x,m){if(!m.score)return "";let [h,a]=m.score.split(":").map(Number);return Number(x.home_goals)==h&&Number(x.away_goals)==a?"exact-hit":(x.pick==(h>a?"1":h<a?"2":"X")?"winner-score":"")}
function otherBetsHtml(m){let arr=(data.publicBets||[]).filter(x=>x.match_id==m.id);if(m.effective_status=="open")return `<div class=note>Tipy ostatních se zobrazí po uzamčení zápasu.</div>`;return `<div class=others><b>Tipy ostatních</b>${arr.length?arr.map(x=>`<div class=others-row><span>${esc(x.full_name)}</span><b class="${scoreClass(x,m)}">${x.home_goals}:${x.away_goals}</b></div>`).join(""):`<div class=note>Nikdo zatím netipoval.</div>`}</div>`}
function phasePicker(){let ph=phases();return `<div class=phase-select><select class=input onchange="phase=this.value;render()">${ph.map(p=>`<option value="${esc(p)}" ${phase==p?"selected":""}>${p=="all"?"Všechny skupiny a fáze":esc(p)}</option>`).join("")}</select></div>`}
function phasePicker(){let ph=phases();return `<div class=phase-select><select class=input onchange="phase=this.value;render()">${ph.map(p=>`<option value="${esc(p)}" ${phase==p?"selected":""}>${p=="all"?"Všechny skupiny a fáze":esc(p)}</option>`).join("")}</select></div>`}
function tips(){let a=filtered();return hero("Tipy","Tipuje se pouze přesný výsledek. Tipy ostatních uvidíš až po uzamčení zápasu.")+`<div class=tabs>${[["all","Vše"],["today","Dnes"],["tomorrow","Zítra"],["missing","Netipnuté"],["open","Otevřené"],["locked","Zamčené"],["finished","Vyhodnocené"]].map(x=>`<button class="btn ${filter==x[0]?'active':''}" onclick="filter='${x[0]}';render()">${x[1]}</button>`).join("")}</div>${phasePicker()}<div class=card>${a.length?a.map(m=>{let b=data.bets.find(x=>x.match_id==m.id)||{},lock=m.effective_status!="open"||!me.approved||!me.paid||me.role!="player";return `<div class=match>${badge(m)} <span class=note>${new Date(m.start_time).toLocaleString("cs-CZ")} • ${esc(m.phase)} • <span class=count data-count="${m.id}">${left(m)}</span></span><div class=teams><div class=team><div class=flag>${esc(m.home_flag||"")}</div>${esc(m.home)}</div><div class=score>${m.score?esc(m.score):"VS"}</div><div class=team><div class=flag>${esc(m.away_flag||"")}</div>${esc(m.away)}</div></div><div class=exact>${scoreStepper("h_"+m.id,b.home_goals??0,lock)}<b>:</b>${scoreStepper("a_"+m.id,b.away_goals??0,lock)}</div><button class="btn primary full" ${lock?"disabled":""} onclick="bet('${m.id}')">${b.match_id?"Upravit tip":"Potvrdit tip"}</button>${b.match_id?`<div class=saved-tip>✓ Tip uložen: ${b.home_goals}:${b.away_goals}</div>`:""}${otherBetsHtml(m)}</div>`}).join(""):`<div class=notice>Pro filtr nejsou zápasy.</div>`}</div>`}
function rank(){let top=data.ranking||[];return hero("Pořadí","Leaderboard s avatary, medailemi a statistikami.")+`<div class=card>${top.length?top.map((u,i)=>`<div class="leader-card top${i<3?i+1:''}"><div class=medal>${i==0?'🥇':i==1?'🥈':i==2?'🥉':i+1}</div>${avatarHtml(u.avatar)}<div class=grow><b>${esc(u.full_name)}</b><div class=miniStats><span>${u.evaluated_count||0} vyhod.</span><span>${u.hit_1||0}× vítěz</span><span>${u.hit_3||0}× přesně</span></div></div><div class=points>${u.points} b</div></div>`).join(""):`<div class=notice>Zatím nejsou hráči v pořadí.</div>`}</div>`}
function betsPage(){let ms=(data.matches||[]).filter(m=>m.effective_status!="open");if(betsFilter=="mine")ms=ms.filter(m=>data.bets.find(b=>b.match_id==m.id));return hero("Tipy všech","Zobrazují se jen u uzamčených nebo dohraných zápasů.")+`<div class=tabs><button class="btn ${betsFilter=='all'?'primary':''}" onclick="betsFilter='all';render()">Vše</button><button class="btn ${betsFilter=='mine'?'primary':''}" onclick="betsFilter='mine';render()">Jen moje</button><button class=btn onclick="betsFilter='all';filter='missing';go('tips')">Netipnuté</button><button class=btn onclick="go('rank')">Pořadí</button></div><div class=card>${ms.length?ms.map(m=>`<div class=match><b>${esc(m.home_flag)} ${esc(m.home)} vs ${esc(m.away_flag)} ${esc(m.away)}</b><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString("cs-CZ")} ${m.score?"• výsledek "+esc(m.score):""}</div>${otherBetsHtml(m)}</div>`).join(""):"<div class=notice>Zatím není žádný uzamčený zápas.</div>"}</div>`}
function rules(){return hero("Pravidla","Admin je může upravit v administraci.")+`<div class=card>${data.settings.rules_html||"<p>Pravidla zatím nejsou nastavena.</p>"}</div>`}
async function approve(id){await api("/admin/approve",{method:"POST",body:JSON.stringify({userId:id})});await load()}
async function deactivate(id){await api("/admin/deactivate",{method:"POST",body:JSON.stringify({userId:id})});await load()}
async function delUser(id){if(confirm("Opravdu smazat hráče i jeho tipy?")){await api("/admin/delete-user",{method:"POST",body:JSON.stringify({userId:id})});await load()}}
async function role(id,role){await api("/admin/role",{method:"POST",body:JSON.stringify({userId:id,role})});await load()}
async function saveSettings(){await api("/admin/settings",{method:"POST",body:JSON.stringify({admin_fee:+af.value||0,game_fee:+gf.value||0,split:[s1.value,s2.value,s3.value].map(Number),bank_account:bank.value,access_code:access.value,rules_html:rulesText.value})});await load();alert("Uloženo")}
async function addMatch(){await api("/admin/add-match",{method:"POST",body:JSON.stringify({phase:phaseIn.value,home:homeTeam.value,away:awayTeam.value,start_time:startTime.value})});await load()}
async function result(id){let score=prompt("Výsledek např. 4:2");if(!score)return;await api("/admin/result",{method:"POST",body:JSON.stringify({matchId:id,score})});await load()}
async function setStatus(id,status){await api("/admin/status",{method:"POST",body:JSON.stringify({matchId:id,status})});await load()}
async function imp(){await api("/admin/import",{method:"POST",body:JSON.stringify({text:bulk.value})});await load();alert("Import hotový")}
async function recalc(){await api("/admin/recalc",{method:"POST"});await load();alert("Přepočítáno")}
function admin(){if(!["admin","superadmin"].includes(me.role))return hero("Admin","Bez oprávnění");return hero("Admin","Zápasy, výsledky, role a hráči.")+`<div class=card><div class=title>Nastavení</div><input id=af class=input type=number value="${data.settings.admin_fee||""}" placeholder="Poplatek adminovi"><input id=gf class=input type=number value="${data.settings.game_fee||""}" placeholder="Poplatek do hry"><input id=bank class=input value="${esc(data.settings.bank_account||"")}" placeholder="Účet"><input id=access class=input value="${esc(data.settings.access_code)}" placeholder="Vstupní kód"><div class=grid3><input id=s1 class=input value="${data.settings.split[0]}"><input id=s2 class=input value="${data.settings.split[1]}"><input id=s3 class=input value="${data.settings.split[2]}"></div><textarea id=rulesText class=input placeholder="Pravidla">${esc(data.settings.rules_html||"")}</textarea><button class="btn primary full" onclick=saveSettings()>Uložit</button></div><div class=card><button class="btn good full" onclick=recalc()>Přepočítat body</button></div><div class=card><div class=title>Přidat / doplnit zápas</div><select id=phaseIn class=input>${["Skupina A","Skupina B","Skupina C","Skupina D","Skupina E","Skupina F","Skupina G","Skupina H","Skupina I","Skupina J","Skupina K","Skupina L","32 postupujících","Osmifinále","Čtvrtfinále","Semifinále","O 3. místo","Finále"].map(x=>`<option>${x}</option>`).join("")}</select><input id=homeTeam class=input list=teams placeholder="Domácí"><input id=awayTeam class=input list=teams placeholder="Hosté"><datalist id=teams>${data.teamOptions.map(t=>`<option value="${esc(t)}">`).join("")}</datalist><input id=startTime class=input type=datetime-local><button class="btn primary full" onclick=addMatch()>Přidat zápas</button></div><div class=card><div class=title>Import / aktualizace rozpisu</div><p class=note>Formát: datum čas; fáze; domácí; hosté. Duplicity se přeskočí.</p><textarea id=bulk class=input placeholder="2026-06-11 21:00; Skupina A; Mexiko; Jihoafrická republika"></textarea><button class="btn primary full" onclick=imp()>Importovat / aktualizovat</button></div><div class=card><div class=title>Správa zápasů</div>${data.matches.map(m=>`<div class=match><b>${esc(m.home_flag||"")} ${esc(m.home)} vs ${esc(m.away_flag||"")} ${esc(m.away)}</b><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString("cs-CZ")} • ${esc(m.status)} ${m.score?"• "+esc(m.score):""}</div><div class=admin-actions><button class="btn small" onclick="setStatus('${m.id}','open')">Otevřít</button><button class="btn small" onclick="setStatus('${m.id}','locked')">Zamknout</button><button class="btn good small" onclick="result('${m.id}')">Výsledek</button><button class="btn small" onclick="setStatus('${m.id}','finished')">Dohráno</button></div></div>`).join("")}</div><div class=card><div class=title>Hráči a role</div>${data.users.map(u=>`<div class=rank>${av(u)}<div class=grow><b>${esc(u.full_name)}</b><div class=note>${u.role=="superadmin"?"👑 Superadmin":u.role=="admin"?"🛡️ Admin":"⚽ Hráč"} ${u.paid?"• aktivní":"• čeká"} • ${u.points} b</div></div><div class=admin-actions><button class="btn good small ${u.approved&&u.paid?'status-active':''}" onclick="approve('${u.id}')">Aktivní</button><button class="btn small ${!u.approved||!u.paid?'status-active':''}" onclick="deactivate('${u.id}')">Neaktivní</button><button class="btn small ${u.role=='player'?'role-active':''}" onclick="role('${u.id}','player')">Hráč</button><button class="btn small ${u.role=='admin'||u.role=='superadmin'?'role-active':''}" onclick="role('${u.id}','admin')">Admin</button><button class="btn danger small" onclick="delUser('${u.id}')">Smazat</button></div></div>`).join("")}</div>`}
function render(){if(!me)return root.innerHTML=loginScreen();let pages={home,tips,rank,bets:betsPage,rules,admin};root.innerHTML=`<div class=app>${(pages[page]||home)()}</div>`+nav()}
load();if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}
</script></body></html>
