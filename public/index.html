<!doctype html><html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#08111f"><title>Tipovačka</title>
<link rel="manifest" href="/manifest.webmanifest"><link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png"><link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"><style>
:root{--bg:#07111f;--bg2:#0d1b2e;--card:rgba(255,255,255,.08);--card2:rgba(255,255,255,.12);--line:rgba(255,255,255,.12);--text:#f8fafc;--muted:#9aa7b8;--green:#31d158;--green2:#18a948;--white:#fff;--red:#ff453a;--amber:#ffcc00;--blue:#64d2ff;--shadow:0 24px 70px rgba(0,0,0,.36)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0%,#163927 0,#08111f 38%,#030712 100%);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;color:var(--text);padding-bottom:96px}.app{max-width:900px;margin:auto}.topbar{position:sticky;top:0;z-index:4;padding:12px 14px 8px;background:linear-gradient(180deg,rgba(7,17,31,.96),rgba(7,17,31,.62),transparent);backdrop-filter:blur(18px)}.brand{display:flex;gap:12px;align-items:center}.logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(145deg,#17243a,#050a13);box-shadow:inset 0 0 0 1px rgba(255,255,255,.12),0 16px 38px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center}.logo svg{width:48px;height:48px}.logo img{width:100%;height:100%;border-radius:inherit;display:block;object-fit:cover}.brand h1{font-size:24px;line-height:1;margin:0;font-weight:950;letter-spacing:-.8px}.fifa{font-size:11px;font-weight:900;letter-spacing:.7px;color:#d7f9df;border:1px solid rgba(49,209,88,.35);border-radius:999px;padding:5px 9px;display:inline-flex;margin-top:6px;background:rgba(49,209,88,.12)}.hero{margin:8px 14px 14px;padding:21px;border:1px solid var(--line);border-radius:30px;background:linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.055));box-shadow:var(--shadow);overflow:hidden;position:relative}.hero:after{content:"";position:absolute;right:-45px;top:-55px;width:190px;height:190px;border-radius:999px;border:26px solid rgba(49,209,88,.2)}.big{font-size:34px;font-weight:980;letter-spacing:-1.2px}.sub{color:#c7d2df;font-weight:650}.card{margin:12px 14px;padding:16px;border-radius:25px;background:rgba(255,255,255,.085);border:1px solid var(--line);box-shadow:0 12px 36px rgba(0,0,0,.18);backdrop-filter:blur(16px)}.title{font-size:20px;font-weight:950;margin-bottom:12px;letter-spacing:-.4px}.input,select{width:100%;border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:13px 14px;margin:6px 0;background:rgba(255,255,255,.08);color:var(--text);outline:0}.input::placeholder{color:#8290a4}select option{background:#0b1324}.btn{border:0;border-radius:16px;padding:12px 14px;font-weight:950;background:rgba(255,255,255,.1);color:var(--text);box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);cursor:pointer}.btn:active{transform:scale(.98)}.btn.primary{background:linear-gradient(135deg,var(--green),var(--green2));color:#04110a;box-shadow:0 12px 32px rgba(49,209,88,.24)}.btn.good{background:rgba(49,209,88,.16);color:#c9ffd7}.btn.warn{background:rgba(255,204,0,.16);color:#ffe58a}.full{width:100%}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.notice{background:rgba(255,204,0,.13);color:#ffe9a6;border:1px solid rgba(255,204,0,.25);border-radius:18px;padding:13px}.ok{background:rgba(49,209,88,.13);color:#cfffd9;border-color:rgba(49,209,88,.28)}.bad{background:rgba(255,69,58,.14);color:#ffd0ce;border-color:rgba(255,69,58,.26)}.note{font-size:13px;color:var(--muted);line-height:1.35}.match{border:1px solid var(--line);border-radius:23px;padding:14px;margin:11px 0;background:linear-gradient(145deg,rgba(255,255,255,.11),rgba(255,255,255,.055))}.matchTop{display:flex;align-items:center;justify-content:space-between;gap:10px}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:14px 0}.team{text-align:center;font-weight:950;min-width:0}.teamName{font-size:15px;white-space:normal}.flag{font-size:32px;margin-bottom:4px}.score{font-size:25px;font-weight:980;color:#fff;background:rgba(0,0,0,.18);border-radius:16px;padding:8px 10px;min-width:58px;text-align:center}.tip{border:0;border-radius:17px;padding:13px;background:rgba(255,255,255,.1);color:#dbeafe;font-weight:950}.tip.active{background:linear-gradient(135deg,var(--green),var(--green2));color:#031008}.tip:disabled{opacity:.42}.badge{border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950;white-space:nowrap}.open{background:rgba(49,209,88,.17);color:#caffd5}.locked{background:rgba(255,204,0,.15);color:#ffe188}.done{background:rgba(100,210,255,.15);color:#d3f4ff}.rank{display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding:12px 0}.rank:last-child{border-bottom:0}.medal{font-size:24px;width:34px;text-align:center;font-weight:950}.avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;flex:0 0 auto;background:#13233a;box-shadow:inset 0 0 0 2px rgba(255,255,255,.16)}.avatar.bigA{width:76px;height:76px}.avatar svg{width:100%;height:100%}.grow{flex:1;min-width:0}.points{font-weight:980;font-size:20px;color:#fff}.roleBadge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 8px;background:rgba(255,255,255,.09);font-size:12px;font-weight:900;color:#dbeafe}.bottom{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(860px,calc(100% - 16px));background:rgba(16,28,45,.82);border:1px solid rgba(255,255,255,.13);border-radius:26px;box-shadow:0 18px 60px rgba(0,0,0,.42);display:grid;grid-template-columns:repeat(5,1fr);padding:7px;backdrop-filter:blur(22px);z-index:5}.bottom button{border:0;background:transparent;border-radius:18px;padding:8px 2px;font-size:11px;font-weight:900;color:#8fa0b5}.bottom .on{background:rgba(49,209,88,.16);color:#caffd5}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.login-card{width:100%;max-width:480px;border-radius:32px;padding:20px;background:rgba(255,255,255,.09);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(20px)}.loginHero{text-align:center;margin-bottom:14px}.loginHero .logo{margin:auto;width:86px;height:86px;border-radius:28px}.loginHero .logo svg{width:78px;height:78px}.loginHero .logo img{width:100%;height:100%;border-radius:inherit}.hide{display:none}.table{width:100%;border-collapse:collapse}.table td{border-bottom:1px solid var(--line);padding:10px 4px}.right{text-align:right}textarea.input{min-height:120px}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 14px 6px}.pill{display:inline-block;background:rgba(49,209,88,.13);color:#d0ffdc;border:1px solid rgba(49,209,88,.22);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:950;margin:4px}.avatarBuilder{display:grid;grid-template-columns:92px 1fr;gap:12px;align-items:start;margin:10px 0}.avatarOptions{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.chip{border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:#fff;padding:9px 7px;font-weight:900;font-size:12px}.chip.on{background:rgba(49,209,88,.2);border-color:rgba(49,209,88,.45);color:#d8ffe1}.sectionLabel{font-size:12px;font-weight:950;color:#9aa7b8;text-transform:uppercase;letter-spacing:.7px;margin:9px 0 4px}.adminGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.small{font-size:12px;padding:9px 8px}.teamSelect{display:grid;grid-template-columns:1fr 1fr;gap:8px}@media(max-width:560px){.big{font-size:29px}.tabs{grid-template-columns:repeat(2,1fr)}.adminGrid{grid-template-columns:1fr}.teamName{font-size:13px}.flag{font-size:28px}.card{padding:14px}.avatarOptions{grid-template-columns:repeat(3,1fr)}}
</style></head><body><div id="root"></div><script>
const API="/api";let tok=localStorage.tip_v7||"",me=null,data=null,page="home",msg="",filter="all";
let avatar={face:0,hair:0,acc:0,bg:0};
const $=id=>document.getElementById(id),esc=s=>String(s??"").replace(/[&<>\"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const logoSvg=`<img src="/icons/icon-192.png" alt="TIP logo">`;
const TEAMS=[['Mexiko','🇲🇽'],['Jihoafrická republika','🇿🇦'],['Jižní Korea','🇰🇷'],['Česko','🇨🇿'],['Kanada','🇨🇦'],['Švýcarsko','🇨🇭'],['Katar','🇶🇦'],['Skotsko','🏴'],['Brazílie','🇧🇷'],['Maroko','🇲🇦'],['Haiti','🇭🇹'],['Norsko','🇳🇴'],['USA','🇺🇸'],['Paraguay','🇵🇾'],['Austrálie','🇦🇺'],['Turecko','🇹🇷'],['Německo','🇩🇪'],['Curaçao','🇨🇼'],['Ekvádor','🇪🇨'],['Pobřeží slonoviny','🇨🇮'],['Nizozemsko','🇳🇱'],['Japonsko','🇯🇵'],['Tunisko','🇹🇳'],['Nový Zéland','🇳🇿'],['Belgie','🇧🇪'],['Egypt','🇪🇬'],['Írán','🇮🇷'],['Jamajka','🇯🇲'],['Španělsko','🇪🇸'],['Uruguay','🇺🇾'],['Saúdská Arábie','🇸🇦'],['Kapverdy','🇨🇻'],['Francie','🇫🇷'],['Senegal','🇸🇳'],['Peru','🇵🇪'],['Uzbekistán','🇺🇿'],['Argentina','🇦🇷'],['Rakousko','🇦🇹'],['Alžírsko','🇩🇿'],['Jordánsko','🇯🇴'],['Portugalsko','🇵🇹'],['Kolumbie','🇨🇴'],['Mali','🇲🇱'],['Spojené arabské emiráty','🇦🇪'],['Anglie','🏴'],['Chorvatsko','🇭🇷'],['Ghana','🇬🇭'],['Panama','🇵🇦']];
function teamOpts(){return TEAMS.map(t=>`<option value="${esc(t[0])}|${esc(t[1])}">${esc(t[1])} ${esc(t[0])}</option>`).join('')}
async function api(p,o={}){let h={"content-type":"application/json"};if(tok)h.authorization="Bearer "+tok;let r=await fetch(API+p,{...o,headers:h}),t=await r.text(),j={};try{j=t?JSON.parse(t):{}}catch{throw Error("Server nevrátil JSON: "+t.slice(0,120))}if(!r.ok)throw Error(j.error||"Chyba API");return j}
async function load(){try{me=(await api('/me')).user;data=await api('/app')}catch(e){localStorage.removeItem('tip_v7');tok='';me=null;data=null}render()}
function go(p){page=p;render()}function out(){localStorage.removeItem('tip_v7');tok='';me=null;data=null;render()}
function avatarSvg(a,initials=''){try{a=typeof a==='string'?JSON.parse(a):a}catch{a=null}if(!a||typeof a!='object')a={face:0,hair:0,acc:0,bg:0};let faces=['#f2c4a0','#d49a6a','#8fd3ff','#b7f28d','#d8b4fe','#ffd166'],bgs=['#31d158','#64d2ff','#ff9f0a','#bf5af2','#ff375f','#0a84ff'],hair=['#1f2937','#7c2d12','#eab308','#111827','#065f46','#581c87'],acc=['','M12 68 Q50 88 88 68','M24 38h52v8H24z','M28 57h44','M34 30l16-12 16 12',''];let f=faces[a.face%faces.length],bg=bgs[a.bg%bgs.length],hr=hair[a.hair%hair.length],ac=acc[a.acc%acc.length];return `<svg viewBox="0 0 100 100"><defs><linearGradient id="ab${a.face}${a.bg}" x1="0" y1="0" x2="1" y2="1"><stop stop-color="${bg}"/><stop offset="1" stop-color="#07111f"/></linearGradient></defs><rect width="100" height="100" rx="50" fill="url(#ab${a.face}${a.bg})"/><circle cx="50" cy="53" r="32" fill="${f}"/><path d="M22 44 Q31 19 52 23 Q73 19 80 45 Q61 34 38 35 Q30 37 22 44" fill="${hr}"/><circle cx="39" cy="54" r="4" fill="#111827"/><circle cx="61" cy="54" r="4" fill="#111827"/><path d="M39 70 Q50 78 62 70" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round"/>${ac?`<path d="${ac}" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>`:''}<text x="50" y="93" text-anchor="middle" font-size="13" font-weight="900" fill="#fff" font-family="Arial">${esc(initials).slice(0,2)}</text></svg>`}
function av(u,cls=''){return `<div class="avatar ${cls}">${u.avatar_data?avatarSvg(u.avatar_data,u.initials||''):avatarSvg({face:0,hair:0,acc:0,bg:0},u.initials||'?')}</div>`}
function nav(){if(!me)return'';let admin=['admin','superadmin'].includes(me.role),it=[['home','⌂','Domů'],['tips','⚽','Tipy'],['rank','🏆','Pořadí'],['rules','◎','Pravidla'],['admin','⚙','Admin']];return `<div class=bottom>${it.map(i=>i[0]=='admin'&&!admin?'':`<button class="${page==i[0]?'on':''}" onclick="go('${i[0]}')">${i[1]}<br>${i[2]}</button>`).join('')}</div>`}
function avatarBuilder(){return `<div class=avatarBuilder><div class="avatar bigA" id=preview>${avatarSvg(avatar,'')}</div><div><div class=sectionLabel>Obličej</div><div class=avatarOptions>${[0,1,2,3,4,5].map(i=>`<button type=button class="chip ${avatar.face==i?'on':''}" onclick="avatar.face=${i};refreshAvatar()">${['Klasik','Opálený','Ledový','Zelenáč','Fialák','Slunce'][i]}</button>`).join('')}</div><div class=sectionLabel>Účes</div><div class=avatarOptions>${[0,1,2,3,4,5].map(i=>`<button type=button class="chip ${avatar.hair==i?'on':''}" onclick="avatar.hair=${i};refreshAvatar()">${['Černý','Hnědý','Blonďák','Tmavý','Zelený','Ultra'][i]}</button>`).join('')}</div><div class=sectionLabel>Doplněk</div><div class=avatarOptions>${[0,1,2,3,4,5].map(i=>`<button type=button class="chip ${avatar.acc==i?'on':''}" onclick="avatar.acc=${i};refreshAvatar()">${['Nic','Šála','Čelenka','Brýle','Koruna','Čistý'][i]}</button>`).join('')}</div><div class=sectionLabel>Pozadí</div><div class=avatarOptions>${[0,1,2,3,4,5].map(i=>`<button type=button class="chip ${avatar.bg==i?'on':''}" onclick="avatar.bg=${i};refreshAvatar()">${['Trávník','Modrá','Oranž','Fialová','Růžová','Apple'][i]}</button>`).join('')}</div></div></div>`}
function refreshAvatar(){let p=$('preview'); if(p)p.innerHTML=avatarSvg(avatar,''); renderRegOnly()}
function renderRegOnly(){let wrap=$('avatarWrap'); if(wrap)wrap.innerHTML=avatarBuilder()}
function loginScreen(){return `<div class=login><div class=login-card><div class=loginHero><div class=logo>${logoSvg}</div><h1>Tipovačka</h1><div class=fifa>FIFA WORLD CUP 26</div></div>${msg?`<div class="notice bad">${esc(msg)}</div>`:''}<input id=ln class=input placeholder="Jméno nebo jméno příjmení"><input id=lp class=input type=password placeholder="Heslo"><button class="btn primary full" onclick=login()>Přihlásit</button><button class="btn full" type=button onclick="reg.classList.toggle('hide')">Registrace</button><div id=reg class=hide><input id=code class=input placeholder="Vstupní kód"><input id=first class=input placeholder="Jméno"><input id=last class=input placeholder="Příjmení"><input id=rp class=input type=password placeholder="Heslo"><div id=avatarWrap>${avatarBuilder()}</div><button class="btn primary full" onclick=register()>Registrovat</button></div><p class=note>Vstupní kód dostaneš od admina. Avatar se skládá přímo v aplikaci, nic se nenahrává z mobilu.</p></div></div>`}
async function login(){try{msg='';let r=await api('/auth/login',{method:'POST',body:JSON.stringify({name:ln.value,password:lp.value})});tok=r.token;localStorage.tip_v7=tok;await load()}catch(e){msg=e.message;render()}}
async function register(){try{msg='';let r=await api('/auth/register',{method:'POST',body:JSON.stringify({first:first.value,last:last.value,password:rp.value,code:code.value,avatar_data:JSON.stringify(avatar)})});tok=r.token;localStorage.tip_v7=tok;await load()}catch(e){msg=e.message;render()}}
function top(){return `<div class=topbar><div class=brand><div class=logo>${logoSvg}</div><div><h1>Tipovačka</h1><div class=fifa>FIFA WORLD CUP 26</div></div></div></div>`}
function hero(t,s){return `<div class=hero><div class=big>${t}</div><div class=sub>${s}</div></div>`}
function left(m){let d=new Date(m.start_time)-new Date();if(d<=0)return'uzamčeno';let min=Math.floor(d/60000),h=Math.floor(min/60),days=Math.floor(h/24);if(days>0)return`za ${days} d ${h%24} h`;return h?`za ${h} h ${min%60} min`:`za ${min} min`}
function badge(m){return m.effective_status=='open'?`<span class="badge open">lze tipovat</span>`:m.effective_status=='finished'?`<span class="badge done">dohráno</span>`:`<span class="badge locked">zamčeno</span>`}
function roleBadge(r){return r=='superadmin'?'👑 Superadmin':r=='admin'?'🛡️ Admin':'⚽ Hráč'}
function home(){let p=data.pool,pay=data.settings.admin_fee+data.settings.game_fee;return hero('MS tipovačka',`${esc(data.season.name)}<br>${p.players} hráčů • bank ${p.game} Kč`)+`<div class=card><div class=rank>${av(me,'bigA')}<div class=grow><b>${esc(me.full_name)}</b><div class=roleBadge>${roleBadge(me.role)}</div></div></div>${me.role!='player'?`<div class="notice ok">Admin režim je aktivní. Admin netipuje a není v pořadí.</div>`:me.approved&&me.paid?`<div class="notice ok">✅ Účet aktivní. Můžeš tipovat.</div>`:`<div class=notice>⏳ Čekáš na aktivaci po zaplacení.</div>`}</div><div class=card><div class=title>Platba</div>Celkem <b>${pay} Kč</b><br>Účet: <b>${esc(data.settings.bank_account)}</b><br>Poznámka: <b>${esc(me.full_name)}</b></div><div class=card><div class=title>Výhry</div><table class=table>${data.settings.split.map((x,i)=>`<tr><td>${['🥇','🥈','🥉'][i]||''} ${i+1}. místo</td><td>${x}%</td><td class=right>${Math.round(p.game*x/100)} Kč</td></tr>`).join('')}</table></div><div class=card><button class="btn full" onclick=out()>Odhlásit</button></div>`}
function matches(){let a=data.matches||[];if(filter!='all')a=a.filter(m=>m.effective_status==filter);return a}
async function bet(id,pick){try{await api('/bets',{method:'POST',body:JSON.stringify({matchId:id,pick})});data=await api('/app');render()}catch(e){alert(e.message)}}
function tips(){let a=matches();return hero('Tipy','Tipuje se 1 / X / 2. Tip lze změnit do začátku zápasu.')+`<div class=tabs><button class="btn ${filter=='all'?'primary':''}" onclick="filter='all';render()">Vše</button><button class="btn ${filter=='open'?'primary':''}" onclick="filter='open';render()">Lze tipovat</button><button class="btn ${filter=='locked'?'primary':''}" onclick="filter='locked';render()">Zamčené</button><button class="btn ${filter=='finished'?'primary':''}" onclick="filter='finished';render()">Dohrané</button></div><div class=card>${a.length?a.map(m=>{let b=data.bets.find(x=>x.match_id==m.id),lock=m.effective_status!='open'||!me.approved||!me.paid||me.role!='player';return `<div class=match><div class=matchTop>${badge(m)}<span class=note>${new Date(m.start_time).toLocaleString('cs-CZ')} • ${esc(m.phase)} • ${left(m)}</span></div><div class=teams><div class=team><div class=flag>${esc(m.home_flag||'')}</div><div class=teamName>${esc(m.home)}</div></div><div class=score>${m.score?esc(m.score):'VS'}</div><div class=team><div class=flag>${esc(m.away_flag||'')}</div><div class=teamName>${esc(m.away)}</div></div></div><div class=grid3>${['1','X','2'].map(p=>`<button ${lock?'disabled':''} class="tip ${b&&b.pick==p?'active':''}" onclick="bet('${m.id}','${p}')">${p}</button>`).join('')}</div></div>`}).join(''):`<div class=notice>Zatím nejsou zápasy.</div>`}</div>`}
function rank(){return hero('Pořadí','Správný tip = 1 bod. TOP 3 mají medaile.')+`<div class=card>${data.ranking.map((u,i)=>`<div class=rank><div class=medal>${['🥇','🥈','🥉'][i]||i+1+'.'}</div>${av(u)}<div class=grow><b>${esc(u.full_name)}</b><div class=note>${i<3?'TOP '+(i+1):'Tipér'}</div></div><div class=points>${u.points}</div></div>`).join('')||'<div class=notice>Zatím nejsou aktivní hráči.</div>'}</div>`}
function rules(){return hero('Pravidla','Systém turnaje a tipování.')+`<div class=card><div class=title>Pravidla tipovačky</div><p>Tipuje se <b>1</b> domácí, <b>X</b> remíza, <b>2</b> hosté.</p><p>Tip lze změnit do začátku zápasu. Po výkopu se zápas automaticky zamkne.</p><p>Admin zadá výsledek a body se spočítají automaticky.</p><p>Admin netipuje a není v pořadí.</p></div><div class=card><div class=title>Systém MS 2026</div><p>48 týmů, 12 skupin po 4 týmech, potom vyřazovací část.</p><span class=pill>Skupiny</span><span class=pill>32 postupujících</span><span class=pill>Osmifinále</span><span class=pill>Čtvrtfinále</span><span class=pill>Semifinále</span><span class=pill>Finále</span></div>`}
async function approve(id){try{await api('/admin/approve',{method:'POST',body:JSON.stringify({userId:id})});data=await api('/app');render()}catch(e){alert(e.message)}}
async function setUserRole(id,r){try{await api('/admin/role',{method:'POST',body:JSON.stringify({userId:id,role:r})});data=await api('/app');render()}catch(e){alert(e.message)}}
async function saveSettings(){try{await api('/admin/settings',{method:'POST',body:JSON.stringify({admin_fee:+af.value,game_fee:+gf.value,split:[s1.value,s2.value,s3.value].map(Number),bank_account:bank.value,access_code:access.value})});data=await api('/app');alert('Uloženo');render()}catch(e){alert(e.message)}}
function fillTeam(sel,nameId,flagId){let [n,f]=sel.value.split('|');$(nameId).value=n;$(flagId).value=f}
async function addMatch(){try{await api('/admin/add-match',{method:'POST',body:JSON.stringify({phase:phase.value,home:homeTeam.value,away:awayTeam.value,home_flag:homeFlag.value,away_flag:awayFlag.value,start_time:startTime.value})});data=await api('/app');render()}catch(e){alert(e.message)}}
async function result(id){let score=prompt('Výsledek např. 4:2');if(!score)return;try{await api('/admin/result',{method:'POST',body:JSON.stringify({matchId:id,score})});data=await api('/app');render()}catch(e){alert(e.message)}}
async function setStatus(id,status){try{await api('/admin/status',{method:'POST',body:JSON.stringify({matchId:id,status})});data=await api('/app');render()}catch(e){alert(e.message)}}
async function imp(){try{let r=await api('/admin/import',{method:'POST',body:JSON.stringify({text:bulk.value})});data=await api('/app');alert('Importováno: '+(r.count||0));render()}catch(e){alert(e.message)}}
async function resetDefaults(){try{if(!confirm('Obnovit výchozí zápasy MS 2026? Smažou se i existující tipy.'))return;let r=await api('/admin/reset-defaults',{method:'POST',body:JSON.stringify({})});data=await api('/app');alert('Obnoveno zápasů: '+r.count);render()}catch(e){alert(e.message)}}
function admin(){if(!['admin','superadmin'].includes(me.role))return hero('Admin','Bez oprávnění');return hero('Admin','Zápasy, výsledky, role a hráči.')+`<div class=card><div class=title>Nastavení</div><input id=af class=input type=number value="${data.settings.admin_fee}" placeholder="Poplatek adminovi"><input id=gf class=input type=number value="${data.settings.game_fee}" placeholder="Poplatek do hry"><input id=bank class=input value="${esc(data.settings.bank_account)}" placeholder="Účet"><input id=access class=input value="${esc(data.settings.access_code)}" placeholder="Vstupní kód"><div class=grid3><input id=s1 class=input value="${data.settings.split[0]}"><input id=s2 class=input value="${data.settings.split[1]}"><input id=s3 class=input value="${data.settings.split[2]}"></div><button class="btn primary full" onclick=saveSettings()>Uložit nastavení</button></div><div class=card><div class=title>Přidat zápas</div><div class=teamSelect><select onchange="fillTeam(this,'homeTeam','homeFlag')"><option>Vyber domácí tým</option>${teamOpts()}</select><select onchange="fillTeam(this,'awayTeam','awayFlag')"><option>Vyber hostující tým</option>${teamOpts()}</select></div><input id=phase class=input placeholder="Fáze / skupina"><input id=homeTeam class=input placeholder="Domácí"><input id=homeFlag class=input placeholder="Vlajka domácí"><input id=awayTeam class=input placeholder="Hosté"><input id=awayFlag class=input placeholder="Vlajka hosté"><input id=startTime class=input type=datetime-local><button class="btn primary full" onclick=addMatch()>Přidat</button></div><div class=card><div class=title>Import</div><p class=note>Formát: datum čas; fáze; domácí; vlajka domácí; hosté; vlajka hosté</p><textarea id=bulk class=input placeholder="2026-06-11 21:00; Skupina A; Mexiko; 🇲🇽; Jihoafrická republika; 🇿🇦"></textarea><button class="btn primary full" onclick=imp()>Importovat</button><button class="btn warn full" onclick=resetDefaults()>Obnovit výchozí zápasy MS 2026</button></div><div class=card><div class=title>Správa zápasů (${data.matches.length})</div>${data.matches.map(m=>`<div class=match><b>${esc(m.home_flag||'')} ${esc(m.home)} vs ${esc(m.away_flag||'')} ${esc(m.away)}</b><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString('cs-CZ')} • ${esc(m.status)} ${m.score?'• '+esc(m.score):''}</div><div class=adminGrid><button class="btn small" onclick="setStatus('${m.id}','open')">Otevřít</button><button class="btn small warn" onclick="setStatus('${m.id}','locked')">Zamknout</button><button class="btn small good" onclick="result('${m.id}')">Výsledek</button></div></div>`).join('')||'<div class=notice>Zatím nejsou zápasy.</div>'}</div><div class=card><div class=title>Hráči a role</div>${data.users.map(u=>`<div class=rank>${av(u)}<div class=grow><b>${esc(u.full_name)}</b><div class=note>${roleBadge(u.role)} ${u.paid?'• aktivní':'• čeká'}</div></div><button class="btn good small" onclick="approve('${u.id}')">Aktivovat</button><button class="btn small" onclick="setUserRole('${u.id}','player')">Hráč</button><button class="btn primary small" onclick="setUserRole('${u.id}','admin')">Admin</button></div>`).join('')}</div>`}
function render(){if(!me)return root.innerHTML=loginScreen();let pages={home,tips,rank,rules,admin};root.innerHTML=`<div class=app>${top()}${(pages[page]||home)()}</div>`+nav()}
load();
</script></body></html>
