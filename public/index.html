<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tipovačka</title>
<style>
body{margin:0;background:#f4f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:#101828;padding-bottom:90px}
.app{max-width:620px;margin:0 auto}.hero{margin:14px;padding:18px;border-radius:28px;color:white;background:linear-gradient(135deg,#0f172a,#1d4ed8);box-shadow:0 18px 36px #0f172a30}.big{font-size:32px;font-weight:950}.card{background:white;margin:12px 14px;padding:16px;border-radius:24px;border:1px solid #e5e7eb;box-shadow:0 12px 28px #00000012}.title{font-size:20px;font-weight:950;margin-bottom:12px}.note{font-size:13px;color:#667085;line-height:1.35}.input{width:100%;box-sizing:border-box;border:1px solid #e5e7eb;background:#f9fafb;border-radius:16px;padding:13px;margin:6px 0}.btn{border:0;border-radius:16px;padding:12px 13px;font-weight:950;background:#e8f0ff;color:#1d4ed8}.btn.primary{background:#2563eb;color:white}.full{width:100%}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}.notice{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:18px;padding:12px;white-space:pre-wrap}.bad{background:#fef2f2;color:#991b1b;border-color:#fecaca}.ok{background:#ecfdf3;color:#027a48;border-color:#bbf7d0}.tabs{display:flex;gap:8px;overflow:auto;padding:0 14px 4px}.tabs button{white-space:nowrap;border:1px solid #e5e7eb;background:white;border-radius:999px;padding:10px 13px;font-weight:950;color:#667085}.tabs button.on{background:#2563eb;color:white}.match{border:1px solid #e5e7eb;border-radius:18px;padding:13px;margin:10px 0;background:#fbfcff}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:12px 0}.team{text-align:center;font-weight:950}.vs{width:42px;height:42px;border-radius:50%;background:#f2f4f7;color:#667085;display:flex;align-items:center;justify-content:center;font-weight:900}.score{text-align:center;font-size:25px;font-weight:950}.badge{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:950;background:#eff6ff;color:#1d4ed8}.live{background:#dcfce7;color:#166534}.done{background:#f2f4f7;color:#475467}.teamrow{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:10px 0}.bottom{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(600px,calc(100% - 16px));background:white;border-radius:25px;box-shadow:0 14px 34px #0002;display:grid;grid-template-columns:repeat(4,1fr);padding:7px}.bottom button{border:0;background:white;color:#667085;border-radius:18px;padding:8px 2px;font-size:11px;font-weight:950}.bottom button.on{background:#e8f0ff;color:#1d4ed8}
</style>
</head>
<body>
<div id="root"></div>
<script>
let data=null, view="today", logged=false;

function e(s){return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]))}
function dt(x){try{return new Date(x).toLocaleString("cs-CZ",{dateStyle:"medium",timeStyle:"short"})}catch{return x||""}}
function key(x){const d=new Date(x);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function score(g){return g.score || "–"}
function live(g){return g.live}
function done(g){return g.done}

async function loadData(){
  document.getElementById("content").innerHTML='<div class="card"><div class="notice">Načítám data přes Cloudflare backend…</div></div>';
  try{
    const res=await fetch("/api/live-data");
    const json=await res.json();
    if(!res.ok) throw new Error(json.error || "Backend chyba");
    data=json;
    render();
  }catch(err){
    document.getElementById("content").innerHTML=`<div class="card"><div class="notice bad">Nepodařilo se načíst data:\n${e(err.message)}\n\nZkontroluj v Cloudflare:\n1) proměnnou APISPORTS_KEY\n2) D1 binding DB\n3) Functions deployment</div></div>`;
  }
}

function login(){
  const mail=document.getElementById("email").value.trim();
  const pass=document.getElementById("pass").value.trim();
  if(!mail||!pass){alert("Vyplň přihlášení.");return}
  logged=true;
  render();
  loadData();
}

function loginScreen(){
  return `<div class="app">
    <div class="hero"><div class="big">🏒 Tipovačka</div><div>MS v hokeji 2026 • data přes Cloudflare backend</div></div>
    <div class="card">
      <div class="title">Přihlášení</div>
      <input id="email" class="input" placeholder="E-mail">
      <input id="pass" type="password" class="input" placeholder="Heslo">
      <button class="btn primary full" onclick="login()">Přihlásit</button>
      <p class="note">Veřejně nezobrazujeme demo přihlašovací údaje. Účet aktivuje admin po zaplacení.</p>
    </div>
  </div>`;
}

function filteredGames(){
  const games=data?.games || [];
  if(view==="all") return games;
  if(view==="today") return games.filter(g=>key(g.date)===today());
  if(view==="live") return games.filter(live);
  if(view==="done") return games.filter(done);
  return games;
}

function gamesHtml(){
  if(!data) return `<div class="card"><div class="notice">Data nejsou načtená.</div></div>`;
  const arr=filteredGames();
  return `<div class="tabs">
    <button class="${view==="today"?"on":""}" onclick="view='today';render()">Dnes</button>
    <button class="${view==="live"?"on":""}" onclick="view='live';render()">Live</button>
    <button class="${view==="done"?"on":""}" onclick="view='done';render()">Dohráno</button>
    <button class="${view==="all"?"on":""}" onclick="view='all';render()">Vše</button>
  </div>
  <div class="card"><div class="title">Zápasy</div>
  <div class="notice ok">API odpovědělo. Načteno zápasů: ${data.games.length}</div>
  ${arr.length?arr.map(g=>`<div class="match">
    <span class="badge ${g.live?"live":g.done?"done":""}">${e(g.statusText)}</span>
    <div class="note">${e(g.phase)} • ${dt(g.date)}</div>
    <div class="teams"><div class="team">${e(g.home)}</div><div class="vs">VS</div><div class="team">${e(g.away)}</div></div>
    <div class="score">${e(score(g))}</div>
    <div class="grid3" style="margin-top:12px"><button class="btn">1</button><button class="btn">X</button><button class="btn">2</button></div>
  </div>`).join(""):`<div class="notice">Pro tento filtr nejsou zápasy. Klikni na „Vše“.</div>`}
  </div>`;
}

function teamsHtml(){
  const teams=data?.teams || [];
  return `<div class="card"><div class="title">Týmy a statistiky</div>
    <p class="note">Statistiky jsou teď odvozené z načtených zápasů. Další krok: doplnit detailní endpoint týmů a soupisky.</p>
    ${teams.length?teams.map(t=>`<div class="teamrow"><b>${e(t.name)}</b><span class="note">zápasy: ${t.played} • góly: ${t.goalsFor}:${t.goalsAgainst} • bilance: ${t.w}-${t.d}-${t.l}</span></div>`).join(""):`<div class="notice">Žádné týmy.</div>`}
  </div>`;
}

function apiHtml(){
  return `<div class="card"><div class="title">API diagnostika</div>
    <p>League ID: <b>${data?.league || "-"}</b><br>Season: <b>${data?.season || "-"}</b><br>Načteno zápasů: <b>${data?.games?.length || 0}</b></p>
    <button class="btn primary full" onclick="loadData()">Znovu načíst</button>
    <hr>
    <p class="note">Pokud je zápasů 0, pošli mi screenshot této obrazovky.</p>
    <pre class="notice">${e(JSON.stringify(data?.debug || {}, null, 2))}</pre>
  </div>`;
}

function render(){
  if(!logged){document.getElementById("root").innerHTML=loginScreen();return}
  let body=view==="teams"?teamsHtml():view==="api"?apiHtml():gamesHtml();
  document.getElementById("root").innerHTML=`<div class="app">
    <div class="hero"><div class="big">Tipovačka</div><div>World Championship 2026</div></div>
    <div id="content">${body}</div>
  </div>
  <div class="bottom">
    <button class="${!['teams','api'].includes(view)?"on":""}" onclick="view='today';render()">🏒<br>Zápasy</button>
    <button class="${view==="teams"?"on":""}" onclick="view='teams';render()">🌍<br>Týmy</button>
    <button onclick="alert('Pořadí napojíme zpět po ověření API dat.')">🏆<br>Pořadí</button>
    <button class="${view==="api"?"on":""}" onclick="view='api';render()">⚙️<br>API</button>
  </div>`;
}
render();
</script>
</body>
</html>
