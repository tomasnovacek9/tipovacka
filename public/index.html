<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tipovačka</title>
<style>
:root{--bg:#f3f6fb;--card:#fff;--text:#101828;--muted:#667085;--line:#e5e7eb;--blue:#2563eb;--blue2:#e8f0ff;--green:#16a34a;--red:#dc2626;--orange:#f97316;--shadow:0 12px 28px rgba(16,24,40,.10)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eaf1ff,#f7f9ff 260px,#f3f6fb);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);padding-bottom:94px}
button,input,select,textarea{font:inherit}button{cursor:pointer}.app{max-width:760px;margin:0 auto}.hero{margin:14px;padding:19px;border-radius:30px;color:white;background:linear-gradient(135deg,#0f172a,#1d4ed8);box-shadow:0 18px 36px rgba(15,23,42,.18)}.big{font-size:34px;font-weight:950;line-height:1.05}.hero-sub{opacity:.9;margin-top:4px;line-height:1.35}
.card{background:white;margin:12px 14px;padding:16px;border-radius:24px;border:1px solid var(--line);box-shadow:var(--shadow)}.title{font-size:21px;font-weight:950;margin:0 0 12px}.note{font-size:13px;color:var(--muted);line-height:1.35}.muted{color:var(--muted)}
.input{width:100%;box-sizing:border-box;border:1px solid var(--line);background:#f9fafb;border-radius:16px;padding:13px;margin:6px 0}.btn{border:0;border-radius:16px;padding:12px 13px;font-weight:950;background:var(--blue2);color:#1d4ed8}.btn.primary{background:var(--blue);color:white}.btn.good{background:#dcfce7;color:#166534}.btn.danger{background:#fee2e2;color:#991b1b}.btn.dark{background:#111827;color:white}.full{width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}.notice{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:18px;padding:12px;white-space:pre-wrap}.bad{background:#fef2f2;color:#991b1b;border-color:#fecaca}.ok{background:#ecfdf3;color:#027a48;border-color:#bbf7d0}.info{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.tabs{display:flex;gap:8px;overflow:auto;padding:0 14px 6px}.tabs button{white-space:nowrap;border:1px solid var(--line);background:white;border-radius:999px;padding:10px 13px;font-weight:950;color:#667085}.tabs button.on{background:#2563eb;color:white;border-color:#2563eb}
.match{border:1px solid var(--line);border-radius:20px;padding:14px;margin:10px 0;background:#fbfcff}.match-top{display:flex;justify-content:space-between;gap:8px;align-items:center}.badge{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:950;background:#eff6ff;color:#1d4ed8}.open{background:#ecfdf3;color:#027a48}.locked{background:#fff7ed;color:#c2410c}.done{background:#f2f4f7;color:#475467}
.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:12px 0}.team{text-align:center;font-weight:950}.flag{font-size:30px}.team-name{font-size:16px}.score{font-size:28px;font-weight:950;text-align:center;min-width:74px}.date-title{font-weight:950;margin:18px 0 8px;color:#344054}.chip{font-size:12px;padding:5px 8px;border-radius:999px;background:#f2f4f7;color:#475467;font-weight:800}
.tip{border:0;background:#eef4ff;color:#1d4ed8;padding:13px 6px;border-radius:17px;font-weight:950;font-size:16px}.tip.active{background:#2563eb;color:#fff;box-shadow:0 9px 18px rgba(37,99,235,.26)}.tip:disabled{opacity:.45;cursor:not-allowed}
.rank{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}.rank:last-child{border-bottom:0}.pos{width:34px;height:34px;border-radius:13px;background:#f2f4f7;display:flex;align-items:center;justify-content:center;font-weight:950}.avatar{width:44px;height:44px;border-radius:50%;background:#2563eb;color:white;display:flex;align-items:center;justify-content:center;font-weight:950}.grow{flex:1;min-width:0}.name{font-weight:950}.points{font-size:18px;font-weight:950}
.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid #eee;padding:9px 4px;text-align:left}.right{text-align:right}.center{text-align:center}.small{font-size:12px}
.bottom{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(740px,calc(100% - 16px));background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:25px;box-shadow:0 14px 34px #0002;display:grid;grid-template-columns:repeat(5,1fr);padding:7px}.bottom button{border:0;background:transparent;color:#667085;border-radius:18px;padding:8px 2px;font-size:11px;font-weight:950}.bottom button.on{background:#e8f0ff;color:#1d4ed8}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.login-card{width:100%;max-width:430px;background:white;border-radius:28px;padding:18px;box-shadow:0 18px 44px rgba(16,24,40,.14);border:1px solid var(--line)}.login-logo{width:64px;height:64px;border-radius:23px;background:linear-gradient(135deg,#1d4ed8,#60a5fa);display:flex;align-items:center;justify-content:center;font-size:34px;color:white;margin-bottom:10px}h1{margin:0 0 4px;font-size:30px}.hide{display:none!important}.label{display:block;font-size:12px;font-weight:900;color:#667085;margin:9px 0 2px;text-transform:uppercase}
textarea.input{min-height:140px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const API="/api";
let token=localStorage.getItem("tip_token")||"";
let me=null,data=null,page="home",filter="all",msg="";

function $(id){return document.getElementById(id)}
function e(s){return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]))}
async function api(path,opts={}){
  const h={"content-type":"application/json"}; if(token)h.authorization="Bearer "+token;
  const res=await fetch(API+path,{...opts,headers:h}); const txt=await res.text(); let js={};
  try{js=txt?JSON.parse(txt):{}}catch{throw Error("Server nevrátil JSON: "+txt.slice(0,200))}
  if(!res.ok)throw Error(js.error||"Chyba API"); return js;
}
async function load(){
  try{me=(await api("/me")).user; data=await api("/app");}
  catch(e){localStorage.removeItem("tip_token"); token=""; me=null; data=null;}
  render();
}
function go(p){page=p;render()} function logout(){localStorage.removeItem("tip_token");token="";me=null;data=null;render()}
function nav(){if(!me)return"";const admin=["admin","superadmin"].includes(me.role);const items=[["home","🏠","Domů"],["tips","🏒","Tipy"],["rank","🏆","Pořadí"],["archive","📦","Archiv"],["admin","⚙️","Admin"]];return `<div class=bottom>${items.map(i=>i[0]=="admin"&&!admin?"":`<button class="${page==i[0]?"on":""}" onclick="go('${i[0]}')">${i[1]}<br>${i[2]}</button>`).join("")}</div>`}
function loginScreen(){return `<div class=login-wrap><div class=login-card><div class=login-logo>🏒</div><h1>Tipovačka</h1><div class=note>Soukromá tipovací soutěž. Účet aktivuje admin po zaplacení.</div>${msg?`<div class="notice bad">${e(msg)}</div>`:""}<label class=label>E-mail</label><input id=email class=input><label class=label>Heslo</label><input id=pass type=password class=input><button class="btn primary full" onclick=login()>Přihlásit</button><button class="btn full" onclick="reg.classList.toggle('hide')">Registrace</button><div id=reg class=hide><label class=label>Jméno</label><input id=rname class=input><label class=label>E-mail</label><input id=remail class=input><label class=label>Heslo</label><input id=rpass type=password class=input><button class="btn primary full" onclick=register()>Registrovat</button></div></div></div>`}
async function login(){try{msg="";let r=await api("/auth/login",{method:"POST",body:JSON.stringify({email:email.value,password:pass.value})});token=r.token;localStorage.setItem("tip_token",token);await load()}catch(x){msg=x.message;render()}}
async function register(){try{msg="";let r=await api("/auth/register",{method:"POST",body:JSON.stringify({name:rname.value,email:remail.value,password:rpass.value})});token=r.token;localStorage.setItem("tip_token",token);await load()}catch(x){msg=x.message;render()}}
function hero(title,sub){return `<div class=hero><div class=big>${title}</div><div class=hero-sub>${sub}</div></div>`}
function statusBadge(m){return m.status=="open"?`<span class="badge open">otevřeno</span>`:m.status=="finished"?`<span class="badge done">dohráno</span>`:`<span class="badge locked">zamčeno</span>`}
function home(){let p=data.pool,pay=data.settings.admin_fee+data.settings.game_fee;return `${hero("Tipovačka",`${e(data.season.name)}<br>${p.players} hráčů • bank hry ${p.game} Kč`)}<div class=card>${me.approved&&me.paid?`<div class="notice ok">✅ Účet je aktivní. Můžeš tipovat.</div>`:`<div class=notice>⏳ Čekáš na aktivaci. Zaplať ${pay} Kč a admin tě aktivuje.</div>`}</div><div class=card><div class=title>O co se hraje</div><table class=table>${data.settings.split.map((x,i)=>`<tr><td>${i+1}. místo</td><td>${x}%</td><td class=right>${Math.round(p.game*x/100)} Kč</td></tr>`).join("")}</table></div><div class=card><button class="btn full" onclick=logout()>Odhlásit</button></div>`}
function filteredMatches(){let arr=data.matches||[];if(filter=="open")return arr.filter(m=>m.status=="open");if(filter=="finished")return arr.filter(m=>m.status=="finished");if(filter=="locked")return arr.filter(m=>m.status=="locked");return arr}
async function setBet(id,pick){try{await api("/bets",{method:"POST",body:JSON.stringify({matchId:id,pick})});data=await api("/app");render()}catch(x){alert(x.message)}}
function tips(){let arr=filteredMatches();return `${hero("Tipy","Tipuje se jen 1 / X / 2. Tip jde změnit do uzamčení zápasu.")}<div class=tabs><button class="${filter=="all"?"on":""}" onclick="filter='all';render()">Vše</button><button class="${filter=="open"?"on":""}" onclick="filter='open';render()">Otevřené</button><button class="${filter=="finished"?"on":""}" onclick="filter='finished';render()">Dohrané</button><button class="${filter=="locked"?"on":""}" onclick="filter='locked';render()">Zamčené</button></div><div class=card><div class=title>Zápasy</div>${arr.length?arr.map(m=>{let b=data.bets.find(x=>x.match_id==m.id),lock=m.status!="open"||!me.approved||!me.paid;return `<div class=match><div class=match-top>${statusBadge(m)}<span class=note>${new Date(m.start_time).toLocaleString("cs-CZ")}</span></div><div class=note>${e(m.phase||"Zápas")}</div><div class=teams><div class=team><div class=flag>${e(m.home_flag||"🏒")}</div><div class=team-name>${e(m.home)}</div></div><div class=score>${m.score?e(m.score):"VS"}</div><div class=team><div class=flag>${e(m.away_flag||"🏒")}</div><div class=team-name>${e(m.away)}</div></div></div><div class=grid3>${["1","X","2"].map(p=>`<button class="tip ${b&&b.pick==p?"active":""}" ${lock?"disabled":""} onclick="setBet('${m.id}','${p}')">${p}</button>`).join("")}</div></div>`}).join(""):`<div class=notice>Zatím nejsou zápasy.</div>`}</div>`}
function rank(){return `${hero("Pořadí","Body se přepočítají po potvrzení výsledků.")}<div class=card>${data.ranking.map((u,i)=>`<div class=rank><div class=pos>${i+1}</div><div class=avatar>${e(u.avatar)}</div><div class=grow><div class=name>${e(u.name)}</div><div class=note>${e(u.email)}</div></div><div class=points>${u.points}</div></div>`).join("")||"<div class=notice>Zatím nejsou hráči.</div>"}</div>`}
function archive(){return `${hero("Archiv","Staré soutěže zůstanou uložené.")}<div class=card>${data.seasons.map(s=>`<div class=rank><div class=avatar>${s.sport=="football"?"⚽":"🏒"}</div><div class=grow><div class=name>${e(s.name)}</div><div class=note>${e(s.description||"")}<br>${e(s.status)}${s.active?" • aktivní":""}</div></div></div>`).join("")}</div>`}
async function approve(id){await api("/admin/approve",{method:"POST",body:JSON.stringify({userId:id})});data=await api("/app");render()}
async function setSeason(id){await api("/admin/season",{method:"POST",body:JSON.stringify({seasonId:id})});data=await api("/app");render()}
async function archiveSeason(){await api("/admin/archive",{method:"POST"});data=await api("/app");render()}
async function createSeason(){await api("/admin/create-season",{method:"POST",body:JSON.stringify({name:newName.value,description:newDesc.value,sport:newSport.value})});data=await api("/app");render()}
async function saveSettings(){await api("/admin/settings",{method:"POST",body:JSON.stringify({admin_fee:+af.value,game_fee:+gf.value,split:[s1.value,s2.value,s3.value].map(Number)})});data=await api("/app");alert("Uloženo");render()}
async function addMatch(){await api("/admin/add-match",{method:"POST",body:JSON.stringify({phase:phase.value,home:homeTeam.value,away:awayTeam.value,start_time:startTime.value})});data=await api("/app");render()}
async function setResult(id){let score=prompt("Zadej výsledek např. 4:2");if(!score)return;await api("/admin/result",{method:"POST",body:JSON.stringify({matchId:id,score})});data=await api("/app");render()}
async function toggleStatus(id,status){await api("/admin/status",{method:"POST",body:JSON.stringify({matchId:id,status})});data=await api("/app");render()}
async function bulkImport(){await api("/admin/import",{method:"POST",body:JSON.stringify({text:bulk.value})});data=await api("/app");alert("Import hotový");render()}
function admin(){if(!["admin","superadmin"].includes(me.role))return hero("Admin","Nemáš oprávnění")+`<div class=card>Bez oprávnění.</div>`;return `${hero("Admin","Správa soutěže, zápasů, výsledků a uživatelů.")}<div class=card><div class=title>Soutěže</div>${data.seasons.map(s=>`<div class=rank><div class=avatar>${s.sport=="football"?"⚽":"🏒"}</div><div class=grow><div class=name>${e(s.name)}</div><div class=note>${e(s.status)}${s.active?" • aktivní":""}</div></div><button class="btn ${s.active?"good":"primary"}" onclick="setSeason('${s.id}')">${s.active?"Aktivní":"Zapnout"}</button></div>`).join("")}<button class="btn dark full" onclick=archiveSeason()>Ukončit aktivní soutěž do archivu</button></div><div class=card><div class=title>Nová soutěž</div><input id=newName class=input placeholder="MS ve fotbale 2026"><input id=newDesc class=input placeholder="O co jde"><select id=newSport class=input><option value=hockey>Hokej</option><option value=football>Fotbal</option></select><button class="btn primary full" onclick=createSeason()>Vytvořit</button></div><div class=card><div class=title>Poplatky</div><input id=af class=input type=number value="${data.settings.admin_fee}"><input id=gf class=input type=number value="${data.settings.game_fee}"><div class=grid3><input id=s1 class=input value="${data.settings.split[0]}"><input id=s2 class=input value="${data.settings.split[1]}"><input id=s3 class=input value="${data.settings.split[2]}"></div><button class="btn primary full" onclick=saveSettings()>Uložit</button></div><div class=card><div class=title>Ručně přidat zápas</div><input id=phase class=input placeholder="Fáze, např. Čtvrtfinále"><input id=homeTeam class=input placeholder="Domácí"><input id=awayTeam class=input placeholder="Hosté"><input id=startTime class=input type=datetime-local><button class="btn primary full" onclick=addMatch()>Přidat zápas</button></div><div class=card><div class=title>Hromadný import zápasů</div><p class=note>Formát: datum čas; fáze; domácí; hosté. Jeden zápas na řádek.<br>Příklad: 2026-05-28 16:20; Čtvrtfinále; Kanada; USA</p><textarea id=bulk class=input placeholder="2026-05-28 16:20; Čtvrtfinále; Kanada; USA"></textarea><button class="btn primary full" onclick=bulkImport()>Importovat</button></div><div class=card><div class=title>Správa zápasů</div>${data.matches.map(m=>`<div class=match><b>${e(m.home)} vs ${e(m.away)}</b><div class=note>${e(m.phase)} • ${new Date(m.start_time).toLocaleString("cs-CZ")} • ${e(m.status)} ${m.score?"• "+e(m.score):""}</div><div class=grid2><button class=btn onclick="toggleStatus('${m.id}','open')">Otevřít</button><button class=btn onclick="toggleStatus('${m.id}','locked')">Zamknout</button><button class="btn good" onclick="setResult('${m.id}')">Výsledek</button><button class="btn dark" onclick="toggleStatus('${m.id}','finished')">Dohráno</button></div></div>`).join("")}</div><div class=card><div class=title>Čekající uživatelé</div>${data.pending.map(u=>`<div class=rank><div class=avatar>${e(u.avatar)}</div><div class=grow><div class=name>${e(u.name)}</div><div class=note>${e(u.email)}</div></div><button class="btn good" onclick="approve('${u.id}')">Aktivovat</button></div>`).join("")||"<div class='notice ok'>Nikdo nečeká.</div>"}</div>`}
function render(){if(!me)return root.innerHTML=loginScreen();let pages={home,tips,rank,archive,admin};root.innerHTML=`<div class=app>${(pages[page]||home)()}</div>`+nav()}load();
</script></body></html>
