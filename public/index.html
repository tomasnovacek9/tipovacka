<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tipovačka</title>
<style>
body{margin:0;background:#f4f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:#111;padding-bottom:80px}
.app{max-width:520px;margin:auto}.hero{margin:14px;padding:18px;border-radius:26px;background:linear-gradient(135deg,#0f172a,#2563eb);color:white}.big{font-size:32px;font-weight:900}
.card{background:white;margin:14px;padding:16px;border-radius:22px;box-shadow:0 10px 30px #0001}.muted{color:#667085;font-size:13px}.input{width:100%;box-sizing:border-box;padding:13px;margin:6px 0;border:1px solid #ddd;border-radius:14px}.btn{width:100%;border:0;border-radius:14px;padding:13px;margin-top:8px;background:#2563eb;color:white;font-weight:900}.btn2{background:#e8f0ff;color:#1d4ed8}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.tip{border:0;border-radius:14px;padding:13px;background:#e8f0ff;color:#1d4ed8;font-weight:900}.tip.on{background:#2563eb;color:white}.notice{padding:12px;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:16px}.ok{background:#ecfdf3;color:#027a48;border-color:#bbf7d0}.rank{display:flex;gap:10px;align-items:center;border-bottom:1px solid #eee;padding:10px 0}.ava{width:38px;height:38px;border-radius:50%;background:#2563eb;color:white;display:flex;align-items:center;justify-content:center;font-weight:900}.grow{flex:1}.bottom{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(500px,calc(100% - 16px));background:white;border-radius:22px;box-shadow:0 10px 30px #0002;display:grid;grid-template-columns:repeat(4,1fr);padding:6px}.bottom button{border:0;background:white;border-radius:15px;padding:8px;font-weight:800;color:#667085}.bottom .on{background:#e8f0ff;color:#1d4ed8}.hide{display:none}
</style>
</head>
<body>
<div id="root"><div class="app"><div class="hero"><div class="big">Tipovačka</div><div>Načítám…</div></div></div></div>

<script>
const API="/api";
let token=localStorage.getItem("tipovacka_token")||"";
let me=null,data=null,page="home";

function $(id){return document.getElementById(id)}
function esc(s){return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]))}

async function api(path,opts={}){
  const headers={"content-type":"application/json"};
  if(token) headers.authorization="Bearer "+token;
  const res=await fetch(API+path,{...opts,headers});
  const text=await res.text();
  let json={};
  try{json=text?JSON.parse(text):{}}catch(e){throw new Error("API nevrátilo JSON. Zkontroluj Cloudflare Functions.");}
  if(!res.ok) throw new Error(json.error||"Chyba API");
  return json;
}

async function load(){
  try{
    me=(await api("/me")).user;
    data=await api("/app");
  }catch(e){
    me=null;data=null;
  }
  render();
}

function nav(){
  if(!me)return "";
  const admin=me.role==="admin"||me.role==="superadmin";
  return `<div class="bottom">
    <button class="${page==="home"?"on":""}" onclick="go('home')">🏠<br>Domů</button>
    <button class="${page==="tips"?"on":""}" onclick="go('tips')">🏒<br>Tipy</button>
    <button class="${page==="rank"?"on":""}" onclick="go('rank')">🏆<br>Pořadí</button>
    ${admin?`<button class="${page==="admin"?"on":""}" onclick="go('admin')">⚙️<br>Admin</button>`:`<button onclick="logout()">🚪<br>Ven</button>`}
  </div>`;
}
function go(p){page=p;render()}
function logout(){localStorage.removeItem("tipovacka_token");token="";me=null;data=null;render()}

function loginScreen(message=""){
  return `<div class="app">
    <div class="hero"><div class="big">🏒 Tipovačka</div><div>Reálné přihlášení přes Cloudflare D1</div></div>
    <div class="card">
      ${message?`<div class="notice">${esc(message)}</div>`:""}
      <input id="email" class="input" value="admin@demo.cz" placeholder="E-mail">
      <input id="password" class="input" type="password" value="admin123" placeholder="Heslo">
      <button class="btn" onclick="login()">Přihlásit</button>
      <button class="btn btn2" onclick="$('reg').classList.toggle('hide')">Registrace</button>
      <div id="reg" class="hide">
        <input id="rname" class="input" placeholder="Jméno">
        <input id="remail" class="input" placeholder="E-mail">
        <input id="rpass" class="input" type="password" placeholder="Heslo">
        <button class="btn" onclick="register()">Registrovat</button>
      </div>
      <p class="muted">Admin: admin@demo.cz / admin123<br>Hráč: tomas@demo.cz / 1234</p>
    </div>
  </div>`;
}

async function login(){
  try{
    const r=await api("/auth/login",{method:"POST",body:JSON.stringify({email:$("email").value,password:$("password").value})});
    token=r.token;localStorage.setItem("tipovacka_token",token);await load();
  }catch(e){document.getElementById("root").innerHTML=loginScreen(e.message)}
}
async function register(){
  try{
    const r=await api("/auth/register",{method:"POST",body:JSON.stringify({name:$("rname").value,email:$("remail").value,password:$("rpass").value})});
    token=r.token;localStorage.setItem("tipovacka_token",token);await load();
  }catch(e){alert(e.message)}
}

function home(){
  const s=data.season||{},pool=data.pool||{players:0,game:0};
  return `<div class="app">
    <div class="hero"><div class="big">Tipovačka</div><div>${esc(s.name||"Aktivní soutěž")}<br>${pool.players} hráčů • bank ${pool.game} Kč</div></div>
    <div class="card">${me.approved&&me.paid?`<div class="notice ok">✅ Účet aktivní. Můžeš tipovat.</div>`:`<div class="notice">⏳ Čekáš na aktivaci adminem po zaplacení.</div>`}</div>
    <div class="card"><h3>O co se hraje</h3><p class="muted">Výhry se počítají z poplatku do hry. Nastavení upraví admin.</p></div>
  </div>`;
}

async function setBet(id,pick){
  try{await api("/bets",{method:"POST",body:JSON.stringify({matchId:id,pick})});data=await api("/app");render()}catch(e){alert(e.message)}
}

function tips(){
  const matches=data.matches||[];
  return `<div class="app"><div class="card"><h2>Tipy</h2><p class="muted">Tipuje se pouze 1 / X / 2.</p></div>
  ${matches.length?matches.map(m=>{
    const b=(data.bets||[]).find(x=>x.match_id===m.id);
    const locked=m.status!=="open"||!me.approved||!me.paid;
    return `<div class="card">
      <b>${esc(m.phase||"Zápas")}</b><br>
      <span class="muted">${m.start_time?new Date(m.start_time).toLocaleString("cs-CZ"):""}</span>
      <h3>${esc(m.home)} vs ${esc(m.away)}</h3>
      <div class="grid3">
        ${["1","X","2"].map(p=>`<button ${locked?"disabled":""} class="tip ${b&&b.pick===p?"on":""}" onclick="setBet('${m.id}','${p}')">${p}</button>`).join("")}
      </div>
      <p class="muted">${esc(m.info||"")} ${m.score?`Výsledek: ${esc(m.score)}`:""}</p>
    </div>`}).join(""):`<div class="card"><div class="notice">Zatím nejsou zápasy.</div></div>`}</div>`;
}

function rank(){
  return `<div class="app"><div class="card"><h2>Pořadí</h2>${(data.ranking||[]).map((u,i)=>`
    <div class="rank"><div>${i+1}.</div><div class="ava">${esc(u.avatar)}</div><div class="grow"><b>${esc(u.name)}</b><div class="muted">${esc(u.email)}</div></div><b>${u.points}</b></div>`).join("")}</div></div>`;
}

async function approve(id){await api("/admin/approve",{method:"POST",body:JSON.stringify({userId:id})});data=await api("/app");render()}
async function syncApi(){try{const r=await api("/admin/sync",{method:"POST"});alert("Hotovo. Načteno: "+(r.imported||0));data=await api("/app");render()}catch(e){alert(e.message)}}
async function addMatch(){
  try{
    await api("/admin/add-match",{method:"POST",body:JSON.stringify({phase:$("phase").value,home:$("home").value,away:$("away").value,start_time:$("start").value})});
    data=await api("/app");render();
  }catch(e){alert(e.message)}
}

function admin(){
  return `<div class="app">
    <div class="card"><h2>Admin</h2><button class="btn" onclick="syncApi()">Načíst z API</button></div>
    <div class="card"><h3>Ručně přidat zápas</h3>
      <input id="phase" class="input" placeholder="Fáze">
      <input id="home" class="input" placeholder="Domácí">
      <input id="away" class="input" placeholder="Hosté">
      <input id="start" class="input" type="datetime-local">
      <button class="btn" onclick="addMatch()">Přidat zápas</button>
    </div>
    <div class="card"><h3>Čekající uživatelé</h3>
      ${(data.pending||[]).map(u=>`<div class="rank"><div class="ava">${esc(u.avatar)}</div><div class="grow"><b>${esc(u.name)}</b><div class="muted">${esc(u.email)}</div></div><button onclick="approve('${u.id}')">Aktivovat</button></div>`).join("")||"<p class='muted'>Nikdo nečeká.</p>"}
    </div>
  </div>`;
}

function render(){
  if(!me){document.getElementById("root").innerHTML=loginScreen();return}
  const pages={home,tips,rank,admin};
  document.getElementById("root").innerHTML=(pages[page]||home)()+nav();
}
load();
</script>
</body>
</html>
