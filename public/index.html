<!doctype html><html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tipovačka</title><style>body{margin:0;background:#f4f7fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#101828;padding-bottom:90px}.app{max-width:740px;margin:auto}.hero{margin:14px;padding:20px;border-radius:28px;background:linear-gradient(135deg,#0f172a,#2563eb);color:white}.big{font-size:34px;font-weight:950}.card{background:white;margin:12px 14px;padding:16px;border-radius:22px;box-shadow:0 10px 26px #0001}.input{width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:14px;padding:12px;margin:6px 0}.btn{border:0;border-radius:14px;padding:12px;font-weight:900;background:#e8f0ff;color:#1d4ed8}.btn.primary{background:#2563eb;color:white}.btn.good{background:#dcfce7;color:#166534}.btn.dark{background:#111827;color:white}.full{width:100%}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.notice{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:16px;padding:12px}.ok{background:#ecfdf3;color:#027a48;border-color:#bbf7d0}.bad{background:#fef2f2;color:#991b1b;border-color:#fecaca}.note{font-size:13px;color:#667085}.title{font-size:21px;font-weight:950;margin-bottom:10px}.match{border:1px solid #eee;border-radius:18px;padding:13px;margin:10px 0;background:#fbfcff}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:12px 0}.team{text-align:center;font-weight:900}.score{font-size:28px;font-weight:950}.tip{border:0;border-radius:15px;padding:12px;background:#e8f0ff;color:#1d4ed8;font-weight:900}.tip.active{background:#2563eb;color:white}.tip:disabled{opacity:.45}.badge{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.open{background:#ecfdf3;color:#027a48}.locked{background:#fff7ed;color:#c2410c}.done{background:#f2f4f7;color:#475467}.rank{display:flex;align-items:center;gap:12px;border-bottom:1px solid #eee;padding:11px 0}.avatar{width:42px;height:42px;border-radius:50%;background:#2563eb;color:white;display:flex;align-items:center;justify-content:center;font-weight:900}.grow{flex:1}.points{font-weight:950;font-size:18px}.bottom{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(720px,calc(100% - 16px));background:white;border-radius:24px;box-shadow:0 12px 30px #0002;display:grid;grid-template-columns:repeat(5,1fr);padding:7px}.bottom button{border:0;background:white;border-radius:16px;padding:8px 2px;font-size:11px;font-weight:900;color:#667085}.bottom .on{background:#e8f0ff;color:#1d4ed8}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.login-card{background:white;width:100%;max-width:430px;border-radius:26px;padding:18px;box-shadow:0 18px 44px #0002}.hide{display:none}.table{width:100%;border-collapse:collapse}.table td{border-bottom:1px solid #eee;padding:9px 4px}.right{text-align:right}textarea.input{min-height:120px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px}</style></head><body><div id="root"></div><script>const API='/api';let tok=localStorage.tip_v6||'',me=null,data=null,page='home',msg='',filter='all';const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));async function api(p,o={}){let h={'content-type':'application/json'};if(tok)h.authorization='Bearer '+tok;let r=await fetch(API+p,{...o,headers:h}),t=await r.text(),j={};try{j=t?JSON.parse(t):{}}catch{throw Error('Server nevrátil JSON: '+t.slice(0,120))}if(!r.ok)throw Error(j.error||'Chyba API');return j}async function load(){try{me=(await api('/me')).user;data=await api('/app')}catch(e){localStorage.removeItem('tip_v6');tok='';me=null;data=null}render()}function go(p){page=p;render()}function out(){localStorage.removeItem('tip_v6');tok='';me=null;data=null;render()}function nav(){if(!me)return'';let admin=['admin','superadmin'].includes(me.role),it=[['home','🏠','Domů'],['tips','🏒','Tipy'],['rank','🏆','Pořadí'],['rules','📜','Pravidla'],['admin','⚙️','Admin']];return `<div class=bottom>${it.map(i=>i[0]=='admin'&&!admin?'':`<button class="${page==i[0]?'on':''}" onclick="go('${i[0]}')">${i[1]}<br>${i[2]}</button>`).join('')}</div>`}function loginScreen(){return `<div class=login><div class=login-card><h1>🏒 Tipovačka</h1><p class=note>Přihlášení jménem a heslem.</p>${msg?`<div class="notice bad">${esc(msg)}</div>`:''}<input id=ln class=input placeholder="Jméno"><input id=lp class=input type=password placeholder="Heslo"><button class="btn primary full" onclick=login()>Přihlásit</button><button class="btn full" onclick="reg.classList.toggle('hide')">Registrace</button><div id=reg class=hide><input id=code class=input placeholder="Vstupní kód"><input id=rn class=input placeholder="Jméno"><input id=rp class=input type=password placeholder="Heslo"><button class="btn primary full" onclick=register()>Registrovat</button></div><p class=note>Vstupní kód dostaneš od admina.</p></div></div>`}async function login(){try{msg='';let r=await api('/auth/login',{method:'POST',body:JSON.stringify({name:ln.value,password:lp.value})});tok=r.token;localStorage.tip_v6=tok;await load()}catch(e){msg=e.message;render()}}async function register(){try{msg='';let r=await api('/auth/register',{method:'POST',body:JSON.stringify({code:code.value,name:rn.value,password:rp.value})});tok=r.token;localStorage.tip_v6=tok;await load()}catch(e){msg=e.message;render()}}function hero(t,s){return `<div class=hero><div class=big>${t}</div><div>${s}</div></div>`}function left(m){let d=new Date(m.start_time)-new Date();if(d<=0)return'uzamčeno';let min=Math.floor(d/60000),h=Math.floor(min/60),days=Math.floor(h/24);if(days>0)return`za ${days} d ${h%24} h`;return h?`za ${h} h ${min%60} min`:`za ${min} min`}function badge(m){return m.effective_status=='open'?`<span class="badge open">lze tipovat</span>`:m.effective_status=='finished'?`<span class="badge done">dohráno</span>`:`<span class="badge locked">zamčeno</span>`}function home(){let p=data.pool,pay=data.settings.admin_fee+data.settings.game_fee;return hero('Tipovačka',`${esc(data.season.name)}<br>${p.players} hráčů • bank ${p.game} Kč`)+`<div class=card>${me.approved&&me.paid?`<div class="notice ok">✅ Účet aktivní.</div>`:`<div class=notice>⏳ Čekáš na aktivaci po zaplacení.</div>`}</div><div class=card><div class=title>Platba</div>Celkem <b>${pay} Kč</b><br>Účet: <b>${esc(data.settings.bank_account)}</b><br>Poznámka: <b>${esc(me.name)}</b></div><div class=card><div class=title>Výhry</div><table class=table>${data.settings.split.map((x,i)=>`<tr><td>${i+1}. místo</td><td>${x}%</td><td class=right>${Math.round(p.game*x/100)} Kč</td></tr>`).join('')}</table></div><div class=card><button class="btn full" onclick=out()>Odhlásit</button></div>`}function matches(){let a=data.matches||[];if(filter!='all')a=a.filter(m=>m.effective_status==filter);return a}async function bet(id,pick){try{await api('/bets',{method:'POST',body:JSON.stringify({matchId:id,pick})});data=await api('/app');render()}catch(e){alert(e.message)}}function tips(){let a=matches();return hero('Tipy','Tipuje se 1 / X / 2. Po začátku se automaticky zamkne.')+`<div class=tabs><button class=btn onclick="filter='all';render()">Vše</button><button class=btn onclick="filter='open';render()">Lze tipovat</button><button class=btn onclick="filter='locked';render()">Zamčené</button><button class=btn onclick="filter='finished';render()">Dohrané</button></div><div class=card>${a.length?a.map(m=>{let b=data.bets.find(x=>x.match_id==m.id),lock=m.effective_status!='open'||!me.approved||!me.paid;return `<div class=match>${badge(m)} <span class=note>${new Date(m.start_time).toLocaleString('cs-CZ')} • ${esc(m.phase)} • ${left(m)}</span><div class=teams><div class=team>${esc(m.home)}</div><div class=score>${m.score?esc(m.score):'VS'}</div><div class=team>${esc(m.away)}</div></div><div class=grid3>${['1','X','2'].map(p=>`<button ${lock?'disabled':''} class="tip ${b&&b.pick==p?'active':''}" onclick="bet('${m.id}','${p}')">${p}</button>`).join('')}</div></div>`}).join(''):`<div class=notice>Zatím nejsou zápasy.</div>`}</div>`}function rank(){return hero('Pořadí','Správný tip = 1 bod.')+`<div class=card>${data.ranking.map((u,i)=>`<div class=rank><div>${i+1}.</div><div class=avatar>${esc(u.avatar)}</div><div class=grow><b>${esc(u.name)}</b></div><div class=points>${u.points}</div></div>`).join('')||'<div class=notice>Zatím nejsou hráči.</div>'}</div>`}function rules(){return hero('Pravidla','Platba, tipování a vyhodnocení.')+`<div class=card><p>Tipuje se <b>1</b> domácí, <b>X</b> remíza, <b>2</b> hosté.</p><p>Tip lze změnit do začátku zápasu.</p><p>Po začátku se zápas automaticky zamkne.</p><p>Správný tip = 1 bod.</p><p>Výsledek zadává admin.</p></div>`}async function approve(id){await api('/admin/approve',{method:'POST',body:JSON.stringify({userId:id})});data=await api('/app');render()}async function saveSettings(){await api('/admin/settings',{method:'POST',body:JSON.stringify({admin_fee:+af.value,game_fee:+gf.value,split:[s1.value,s2.value,s3.value].map(Number),bank_account:bank.value,access_code:access.value})});data=await api('/app');alert('Uloženo');render()}async function addMatch(){await api('/admin/add-match',{method:'POST',body:JSON.stringify({phase:phase.value,home:homeTeam.value,away:awayTeam.value,start_time:startTime.value})});data=await api('/app');render()}async function result(id){let score=prompt('Výsledek např. 4:2');if(!score)return;await api('/admin/result',{method:'POST',body:JSON.stringify({matchId:id,score})});data=await api('/app');render()}async function setStatus(id,status){await api('/admin/status',{method:'POST',body:JSON.stringify({matchId:id,status})});data=await api('/app');render()}async function imp(){await api('/admin/import',{method:'POST',body:JSON.stringify({text:bulk.value})});data=await api('/app');alert('Import hotový');render()}function admin(){if(!['admin','superadmin'].includes(me.role))return hero('Admin','Bez oprávnění');return hero('Admin','Zápasy, výsledky, platby a hráči.')+`<div class=card><div class=title>Nastavení</div><input id=af class=input type=number value="${data.settings.admin_fee}" placeholder="Poplatek adminovi"><input id=gf class=input type=number value="${data.settings.game_fee}" placeholder="Poplatek do hry"><input id=bank class=input value="${esc(data.settings.bank_account)}" placeholder="Účet"><input id=access class=input value="${esc(data.settings.access_code)}" placeholder="Vstupní kód"><div class=grid3><input id=s1 class=input value="${data.settings.split[0]}"><input id=s2 class=input value="${data.settings.split[1]}"><input id=s3 class=input value="${data.settings.split[2]}"></div><button class="btn primary full" onclick=saveSettings()>Uložit</button></div><div class=card><div class=title>Přidat zápas</div><input id=phase class=input placeholder="Fáze"><input id=homeTeam class=input placeholder="Domácí"><input id=awayTeam class=input placeholder="Hosté"><input id=startTime class=input type=datetime-local><button class="btn primary full" onclick=addMatch()>Přidat</button></div><div class=card><div class=title>Import</div><textarea id=bulk class=input placeholder="2026-05-28 16:20; Čtvrtfinále; Kanada; USA"></textarea><button class="btn primary full" onclick=imp()>Importovat</button></div><div class=card><div class=title>Správa zápasů</div>${data.matches.map(m=>`<div class=match><b>${esc(m.home)} vs ${esc(m.away)}</b><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString('cs-CZ')} • ${esc(m.status)} ${m.score?'• '+esc(m.score):''}</div><div class=grid2><button class=btn onclick="setStatus('${m.id}','open')">Otevřít</button><button class=btn onclick="setStatus('${m.id}','locked')">Zamknout</button><button class="btn good" onclick="result('${m.id}')">Výsledek</button><button class=btn onclick="setStatus('${m.id}','finished')">Dohráno</button></div></div>`).join('')||'<div class=notice>Zatím nejsou zápasy.</div>'}</div><div class=card><div class=title>Čekající hráči</div>${data.pending.map(u=>`<div class=rank><div class=avatar>${esc(u.avatar)}</div><div class=grow><b>${esc(u.name)}</b></div><button class="btn good" onclick="approve('${u.id}')">Aktivovat</button></div>`).join('')||"<div class='notice ok'>Nikdo nečeká.</div>"}</div>`}function render(){if(!me)return root.innerHTML=loginScreen();let pages={home,tips,rank,rules,admin};root.innerHTML=`<div class=app>${(pages[page]||home)()}</div>`+nav()}load();</script></body></html>
