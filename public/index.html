<!doctype html><html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0b1220"><title>Tipovačka</title><link rel="manifest" href="/manifest.webmanifest"><link rel="icon" href="/icons/favicon.svg" type="image/svg+xml"><link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"><style>
:root{--bg:#f5f7fb;--card:#fff;--text:#101828;--muted:#667085;--line:#e7eaf0;--dark:#0b1220;--dark2:#111827;--green:#22c55e;--green2:#16a34a;--blue:#2563eb;--red:#dc2626;--amber:#f59e0b;--shadow:0 12px 32px rgba(16,24,40,.10)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text);padding-bottom:96px}.app{max-width:860px;margin:auto}.hero{margin:14px;padding:20px;border-radius:30px;background:radial-gradient(circle at 18% 10%,#1f7a45 0,#0b1220 38%,#07101f 100%);color:white;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;inset:auto -40px -70px auto;width:190px;height:190px;border:28px solid rgba(34,197,94,.18);border-radius:50%}.brand{display:flex;align-items:center;gap:12px}.brand svg{width:58px;height:58px;filter:drop-shadow(0 10px 20px rgba(0,0,0,.25))}.big{font-size:34px;font-weight:950;letter-spacing:-.04em}.sub{color:#d1fae5;font-weight:700}.wc{display:inline-flex;align-items:center;gap:8px;margin-top:10px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;color:#fff}.card{background:var(--card);margin:12px 14px;padding:16px;border-radius:24px;box-shadow:var(--shadow);border:1px solid rgba(16,24,40,.04)}.input{width:100%;border:1px solid #d9deea;border-radius:15px;padding:13px 14px;margin:6px 0;background:#fff;font:inherit}.btn{border:0;border-radius:15px;padding:12px 13px;font-weight:950;background:#eef2f7;color:#334155;cursor:pointer}.btn.primary{background:linear-gradient(135deg,var(--green),var(--green2));color:white}.btn.dark{background:var(--dark);color:white}.btn.good{background:#dcfce7;color:#166534}.btn.bad{background:#fee2e2;color:#991b1b}.full{width:100%}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.notice{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:17px;padding:12px;font-weight:650}.ok{background:#ecfdf3;color:#027a48;border-color:#bbf7d0}.badbox{background:#fef2f2;color:#991b1b;border-color:#fecaca}.note{font-size:13px;color:var(--muted)}.title{font-size:21px;font-weight:950;margin-bottom:10px;letter-spacing:-.02em}.match{border:1px solid var(--line);border-radius:20px;padding:14px;margin:10px 0;background:linear-gradient(180deg,#fff,#fbfcff)}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:12px 0}.team{text-align:center;font-weight:950}.flag{font-size:30px}.score{font-size:26px;font-weight:950;min-width:54px;text-align:center}.tip{border:0;border-radius:16px;padding:13px;background:#eef2f7;color:#334155;font-weight:950}.tip.active{background:linear-gradient(135deg,var(--green),var(--green2));color:white;box-shadow:0 8px 18px rgba(34,197,94,.25)}.tip:disabled{opacity:.45}.badge{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:950}.open{background:#ecfdf3;color:#027a48}.locked{background:#fff7ed;color:#c2410c}.done{background:#f2f4f7;color:#475467}.rank{display:flex;align-items:center;gap:12px;border-bottom:1px solid #edf0f5;padding:12px 0}.rank:last-child{border-bottom:0}.avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#111827,#22c55e);color:white;display:flex;align-items:center;justify-content:center;font-weight:950;box-shadow:0 8px 18px rgba(0,0,0,.13)}.grow{flex:1}.points{font-weight:950;font-size:18px}.bottom{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(840px,calc(100% - 16px));background:rgba(255,255,255,.94);backdrop-filter:blur(16px);border:1px solid rgba(16,24,40,.08);border-radius:24px;box-shadow:0 16px 42px rgba(0,0,0,.18);display:grid;grid-template-columns:repeat(5,1fr);padding:7px;z-index:10}.bottom button{border:0;background:transparent;border-radius:17px;padding:8px 2px;font-size:11px;font-weight:950;color:#667085}.bottom .on{background:#dcfce7;color:#166534}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at top,#064e3b,#0b1220 55%,#020617)}.login-card{background:white;width:100%;max-width:450px;border-radius:28px;padding:20px;box-shadow:0 24px 70px rgba(0,0,0,.35)}.hide{display:none}.table{width:100%;border-collapse:collapse}.table td{border-bottom:1px solid #eee;padding:9px 4px}.right{text-align:right}textarea.input{min-height:120px}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 14px}.pill{display:inline-block;background:#dcfce7;color:#166534;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:950;margin:3px}.medal{font-size:24px;width:30px;text-align:center}.paycode{font-size:20px;font-weight:950;letter-spacing:.02em;background:#f1f5f9;border-radius:16px;padding:10px;margin-top:8px}.sync{position:fixed;right:14px;top:10px;background:rgba(17,24,39,.85);color:#fff;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;z-index:20}.sync.okdot:before{content:"● ";color:#22c55e}.sync.errdot:before{content:"● ";color:#ef4444}@media(max-width:560px){.big{font-size:30px}.tabs{grid-template-columns:1fr 1fr}.hero{margin:10px}.card{margin:10px}.teams{grid-template-columns:1fr 50px 1fr}.team{font-size:14px}.bottom{bottom:6px}.grid2,.grid3{gap:6px}}
</style></head><body><div id="root"></div><script>
const API="/api";let tok=localStorage.tip_v20||localStorage.tip_v7||"",me=null,data=null,page="home",msg="",filter="all",syncState="",refreshing=false,lastSig="";
const $=id=>document.getElementById(id),esc=s=>String(s??"").replace(/[&<>\"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
function logo(){return `<svg viewBox="0 0 1024 1024" aria-hidden="true"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111827"/><stop offset="1" stop-color="#020617"/></linearGradient><linearGradient id="gr" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#34d399"/><stop offset="1" stop-color="#22c55e"/></linearGradient></defs><rect x="64" y="64" width="896" height="896" rx="220" fill="url(#g)"/><circle cx="512" cy="512" r="305" fill="none" stroke="url(#gr)" stroke-width="78" stroke-linecap="round" stroke-dasharray="1320 240" transform="rotate(-25 512 512)"/><text x="512" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="235" font-weight="950" fill="#fff">TIP</text><circle cx="778" cy="715" r="118" fill="url(#gr)" stroke="#fff" stroke-width="28"/><path d="M720 714l39 40 82-92" fill="none" stroke="#fff" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
async function api(p,o={}){let h={"content-type":"application/json"};if(tok)h.authorization="Bearer "+tok;let r=await fetch(API+p,{...o,headers:h,cache:'no-store'}),t=await r.text(),j={};try{j=t?JSON.parse(t):{}}catch{throw Error("Server nevrátil JSON: "+t.slice(0,120))}if(!r.ok)throw Error(j.error||"Chyba API");return j}
function sig(d){return JSON.stringify({m:(d.matches||[]).map(x=>[x.id,x.status,x.score,x.confirmed,x.start_time]),u:(d.users||[]).map(x=>[x.id,x.role,x.approved,x.paid,x.nickname,x.points]),r:(d.ranking||[]).map(x=>[x.id,x.points,x.nickname]),b:d.bets})}
async function load(silent=false){if(refreshing)return;refreshing=true;try{me=(await api('/me')).user;let nd=await api('/app');let ns=sig(nd);data=nd;syncState='online';if(!silent||ns!==lastSig){lastSig=ns;render()}}catch(e){syncState='err';if(!silent){localStorage.removeItem('tip_v20');localStorage.removeItem('tip_v7');tok='';me=null;data=null;msg=e.message;render()}}finally{refreshing=false}}
function startLive(){setInterval(()=>{if(tok&&me)load(true)},5000);document.addEventListener('visibilitychange',()=>{if(!document.hidden&&tok&&me)load(true)});window.addEventListener('focus',()=>{if(tok&&me)load(true)})}
function go(p){page=p;render()}function out(){localStorage.removeItem('tip_v20');localStorage.removeItem('tip_v7');tok='';me=null;data=null;render()}
function initials(u){return (u.nickname||u.full_name||'?').trim().slice(0,2).toUpperCase()}function av(u){return `<div class=avatar>${esc(initials(u))}</div>`}
function displayName(u){return esc(u.nickname||u.full_name)}function adminName(u){return `${esc(u.full_name)}${u.nickname?` <span class=note>(${esc(u.nickname)})</span>`:''}`}
function nav(){if(!me)return'';let admin=['admin','superadmin'].includes(me.role),it=[['home','🏠','Domů'],['tips','⚽','Tipy'],['rank','🏆','Pořadí'],['rules','📜','Pravidla'],['admin','⚙️','Admin']];return `<div class=bottom>${it.map(i=>i[0]=='admin'&&!admin?'':`<button class="${page==i[0]?'on':''}" onclick="go('${i[0]}')">${i[1]}<br>${i[2]}</button>`).join('')}</div>`}
function sync(){return me?`<div class="sync ${syncState=='err'?'errdot':'okdot'}">${syncState=='err'?'offline':'živě'}</div>`:''}
function loginScreen(){return `<div class=login><div class=login-card><div class=brand>${logo()}<div><h1 style="margin:0">Tipovačka</h1><div class=note>FIFA WORLD CUP 26</div></div></div><p class=note>Přihlášení jménem a příjmením. Ostatním se zobrazuje hlavně přezdívka.</p>${msg?`<div class="notice badbox">${esc(msg)}</div>`:''}<input id=ln class=input placeholder="Jméno a příjmení"><input id=lp class=input type=password placeholder="Heslo"><button class="btn primary full" onclick=login()>Přihlásit</button><button class="btn full" onclick="reg.classList.toggle('hide')">Registrace</button><div id=reg class=hide><input id=code class=input placeholder="Vstupní kód"><input id=first class=input placeholder="Jméno"><input id=last class=input placeholder="Příjmení"><input id=nick class=input placeholder="Přezdívka zobrazovaná v tipovačce"><input id=phone class=input placeholder="Telefon pro admina"><input id=email class=input type=email placeholder="E-mail pro admina / potíže"><input id=rp class=input type=password placeholder="Heslo"><button class="btn primary full" onclick=register()>Registrovat</button></div><p class=note>Vstupní kód dostaneš od admina.</p></div></div>`}
async function login(){try{msg='';let r=await api('/auth/login',{method:'POST',body:JSON.stringify({name:ln.value,password:lp.value})});tok=r.token;localStorage.tip_v20=tok;await load()}catch(e){msg=e.message;render()}}
async function register(){try{msg='';let r=await api('/auth/register',{method:'POST',body:JSON.stringify({first:first.value,last:last.value,nickname:nick.value,phone:phone.value,email:email.value,password:rp.value,code:code.value})});tok=r.token;localStorage.tip_v20=tok;await load()}catch(e){msg=e.message;render()}}
function hero(t,s){return `<div class=hero><div class=brand>${logo()}<div><div class=big>${t}</div><div class=sub>${s}</div><div class=wc>🏆 FIFA WORLD CUP 26</div></div></div></div>`}
function left(m){let d=new Date(m.start_time)-new Date();if(d<=0)return'uzamčeno';let min=Math.floor(d/60000),h=Math.floor(min/60),days=Math.floor(h/24);if(days>0)return`za ${days} d ${h%24} h`;return h?`za ${h} h ${min%60} min`:`za ${min} min`}
function badge(m){return m.effective_status=='open'?`<span class="badge open">lze tipovat</span>`:m.effective_status=='finished'?`<span class="badge done">dohráno</span>`:`<span class="badge locked">zamčeno</span>`}
function home(){let p=data.pool,pay=(+data.settings.admin_fee||0)+(+data.settings.game_fee||0);return hero('Tipovačka',`${esc(data.season.name)}<br>${p.players} hráčů • bank ${p.game} Kč`)+`<div class=card>${me.role!='player'?`<div class=notice>Jsi admin. Admin netipuje a není v pořadí.</div>`:me.approved&&me.paid?`<div class="notice ok">✅ Účet aktivní.</div>`:`<div class=notice>⏳ Čekáš na aktivaci po zaplacení.</div>`}</div><div class=card><div class=title>Platba</div>Celkem <b>${pay} Kč</b><br>Účet: <b>${esc(data.settings.bank_account)}</b><div class=note>Do zprávy / poznámky pro příjemce uveď:</div><div class=paycode>${esc(me.payment_note||me.nickname||me.full_name)}</div></div><div class=card><div class=title>Výhry</div><table class=table>${data.settings.split.map((x,i)=>`<tr><td>${i+1}. místo</td><td>${x}%</td><td class=right>${Math.round(p.game*x/100)} Kč</td></tr>`).join('')}</table></div><div class=card><button class="btn full" onclick=out()>Odhlásit</button></div>`}
function matches(){let a=data.matches||[];if(filter!='all')a=a.filter(m=>m.effective_status==filter);return a}
async function bet(id,pick){try{await api('/bets',{method:'POST',body:JSON.stringify({matchId:id,pick})});await load(true);render()}catch(e){alert(e.message)}}
function tips(){let a=matches();return hero('Tipy','Tipuje se 1 / X / 2. Změny se samy aktualizují.')+`<div class=tabs><button class=btn onclick="filter='all';render()">Vše</button><button class=btn onclick="filter='open';render()">Lze tipovat</button><button class=btn onclick="filter='locked';render()">Zamčené</button><button class=btn onclick="filter='finished';render()">Dohrané</button></div><div class=card>${a.length?a.map(m=>{let b=data.bets.find(x=>x.match_id==m.id),lock=m.effective_status!='open'||!me.approved||!me.paid||me.role!='player';return `<div class=match>${badge(m)} <span class=note>${new Date(m.start_time).toLocaleString('cs-CZ')} • ${esc(m.phase)} • ${left(m)}</span><div class=teams><div class=team><div class=flag>${esc(m.home_flag||'')}</div>${esc(m.home)}</div><div class=score>${m.score?esc(m.score):'VS'}</div><div class=team><div class=flag>${esc(m.away_flag||'')}</div>${esc(m.away)}</div></div><div class=grid3>${['1','X','2'].map(p=>`<button ${lock?'disabled':''} class="tip ${b&&b.pick==p?'active':''}" onclick="bet('${m.id}','${p}')">${p}</button>`).join('')}</div></div>`}).join(''):`<div class=notice>Zatím nejsou zápasy.</div>`}</div>`}
function rank(){return hero('Pořadí','Veřejně se zobrazuje přezdívka. Admin vidí skutečná jména.')+`<div class=card>${data.ranking.map((u,i)=>`<div class=rank><div class=medal>${i==0?'🥇':i==1?'🥈':i==2?'🥉':i+1+'.'}</div>${av(u)}<div class=grow><b>${displayName(u)}</b><div class=note>${esc(u.role_label||'hráč')}</div></div><div class=points>${u.points}</div></div>`).join('')||'<div class=notice>Zatím nejsou hráči.</div>'}</div>`}
function rules(){return hero('Pravidla','Systém turnaje a tipování.')+`<div class=card><div class=title>Pravidla tipovačky</div><p>Tipuje se <b>1</b> domácí, <b>X</b> remíza, <b>2</b> hosté.</p><p>Tip lze změnit do začátku zápasu. Změny od admina se načítají automaticky.</p><p>Admin zadá výsledek a body se spočítají automaticky.</p></div><div class=card><div class=title>Systém MS 2026</div><p>48 týmů, 12 skupin po 4 týmech, potom vyřazovací část.</p><span class=pill>Skupiny</span><span class=pill>32 postupujících</span><span class=pill>Osmifinále</span><span class=pill>Čtvrtfinále</span><span class=pill>Semifinále</span><span class=pill>Finále</span></div>`}
async function approve(id){await api('/admin/approve',{method:'POST',body:JSON.stringify({userId:id})});await load(true);render()}async function togglePaid(id,paid){await api('/admin/paid',{method:'POST',body:JSON.stringify({userId:id,paid})});await load(true);render()}async function role(id,role){await api('/admin/role',{method:'POST',body:JSON.stringify({userId:id,role})});await load(true);render()}
async function saveSettings(){await api('/admin/settings',{method:'POST',body:JSON.stringify({admin_fee:+af.value,game_fee:+gf.value,split:[s1.value,s2.value,s3.value].map(Number),bank_account:bank.value,access_code:access.value})});await load(true);alert('Uloženo');render()}
async function addMatch(){await api('/admin/add-match',{method:'POST',body:JSON.stringify({phase:phase.value,home:homeTeam.value,away:awayTeam.value,home_flag:homeFlag.value,away_flag:awayFlag.value,start_time:startTime.value})});await load(true);render()}
async function result(id){let score=prompt('Výsledek např. 4:2');if(!score)return;await api('/admin/result',{method:'POST',body:JSON.stringify({matchId:id,score})});await load(true);render()}async function setStatus(id,status){await api('/admin/status',{method:'POST',body:JSON.stringify({matchId:id,status})});await load(true);render()}async function imp(){await api('/admin/import',{method:'POST',body:JSON.stringify({text:bulk.value})});await load(true);alert('Import hotový');render()}
function admin(){if(!['admin','superadmin'].includes(me.role))return hero('Admin','Bez oprávnění');return hero('Admin','Zápasy, výsledky, role, platby a hráči.')+`<div class=card><div class=title>Nastavení</div><input id=af class=input type=number value="${data.settings.admin_fee}" placeholder="Poplatek adminovi"><input id=gf class=input type=number value="${data.settings.game_fee}" placeholder="Poplatek do hry"><input id=bank class=input value="${esc(data.settings.bank_account)}" placeholder="Účet"><input id=access class=input value="${esc(data.settings.access_code)}" placeholder="Vstupní kód"><div class=grid3><input id=s1 class=input value="${data.settings.split[0]}"><input id=s2 class=input value="${data.settings.split[1]}"><input id=s3 class=input value="${data.settings.split[2]}"></div><button class="btn primary full" onclick=saveSettings()>Uložit</button></div><div class=card><div class=title>Přidat zápas</div><input id=phase class=input placeholder="Fáze / skupina"><input id=homeTeam class=input placeholder="Domácí"><input id=homeFlag class=input placeholder="Vlajka domácí"><input id=awayTeam class=input placeholder="Hosté"><input id=awayFlag class=input placeholder="Vlajka hosté"><input id=startTime class=input type=datetime-local><button class="btn primary full" onclick=addMatch()>Přidat</button></div><div class=card><div class=title>Import zápasů</div><p class=note>Formát: datum čas; fáze; domácí; vlajka domácí; hosté; vlajka hosté</p><textarea id=bulk class=input placeholder="2026-06-11 21:00; Skupina A; Mexiko; 🇲🇽; Jihoafrická republika; 🇿🇦"></textarea><button class="btn primary full" onclick=imp()>Importovat</button></div><div class=card><div class=title>Správa zápasů</div>${data.matches.map(m=>`<div class=match><b>${esc(m.home_flag||'')} ${esc(m.home)} vs ${esc(m.away_flag||'')} ${esc(m.away)}</b><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString('cs-CZ')} • ${esc(m.status)} ${m.score?'• '+esc(m.score):''}</div><div class=grid2><button class=btn onclick="setStatus('${m.id}','open')">Otevřít</button><button class=btn onclick="setStatus('${m.id}','locked')">Zamknout</button><button class="btn good" onclick="result('${m.id}')">Výsledek</button><button class=btn onclick="setStatus('${m.id}','finished')">Dohráno</button></div></div>`).join('')||'<div class=notice>Zatím nejsou zápasy.</div>'}</div><div class=card><div class=title>Hráči, platby a role</div>${data.users.map(u=>`<div class=rank>${av(u)}<div class=grow><b>${adminName(u)}</b><div class=note>${esc(u.role)} • ${u.approved?'aktivní':'čeká'} • ${u.paid?'zaplaceno':'nezaplaceno'}<br>${u.phone?`☎ ${esc(u.phone)} `:''}${u.email?`✉ ${esc(u.email)} `:''}<br>Platba: <b>${esc(u.payment_note||'')}</b></div></div><button class="btn good" onclick="approve('${u.id}')">Aktivovat</button><button class=btn onclick="togglePaid('${u.id}',${u.paid?0:1})">${u.paid?'Nezapl.':'Zapl.'}</button><button class=btn onclick="role('${u.id}','player')">Hráč</button><button class=btn onclick="role('${u.id}','admin')">Admin</button></div>`).join('')}</div>`}
function render(){if(!me||!data)return root.innerHTML=loginScreen();let pages={home,tips,rank,rules,admin};root.innerHTML=sync()+`<div class=app>${(pages[page]||home)()}</div>`+nav()}
startLive();load();
</script></body></html>
