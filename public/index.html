function defaultRulesHtml(){return `<h2>Pravidla a návod k tipovačce</h2><p>Vítej v tipovačce k soutěži <b>FIFA World Cup 2026</b>. Tipuješ přesné výsledky zápasů, sbíráš body a porovnáváš se s ostatními tipéry. Aplikace průběžně ukazuje tvoje body, pořadí, uložené tipy i výsledky ostatních hráčů po uzamčení zápasu.</p><div class=rules-toc><a href="#rules-tipovani">⚽ Jak tipovat</a><a href="#rules-body">🎯 Bodování</a><a href="#rules-ostatni">👥 Tipy ostatních</a><a href="#rules-poradi">📊 Pořadí</a><a href="#rules-zapasy">🗓️ Zápasy</a><a href="#rules-platba">💳 Platba</a><a href="#rules-instalace">📱 Přidání na plochu</a></div><h2 id=rules-tipovani>⚽ Jak tipovat</h2><ul><li>U každého zápasu zadáš přesný výsledek, například <b>2 : 1</b>.</li><li>Tip můžeš před výkopem kdykoliv změnit.</li><li>Po začátku utkání se tipování automaticky uzamkne.</li><li>Pokud zápas nestihneš tipnout, za tento zápas získáš 0 bodů.</li></ul><div class=example><b>Příklad tipu:</b><br>Česko – Německo<br>Tvůj tip: <b>2 : 1</b></div><h2 id=rules-body>🎯 Bodování</h2><h3>Přesný výsledek – 3 body</h3><p>Když trefíš přesné skóre zápasu, získáš <b>3 body</b>.</p><div class=example>Tip: 2 : 1<br>Výsledek: 2 : 1<br><b>+3 body</b></div><h3>Trefená výhra/remíza/prohra – 1 bod</h3><p>Když netrefíš přesné skóre, ale správně určíš, jestli vyhraje domácí tým, hostující tým nebo bude remíza, získáš <b>1 bod</b>.</p><div class=example>Tip: 3 : 1<br>Výsledek: 2 : 1<br>Trefený vítěz<br><b>+1 bod</b></div><h3>Špatný tip – 0 bodů</h3><p>Když netrefíš vítěze/remízu ani přesné skóre, nezískáváš žádný bod.</p><h2 id=rules-ostatni>👥 Tipy ostatních hráčů</h2><ul><li>Před uzavřením tipování vidíš pouze svůj vlastní tip.</li><li>Po uzamčení zápasu se zobrazí tipy ostatních hráčů.</li><li>Po vyhodnocení zápasu uvidíš všechny tipy, skutečný výsledek a přidělené body.</li><li>Tím je zajištěno, že nikdo nemůže před začátkem utkání opisovat tipy ostatních.</li></ul><h2 id=rules-poradi>📊 Pořadí a tabulka</h2><p>Pořadí se aktualizuje automaticky po vyhodnocení zápasu administrátorem.</p><ol><li>Nejdříve rozhoduje celkový počet bodů.</li><li>Při shodě rozhoduje počet přesných tipů za 3 body.</li><li>Poté rozhoduje počet trefených výher/remíz/proher za 1 bod.</li><li>Následně rozhoduje úspěšnost tipování.</li><li>Pokud jsou všechny hodnoty shodné, hráči sdílejí stejné pořadí.</li></ol><table><tr><th>Sloupec</th><th>Význam</th></tr><tr><td>1b</td><td>Kolikrát hráč trefil výhru, remízu nebo prohru.</td></tr><tr><td>3b</td><td>Kolikrát hráč trefil přesný výsledek.</td></tr><tr><td>Body</td><td>Celkový počet bodů.</td></tr></table><p>Počet vyhodnocených tipů a úspěšnost najdeš v dashboardu a v profilu hráče. V hlavní tabulce pořadí zůstávají jen nejdůležitější údaje, aby byla dobře čitelná na telefonu.</p><h2 id=rules-zapasy>🗓️ Zápasy a fáze turnaje</h2><ul><li>Skupinová fáze obsahuje <b>72 zápasů</b> – skupiny A až L, každá skupina má 6 utkání.</li><li>Vyřazovací část obsahuje <b>32 zápasů</b>.</li><li>U skupin jsou týmy, vlajky a termíny předpřipravené.</li><li>U vyřazovací části jsou předpřipravené termíny a pozice. Konkrétní týmy se doplní až po postupu ze skupin.</li><li>Administrátor může později doplnit nebo upravit týmy ve vyřazovací části bez zásahu do celé aplikace.</li></ul><h2>👤 Účet a přezdívka</h2><ul><li>Při registraci zadáváš jméno, příjmení, přezdívku, e-mail a heslo.</li><li>Ostatní hráči vidí pouze tvoji přezdívku.</li><li>Jméno, příjmení a e-mail vidí pouze administrátor.</li><li>Každý hráč může mít pouze jeden účet.</li></ul><h2 id=rules-platba>💳 Platba a aktivace účtu</h2><ul><li>Po registraci účet čeká na aktivaci.</li><li>Pokyny k platbě najdeš po přihlášení v sekci <b>Profil</b>.</li><li>Do zprávy pro příjemce uveď svůj údaj do platby, například <b>TIP-KANONYR89</b>.</li><li>Po spárování platby administrátor účet aktivuje.</li><li>Tipovat a soutěžit mohou pouze aktivované účty.</li></ul><h2>🔄 Vyhodnocení zápasů</h2><ul><li>Výsledky zadává administrátor.</li><li>Po zadání function upcomingMissingMatches(){
  const now=new Date();
  return (data.matches||[])
    .filter(m=>m.effective_status==='open' && new Date(m.start_time)>now && !(data.bets||[]).find(b=>b.match_id===m.id))
    .sort((a,b)=>new Date(a.start_time)-new Date(b.start_time));
}
function nextOpenMatch(){
  const now=new Date();
  return (data.matches||[]).filter(m=>m.effective_status==='open' && new Date(m.start_time)>now).sort((a,b)=>new Date(a.start_time)-new Date(b.start_time))[0];
}
function lastFinishedMatch(){
  return (data.matches||[]).filter(m=>m.score || m.effective_status==='finished').sort((a,b)=>new Date(b.start_time)-new Date(a.start_time))[0];
}

async function withBusy(label, fn){
  const btn=document.activeElement && document.activeElement.tagName==='BUTTON' ? document.activeElement : null;
  if(btn){btn.classList.add('busy');btn.disabled=true;btn.setAttribute('aria-busy','true')}

  finally{if(btn){btn.classList.remove('busy');btn.disabled=false;btn.removeAttribute('aria-busy')}}
}

function profile(){
  let u=data.meStats||me||{};
  let pos=(data.ranking||[]).findIndex(x=>x.id==u.id)+1;
  let evaluated=u.evaluated_count||0, tips=u.tips_count||0;
  let pct=evaluated?Math.round(((u.hit_1||0)+(u.hit_3||0))/evaluated*100):0;
  let nick=u.public_name||u.nick||me.public_name||me.nick||me.full_name||'Hráč';
  return `<div class="card profile-hero"><div><div class=profile-nick>${esc(nick)}</div><div class=profile-real>${esc(me.first||'')} ${esc(me.last||'')} ${me.email?'• '+esc(me.email):''}</div></div><div><span class=role-chip>${roleLabel(me.role)}</span></div></div>

  <div class=card><div class=profile-data><div class=data-row><span>jméno</span><b>${esc(me.first||'—')}</b></div><div class=data-row><span>příjmení</span><b>${esc(me.last||'—')}</b></div><div class=data-row><span>přezdívka</span><b>${esc(nick)}</b></div><div class=data-row><span>e-mail</span><b>${esc(me.email||'—')}</b></div><div class=data-row><span>role</span><b>${roleLabel(me.role)}</b></div><div class=data-row><span>stav účtu</span><b>${me.approved&&me.paid?'aktivní':'čeká na aktivaci'}</b></div><div class=data-row><span>údaj do platby</span><b>${esc(me.payment_note||'TIP')}</b></div><div class=data-row><span>veřejně viditelné</span><b>jen přezdívka</b></div></div><button class="btn danger full" style="margin-top:14px" onclick=out()>Odhlásit</button></div>`;

function setAdminTab(tab){
  adminTab=tab;
  document.querySelectorAll('.admin-panel').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.admin-tab').forEach(x=>x.classList.remove('active'));
  let p=document.getElementById('admin-'+tab), b=document.getElementById('tab-'+tab);
  if(p)p.classList.add('active'); if(b)b.classList.add('active');
}
async function saveSettings(){
  try{
    const btn=document.getElementById('saveSettingsBtn'); if(btn){btn.disabled=true;btn.classList.add('busy')}
    await api('/admin/settings',{method:'POST',body:JSON.stringify({
      admin_fee:+af.value||0,
      game_fee:+gf.value||0,
      bank_account:bank.value,
      access_code:access.value,
      rules_html:rulesText.value,
      competition_name:compName.value,
      competition_subtitle:compSub.value,
      competition_logo_url:''
    })});
    const n=document.getElementById('saveNote'); if(n){n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2200)}
    await refreshSilent(true);
  }catch(e){alert(e.message)}
  finally{const btn=document.getElementById('saveSettingsBtn'); if(btn){btn.disabled=false;btn.classList.remove('busy')}}
}

async function refreshSilent(force=false){
  if(!me)return;
  if(Date.now()<editingUntil)return;
  const ae=document.activeElement;
  if(!force && page==='admin' && ae && ['INPUT','TEXTAREA','SELECT'].includes(ae.tagName))return;
  try{data=await api('/app');me=(await api('/me')).user;let sig=renderSignature();if(force||sig!==__lastRenderSignature){render()}}catch(e){}
}

function rank(){
  let top=data.ranking||[];
  let updated=new Date().toLocaleString('cs-CZ');
  return `<div class=card><div class=rank-legend><b>1b</b> trefená výhra/remíza/prohra · <b>3b</b> přesný výsledek · <b>Body</b> určují pořadí</div><div class=rank-table-wrap><div class=rank-table><div class=rank-head><div>#</div><div>Tipér</div><div>1b</div><div>3b</div><div>Body</div></div>${top.length?top.map((u,i)=>`<div class="rank-row ${u.id==me.id?'my-row':''}"><div class=medal>${i==0?'🥇':i==1?'🥈':i==2?'🥉':i+1}</div><div class=rank-nick title="${displayUser(u)}">${displayUser(u)}</div><div class=rank-cell>${u.hit_1||0}</div><div class=rank-cell>${u.hit_3||0}</div><div class="rank-cell rank-total">${u.points||0}</div></div>`).join(''):'<div class=notice>Zatím nejsou vyhodnocené tipy.</div>'}</div></div><div class=note style="margin-top:8px">Aktualizováno: ${updated}</div></div>`
}
function teamSelect(id,selected=''){
  const opts=(data&&data.teamOptions?data.teamOptions:[]).filter(Boolean);
  return `<select id="${id}" class="input" onchange="updateTeamPreview()">${opts.map(t=>`<option value="${esc(t)}" ${t===selected?'selected':''}>${esc(flagOf(t))} ${esc(t)}</option>`).join('')}</select>`;
}
function updateTeamPreview(){
  const box=document.getElementById('teamPreview');
  if(!box)return;
  const h=document.getElementById('homeTeam')?.value||'';
  const a=document.getElementById('awayTeam')?.value||'';
  box.innerHTML=`<div><b>${esc(flagOf(h))}</b><span>${esc(h||'Domácí')}</span></div><strong>VS</strong><div><b>${esc(flagOf(a))}</b><span>${esc(a||'Hosté')}</span></div>`;
}
async function addMatch(){
  await withBusy('Přidávám…',async()=>{
    const home=document.getElementById('homeTeam')?.value||'';
    const away=document.getElementById('awayTeam')?.value||'';
    const start=document.getElementById('startTime')?.value||'';
    const ph=document.getElementById('phaseIn')?.value||'Zápas';
    if(!home||!away){alert('Vyber oba týmy.');return}
    if(home===away){alert('Vyber dva různé týmy.');return}
    if(!start){alert('Doplň datum a čas výkopu. Bez času se zápas nedá správně zobrazit ani uzamknout.');return}
    adminTab='import';
    let r=await api('/admin/add-match',{method:'POST',body:JSON.stringify({phase:ph,home,away,start_time:start})});
    await refreshSilent(true);
    setTimeout(()=>{setAdminTab('import');updateTeamPreview()},0);
    alert(r.exists?'Zápas už v rozpisu existoval, proto se znovu nepřidal.':'Zápas byl přidán. Vlajky se doplnily automaticky.');
  })

ing('cs-CZ')}</b><select id="kh_${m.id}" class=input>${data.teamOptions.map(t=>`<option value="${esc(t)}" ${t==m.home?'selected':''}>${esc(flagOf(t))} ${esc(t)}</option>`).join('')}</select><select id="ka_${m.id}" class=input>${data.teamOptions.map(t=>`<option value="${esc(t)}" ${t==m.away?'selected':''}>${esc(flagOf(t))} ${esc(t)}</option>`).join('')}</select><button class="btn good" onclick="quickTeams('${m.id}','${esc(m.start_time)}','${esc(m.phase)}')">Uložit</button></div>`).join(''):'<div class=notice>Žádný zápas k doplnění.</div>'}</div><div id=admin-import class="admin-panel ${adminTab=='import'?'active':''}"><div class=title>Přidat / importovat zápasy</div><label class=admin-field-label>Fáze</label><select id=phaseIn class=input>${phasesList.map(x=>`<option>${x}</option>`).join('')}</select><label class=admin-field-label>Týmy</label><div class=grid2>${teamSelect('homeTeam')} ${teamSelect('awayTeam')}</div><div id=teamPreview class=admin-match-preview></div><label class=admin-field-label>Datum a čas výkopu</label><input id=startTime class=input type=datetime-local><button class="btn primary full" onclick=addMatch()>Přidat zápas</button><div class=add-match-help>Vyber fázi, domácí a hostující tým a hlavně doplň datum a čas. Vlajky se doplní automaticky podle názvů zemí.</div><hr style="border:0;border-top:1px solid var(--line);margin:16px 0"><p class=note>Hromadný import: 2026-06-11 21:00; Skupina A; Mexiko; Jihoafrická republika</p><textarea id=bulk class=input></textarea><button class="btn primary full" onclick=imp()>Importovat</button></div><div id=admin-all class="admin-panel ${adminTab=='all'?'active':''}"><div class=title>Pokročilá správa zápasů</div><button class="btn good full" onclick=resetSchedule()>Obnovit pevný rozpis MS 2026</button><div class="admin-note">Výsledky zápasů jsou společné pro všechny skupiny.</div>${matches.map(m=>`<div class=match><div class=match-head><b>${esc(m.home_flag||'')} ${esc(m.home)} vs ${esc(m.away_flag||'')} ${esc(m.away)}</b>${badge(m)}</div><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString('cs-CZ')} ${m.score?'• '+esc(m.score):''}</div><div class=admin-actions><button class="btn small" onclick='editMatch(${JSON.stringify(m).replace(/'/g,"&#39;")})'>Upravit</button><button class="btn small" onclick="setStatus('${m.id}','open')">Otevřít</button><button class="btn small" onclick="setStatus('${m.id}','locked')">Zamknout</button><button class="btn good small" onclick="result('${m.id}')">Výsledek</button><button class="btn small" onclick="setStatus('${m.id}','finished')">Dohráno</button></div></div>`).join('')}</div></div>`}

// v72: oprava potvrzení tipu + jasné důvody, proč nejde tipovat
function tipBlockReason(m){
  if(!me) return 'Nejdřív se přihlas.';
  if(me.role!=='player') return 'Admin účet netipuje. Pro test použij běžný aktivovaný účet tipéra.';
  if(!me.approved || !me.paid) return 'Účet ještě není aktivovaný administrátorem.';
  if(!m) return 'Zápas nebyl nalezen.';
  if(m.effective_status==='finished') return 'Zápas už je vyhodnocený.';
  if(m.effective_status==='locked' || new Date(m.start_time)<=new Date()) return 'Tipování už je uzavřené.';
  if(m.effective_status!=='open') return 'Zápas teď není otevřený pro tipování.';
  return '';
}
function finalBetButtonText(m,tipped){
  const reason=tipBlockReason(m);
  if(!reason) return tipped?'Upravit tip':'Potvrdit tip';
  if(me && me.role!=='player') return 'Admin netipuje';
  if(me && (!me.approved||!me.paid)) return 'Čeká na aktivaci';
  if(m && (m.effective_status==='locked'||new Date(m.start_time)<=new Date())) return 'Tipování uzavřeno';
  if(m && m.effective_status==='finished') return 'Vyhodnoceno';
  return 'Nelze tipovat';
}
async function bet(evtOrId,idMaybe){
  const id=typeof evtOrId==='string'?evtOrId:idMaybe;
  const btn=typeof evtOrId==='object' && evtOrId ? evtOrId.currentTarget : null;
  const m=(data.matches||[]).find(x=>x.id==id);
  const reason=tipBlockReason(m);
  if(reason){alert(reason);return;}
  const hEl=document.getElementById('h_'+id), aEl=document.getElementById('a_'+id);
  if(!hEl||!aEl){alert('Nepodařilo se načíst výsledek tipu. Zkus stránku obnovit.');return;}
  const h=Number(hEl.textContent), a=Number(aEl.textContent);
  if(!Number.isFinite(h)||!Number.isFinite(a)||h<0||a<0){alert('Zadej platný výsledek.');return;}
  const done=setLoading(btn||document.activeElement);
  try{
    await api('/bets',{method:'POST',body:JSON.stringify({matchId:id,homeGoals:h,awayGoals:a})});
    delete draftBets['h_'+id];delete draftBets['a_'+id];editingUntil=0;
    await refreshSilent(true);
    const saved=document.createElement('div');
    saved.className='toast-ok';
    saved.textContent='Tip uložen: '+h+':'+a;
    document.body.appendChild(saved);
    setTimeout(()=>saved.remove(),1600);
  }catch(e){alert(e.message||'Tip se nepodařilo uložit.');}
  finally{done&&done();}
}
function tips(){
  let arr=filtered();
  let next=nextUntippedMatch()||nextAnyOpenMatch();
  return filtersHtml()+`<div class=card>${arr.length?arr.map(m=>{
    let b=data.bets.find(x=>x.match_id==m.id)||{}, tipped=!!b.match_id, isNext=next&&m.id===next.id;
    let reason=tipBlockReason(m), lockedForScore=!!reason;
    return `<div class="match ${tipped?'tipped':'missing'} ${isNext?'next-focus':''}"><div class=match-head><div>${badge(m)}</div><div class=note>${new Date(m.start_time).toLocaleString('cs-CZ')} • ${esc(m.phase)} • ${left(m)}</div></div><div class=teams><div class=team><div class=flag>${esc(m.home_flag||'')}</div>${esc(m.home)}</div><div class=score>${m.score?esc(m.score):'VS'}</div><div class=team><div class=flag>${esc(m.away_flag||'')}</div>${esc(m.away)}</div></div><div class=exact>${scoreStepper('h_'+m.id,b.home_goals??0,lockedForScore)}<b>:</b>${scoreStepper('a_'+m.id,b.away_goals??0,lockedForScore)}</div><div class=tip-actions><button class="btn primary full ${reason?'soft-disabled':''}" onclick="bet(event,'${m.id}')">${finalBetButtonText(m,tipped)}</button></div>${reason?`<div class=note style="margin-top:8px;text-align:center">${esc(reason)}</div>`:''}${tipped?`<div class=saved-tip>✓ Uložený tip: ${b.home_goals}:${b.away_goals}</div>`:''}${otherBetsHtml(m)}</div>`
  }).join(''):'<div class=notice>Pro filtr nejsou zápasy.</div>'}</div>`;
}
