function nav(){if(!me)return'';let admin=['admin','superadmin'].includes(me.role);let items=[['home','Domů'],['tips','Zápasy'],['rank','Pořadí'],['rules','Pravidla'],['profile','Profil'],['admin','Admin']];return `<nav class=bottom>${items.map(i=>i[0]=='admin'&&!admin?'':`<button class="${page==i[0]?'on':''}" onclick="go('${i[0]}')">${navIcon(i[0])}<span>${i[1]}</span></button>`).join('')}</nav>`}
function loginScreen(){let cname='FIFA World Cup 2026';return `<div class=login><div class=login-card><div class=login-brand><img src="app-icon.png?v=37" alt="TIP"><div><div class=login-brand-title>Tipovačka</div><div class=login-brand-sub>${cname}</div></div></div><p class="note center">Přihlášení jménem, příjmením a heslem. Veřejně se zobrazuje přezdívka.</p>${msg?`<div class="notice bad">${esc(msg)}</div>`:''}<input id=loginFirst class=input placeholder="Jméno"><input id=loginLast class=input placeholder="Příjmení"><input id=lp class=input type=password placeholder="Heslo"><button class="btn primary full" onclick="setLoading(this,'Přihlašuji…');login()">Přihlásit</button><button class="btn full" onclick="document.getElementById('reg').classList.toggle('hide')">Registrace</button><div id=reg class=hide><div class=grid2><input id=first class=input placeholder="Jméno"><input id=last class=input placeholder="Příjmení"></div><input id=nick class=input placeholder="Přezdívka"><input id=email class=input placeholder="E-mail"><input id=rp class=input type=password placeholder="Heslo"><input id=code class=input placeholder="Vstupní kód"><button class="btn primary full" onclick="setLoading(this,'Registruji…');register()">Registrovat</button></div><p class=note>Admin po registraci uvidí jméno, příjmení, e-mail a údaj do platby.</p></div></div>`}
function setLoading(btn,text){if(!btn)return;btn.dataset.old=btn.innerHTML;btn.classList.add('is-loading');btn.innerHTML=text;btn.disabled=true}
async function login(){try{msg='';let btn=event&&event.target; if(btn)btn.classList.add('loading');let full=(norm(loginFirst.value)+' '+norm(loginLast.value)).trim();let r=await api('/auth/login',{method:'POST',body:JSON.stringify({name:full,password:lp.value})});tok=r.token;localStorage.tip_token=tok;await load()}catch(e){msg=e.message;render()}}
async function register(){try{msg='';let btn=event&&event.target; if(btn)btn.classList.add('loading');let r=await api('/auth/register',{method:'POST',body:JSON.stringify({first:first.value,last:last.value,nick:nick.value,email:email.value,phone:(document.getElementById('phone')?.value||''),password:rp.value,code:code.value})});tok=r.token;localStorage.tip_token=tok;await load()}catch(e){msg=e.message;render()}}
function dateKey(dt){let d=new Date(dt),n=new Date();let t=new Date(n.getFullYear(),n.getMonth(),n.getDate()).getTime();let x=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();return x==t?'today':x==t+86400000?'tomorrow':'other'}
function left(m){let d=new Date(m.start_time)-new Date();if(d<=0)return'uzamčeno';let s=Math.floor(d/1000),days=Math.floor(s/86400);s%=86400;let h=Math.floor(s/3600);s%=3600;let min=Math.floor(s/60);return days?`${days}d ${h}h ${min}m`:`${h}h ${min}m`}
function displayUser(u){return esc(u.nick||u.public_name||u.full_name||'?')}
function roleLabel(r){return r=='admin'?'Admin':r=='superadmin'?'Superadmin':'Tipér'}
function badge(m){let has=data.bets&&data.bets.find(b=>b.match_id==m.id),st=m.effective_status;if(st=='open')return has?`<span class="badge open">tipnuto</span>`:`<span class="badge open">netipnuto</span>`;return st=='finished'?`<span class="badge done">vyhodnoceno</span>`:`<span class="badge locked">zamčeno</span>`}
function phases(){return ['all',...Array.from(new Set((data.matches||[]).map(m=>m.phase))).filter(Boolean)]}
function filtered(){let arr=[...(data.matches||[])];if(filter=='today')arr=arr.filter(m=>dateKey(m.start_time)=='today');if(filter=='tomorrow')arr=arr.filter(m=>dateKey(m.start_time)=='tomorrow');if(filter=='missing')arr=arr.filter(m=>!data.bets.find(b=>b.match_id==m.id)&&m.effective_status=='open');if(filter=='tipped')arr=arr.filter(m=>data.bets.find(b=>b.match_id==m.id));if(filter=='open')arr=arr.filter(m=>m.effective_status=='open');if(filter=='locked')arr=arr.filter(m=>m.effective_status=='locked');if(filter=='finished')arr=arr.filter(m=>m.effective_status=='finished');if(phase!='all')arr=arr.filter(m=>m.phase==phase);return arr}
function scoreStepper(id,val,lock){let v=draftBets[id]??val??0;return `<div class=stepper><button class=btn onclick="step('${id}',-1)" ${lock?'disabled':''}>−</button><div id="${id}" class=stepper-value>${v}</div><button class=btn onclick="step('${id}',1)" ${lock?'disabled':''}>+</button></div>`}
function step(id,delta){let el=document.getElementById(id);if(!el)return;let v=Math.max(0,Number(el.textContent||0)+delta);el.textContent=v;draftBets[id]=v;editingUntil=Date.now()+25000}
async function bet(id){try{let h=Number(document.getElementById('h_'+id).textContent),a=Number(document.getElementById('a_'+id).textContent);await api('/bets',{method:'POST',body:JSON.stringify({matchId:id,homeGoals:h,awayGoals:a})});delete draftBets['h_'+id];delete draftBets['a_'+id];editingUntil=0;await refreshSilent()}catch(e){alert(e.message)}}
function scoreClass(x,m){if(!m.score)return'';let [h,a]=m.score.split(':').map(Number);if(Number(x.home_goals)==h&&Number(x.away_goals)==a)return'exact-hit';let pick=h>a?'1':h<a?'2':'X';return x.pick==pick?'win':''}
function otherBetsHtml(m){let arr=(data.publicBets||[]).filter(x=>x.match_id==m.id);if(m.effective_status=='open')return `<div class=note>Tipy ostatních se zobrazí po uzamčení zápasu.</div>`;return `<div class=others><b>Tipy ostatních</b>${arr.length?arr.map(x=>`<div class=others-row><span>${esc(x.nick||x.public_name)}</span><b class="${scoreClass(x,m)}">${x.home_goals}:${x.away_goals}</b></div>`).join(''):`<div class=note>Nikdo zatím netipoval.</div>`}</div>`}
function filtersHtml(){let items=[['all','Vše'],['open','Otevřené'],['missing','Netipnuté'],['tipped','Tipnuté'],['finished','Vyhodnocené']];return `<div class="card filters-card"><div class=filter-grid>${items.map(x=>`<button class="btn ${filter==x[0]?'active':''}" onclick="filter='${x[0]}';render()">${x[1]}</button>`).join('')}</div><select class="input phase-select" onchange="phase=this.value;render()">${phases().map(p=>`<option value="${esc(p)}" ${phase==p?'selected':''}>${p=='all'?'Všechny skupiny a fáze':esc(p)}</option>`).join('')}</select></div>`}
function home(){let p=data.pool||{};return `<div class=cards><div class="card mini"><b>${p.players||0}</b><span>aktivních hráčů</span></div><div class="card mini"><b>${p.game||0} Kč</b><span>bank hry</span></div><div class="card mini"><b>${data.matches.length}</b><span>zápasů</span></div></div><div class=card>${me.role!='player'?`<div class="notice ok">Admin režim je aktivní.</div>`:me.approved&&me.paid?`<div class="notice ok">Účet je aktivní. Můžeš tipovat.</div>`:`<div class=notice>Účet čeká na aktivaci po platbě.<br><b>Uveď do platby:</b> ${esc(me.payment_note||'TIP-'+me.nick)}</div>`}</div>`}
function tips(){let arr=filtered();return filtersHtml()+`<div class=card>${arr.length?arr.map(m=>{let b=data.bets.find(x=>x.match_id==m.id)||{},lock=m.effective_status!='open'||!me.approved||!me.paid||me.role!='player',tipped=!!b.match_id;return `<div class="match ${tipped?'tipped':'missing'}"><div class=match-head><div>${badge(m)}</div><div class=note>${new Date(m.start_time).toLocaleString('cs-CZ')} • ${esc(m.phase)} • ${left(m)}</div></div><div class=teams><div class=team><div class=flag>${esc(m.home_flag||'')}</div>${esc(m.home)}</div><div class=score>${m.score?esc(m.score):'VS'}</div><div class=team><div class=flag>${esc(m.away_flag||'')}</div>${esc(m.away)}</div></div><div class=exact>${scoreStepper('h_'+m.id,b.home_goals??0,lock)}<b>:</b>${scoreStepper('a_'+m.id,b.away_goals??0,lock)}</div><div class=tip-actions><button class="btn primary full" ${lock?'disabled':''} onclick="bet('${m.id}')">${tipped?'Upravit tip':'Potvrdit tip'}</button></div>${tipped?`<div class=saved-tip>✓ Uložený tip: ${b.home_goals}:${b.away_goals}</div>`:''}${otherBetsHtml(m)}</div>`}).join(''):'<div class=notice>Pro filtr nejsou zápasy.</div>'}</div>`}
function rank(){let top=data.ranking||[];return `<div class="card rank-card">${top.length?`<div class=rank-table-wrap><div class=rank-table><div class=rank-head><div>#</div><div>přezdívka</div><div class=rank-cell>vyhod.<small>tipy</small></div><div class=rank-cell>trefa<small>1 b</small></div><div class=rank-cell>přesně<small>3 b</small></div><div class=rank-cell>celkem</div></div>${top.map((u,i)=>`<div class="rank-row ${u.id==me.id?'my-row':''}"><div class=medal>${i==0?'🥇':i==1?'🥈':i==2?'🥉':i+1}</div><div class=rank-nick>${displayUser(u)}</div><div class=rank-cell>${u.evaluated_count||0}<small>${u.tips_count||0}</small></div><div class="rank-cell winner-hit">${u.hit_1||0}</div><div class="rank-cell exact-hit2">${u.hit_3||0}</div><div class="rank-cell rank-total">${u.points||0}</div></div>`).join('')}</div></div>`:'<div class=notice>Zatím nejsou vyhodnocené tipy.</div>'}</div>`}
function rules(){let r=(data.settings&&data.settings.rules_html)||'';return `<div class=card><div class=title>Pravidla</div><div class=rules-content>${r?r:`<p>Zatím nejsou vyplněná pravidla. Admin je může doplnit v administraci.</p><ul><li>Tipuje se přesný výsledek zápasu.</li><li>Za přesný výsledek jsou 3 body.</li><li>Za správný tip na vítěze/remízu je 1 bod.</li></ul>`}</div></div>`}
async function approve(id){await api('/admin/approve',{method:'POST',body:JSON.stringify({userId:id})});await refreshSilent()}async function deactivate(id){await api('/admin/deactivate',{method:'POST',body:JSON.stringify({userId:id})});await refreshSilent()}async function role(id,r){await api('/admin/role',{method:'POST',body:JSON.stringify({userId:id,role:r})});await refreshSilent()}async function delUser(id){if(confirm('Smazat hráče i jeho tipy?')){await api('/admin/delete-user',{method:'POST',body:JSON.stringify({userId:id})});await refreshSilent()}}async function setStatus(id,st){await api('/admin/status',{method:'POST',body:JSON.stringify({matchId:id,status:st})});await refreshSilent()}async function result(id){let score=prompt('Výsledek např. 2:1');if(score){await api('/admin/result',{method:'POST',body:JSON.stringify({matchId:id,score})});await refreshSilent()}}async function editMatch(m){let home=prompt('Domácí tým',m.home);if(!home)return;let away=prompt('Hostující tým',m.away);if(!away)return;let start_time=prompt('Čas ve formátu 2026-06-11T21:00',m.start_time);if(!start_time)return;let ph=prompt('Fáze/skupina',m.phase)||m.phase;await api('/admin/edit-match',{method:'POST',body:JSON.stringify({matchId:m.id,home,away,start_time,phase:ph})});await refreshSilent()}async function addMatch(){await api('/admin/add-match',{method:'POST',body:JSON.stringify({phase:phaseIn.value,home:homeTeam.value,away:awayTeam.value,start_time:startTime.value})});await refreshSilent()}async function imp(){await api('/admin/import',{method:'POST',body:JSON.stringify({text:bulk.value})});await refreshSilent();alert('Import hotový')}async function saveSettings(){await api('/admin/settings',{method:'POST',body:JSON.stringify({admin_fee:+af.value||0,game_fee:+gf.value||0,bank_account:bank.value,access_code:access.value,rules_html:rulesText.value,competition_name:compName.value,competition_subtitle:compSub.value,competition_logo_url:''})});await refreshSilent();alert('Uloženo')}async function recalc(){await api('/admin/recalc',{method:'POST'});await refreshSilent();alert('Přepočítáno')}async function resetSchedule(){if(confirm('Obnovit výchozí rozpis MS 2026?')){await api('/admin/reset-schedule',{method:'POST',body:'{}'});await refreshSilent();alert('Rozpis obnoven')}}
async function quickTeams(id,start_time,phase){let h=document.getElementById('kh_'+id).value,a=document.getElementById('ka_'+id).value;await api('/admin/edit-match',{method:'POST',body:JSON.stringify({matchId:id,home:h,away:a,start_time,phase})});await refreshSilent()}
function admin(){if(!['admin','superadmin'].includes(me.role))return `<div class=card><div class=notice>Bez oprávnění.</div></div>`;let phasesList=['Skupina A','Skupina B','Skupina C','Skupina D','Skupina E','Skupina F','Skupina G','Skupina H','Skupina I','Skupina J','Skupina K','Skupina L','32 postupujících','Osmifinále','Čtvrtfinále','Semifinále','O 3. místo','Finále'];let active=(data.users||[]).filter(x=>x.approved&&x.paid).length, waiting=(data.users||[]).length-active, finished=(data.matches||[]).filter(x=>x.effective_status=='finished').length;return `<div class=card><div class=admin-summary><div class=mini><b>${data.users.length}</b><span>hráčů celkem</span></div><div class=mini><b>${active}</b><span>aktivních</span></div><div class=mini><b>${waiting}</b><span>čeká</span></div><div class=mini><b>${finished}/${data.matches.length}</b><span>vyhodnoceno zápasů</span></div></div></div><div class=card><div class=title>Nastavení soutěže</div><input id=compName class=input value="${esc(data.settings.competition_name||'FIFA World Cup 2026')}" placeholder="Název soutěže"><input id=compSub class=input value="${esc(data.settings.competition_subtitle||'MS ve fotbale 2026')}" placeholder="Podtitulek"><div class=grid2><input id=af class=input type=number value="${data.settings.admin_fee||0}" placeholder="Poplatek adminovi"><input id=gf class=input type=number value="${data.settings.game_fee||0}" placeholder="Vklad do hry"></div><input id=bank class=input value="${esc(data.settings.bank_account||'')}" placeholder="Bankovní účet"><input id=access class=input value="${esc(data.settings.access_code||'TIP2026')}" placeholder="Vstupní kód"><textarea id=rulesText class=input placeholder="Pravidla">${esc(data.settings.rules_html||'')}</textarea><button class="btn primary full" onclick=saveSettings()>Uložit nastavení</button></div><div class=card><button class="btn good full" onclick=recalc()>Přepočítat body</button></div><div class=card><div class=title>Hráči, kontakty a platby</div><div class=admin-list>${data.users.map(u=>`<div class=admin-row><div class=rank><div class=grow><b>${esc(u.first)} ${esc(u.last)}</b><div class=note>Veřejně: <b>${displayUser(u)}</b> • ${esc(u.email||'bez e-mailu')}<br>Platba: <b>${esc(u.payment_note||'')}</b></div><span class="role ${u.role}">${roleLabel(u.role)}</span> ${u.approved&&u.paid?'<span class="role player">aktivní</span>':'<span class="role admin">čeká</span>'}</div><div class=points>${u.points||0} b</div></div><div class=admin-actions><button class="btn good small" onclick="approve('${u.id}')">Aktivovat</button><button class="btn small" onclick="deactivate('${u.id}')">Deaktivovat</button><button class="btn small" onclick="role('${u.id}','player')">Tipér</button><button class="btn small" onclick="role('${u.id}','admin')">Admin</button><button class="btn danger small" onclick="delUser('${u.id}')">Smazat</button></div></div>`).join('')}</div></div><div class=card><div class=title>Přidat zápas</div><select id=phaseIn class=input>${phasesList.map(x=>`<option>${x}</option>`).join('')}</select><div class=grid2><input id=homeTeam class=input list=teams placeholder="Domácí"><input id=awayTeam class=input list=teams placeholder="Hosté"></div><datalist id=teams>${data.teamOptions.map(t=>`<option value="${esc(t)}">`).join('')}</datalist><input id=startTime class=input type=datetime-local><button class="btn primary full" onclick=addMatch()>Přidat zápas</button></div><div class=card><div class=title>Import zápasů</div><p class=note>Formát: 2026-06-11 21:00; Skupina A; Mexiko; Jihoafrická republika</p><textarea id=bulk class=input></textarea><button class="btn primary full" onclick=imp()>Importovat</button></div><div class=card><div class=title>Doplnění vyřazovací fáze</div><p class=note>Pro zápasy, kde zatím není jasné obsazení, vybereš týmy ručně. Hodí se pro 32 postupujících, osmifinále i další fáze.</p><div class=phase-tools>${(data.matches||[]).filter(m=>m.home=='TBD'||m.away=='TBD'||/TBD|postup|Doplní/i.test function profile(){
  let u=data.meStats||me||{};
  let pos=(data.ranking||[]).findIndex(x=>x.id==u.id)+1;
  let evaluated=u.evaluated_count||0, tips=u.tips_count||0;
  let pct=evaluated?Math.round(((u.hit_1||0)+(u.hit_3||0))/evaluated*100):0;
  let nick=u.public_name||u.nick||me.public_name||me.nick||me.full_name||'Hráč';
  return `<div class="card profile-hero"><div><div class=profile-nick>${esc(nick)}</div><div class=profile-real>${esc(me.first||'')} ${esc(me.last||'')} ${me.email?'• '+esc(me.email):''}</div></div><div><span class=role-chip>${roleLabel(me.role)}</span></div></div>
  <div class="card profile-grid"><div class=profile-stat><b>${pos||'—'}</b><span>pořadí</span></div><div class=profile-stat><b>${u.points||0}</b><span>bodů</span></div><div class=profile-stat><b>${evaluated}<small>/${tips}</small></b><span>vyhodnoceno / tipy</span></div><div class=profile-stat><b>${pct}%</b><span>úspěšnost</span></div></div>
  <div class=card><div class=profile-data><div class=data-row><span>jméno</span><b>${esc(me.first||'—')}</b></div><div class=data-row><span>příjmení</span><b>${esc(me.last||'—')}</b></div><div class=data-row><span>přezdívka</span><b>${esc(nick)}</b></div><div class=data-row><span>e-mail</span><b>${esc(me.email||'—')}</b></div><div class=data-row><span>role</span><b>${roleLabel(me.role)}</b></div><div class=data-row><span>stav účtu</span><b>${me.approved&&me.paid?'aktivní':'čeká na aktivaci'}</b></div><div class=data-row><span>údaj do platby</span><b>${esc(me.payment_note||'TIP')}</b></div><div class=data-row><span>veřejně viditelné</span><b>jen přezdívka</b></div></div><button class="btn danger full" style="margin-top:14px" onclick=out()>Odhlásit</button></div>`;
}
function betsPage(){
  let ms=(data.matches||[]).filter(m=>m.effective_status!='open');
  return `<div class=card><div class=title>Tipy všech</div><p class=note>Tipy ostatních se zobrazují pouze u zamčených nebo vyhodnocených zápasů.</p>${ms.length?ms.map(m=>`<div class=match><div class=match-head><b>${esc(m.home_flag||'')} ${esc(m.home)} vs ${esc(m.away_flag||'')} ${esc(m.away)}</b>${badge(m)}</div><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString('cs-CZ')} ${m.score?'• výsledek '+esc(m.score):''}</div>${otherBetsHtml(m)}</div>`).join(''):'<div class=notice>Zatím není žádný zamčený zápas.</div>'}</div>`;
}


// v37 overrides: less flicker, cleaner admin, compact ranking
let __lastRenderSignature = '';
function renderSignature(){
  try {
    return JSON.stringify({page, me: me && {id:me.id, role:me.role, nick:me.nick, public_name:me.public_name, approved:me.approved, paid:me.paid}, data});
  } catch(e) { return String(Date.now()) }
}
function setAdminTab(tab){
  document.querySelectorAll('.admin-panel').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.admin-tab').forEach(x=>x.classList.remove('active'));
  let p=document.getElementById('admin-'+tab), b=document.getElementById('tab-'+tab);
  if(p)p.classList.add('active'); if(b)b.classList.add('active');
}
async function saveSettings(){
  try{
    const btn=document.getElementById('saveSettingsBtn'); if(btn){btn.disabled=true;btn.textContent='Ukládám…'}
    await api('/admin/settings',{method:'POST',body:JSON.stringify({
      admin_fee:+af.value||0,
      game_fee:+gf.value||0,
      bank_account:bank.value,
      access_code:access.value,
      rules_html:rulesText.value,
      competition_name:compName.value,
      competition_subtitle:compSub.value,
      competition_logo_url:''
    })});
    const n=document.getElementById('saveNote'); if(n){n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2200)}
    await refreshSilent(true);
  }catch(e){alert(e.message)}
  finally{const btn=document.getElementById('saveSettingsBtn'); if(btn){btn.disabled=false;btn.textContent='Uložit nastavení'}}
}
function admin(){
  if(!['admin','superadmin'].includes(me.role))return `<div class=card><div class=notice>Bez oprávnění.</div></div>`;
  let phasesList=['Skupina A','Skupina B','Skupina C','Skupina D','Skupina E','Skupina F','Skupina G','Skupina H','Skupina I','Skupina J','Skupina K','Skupina L','32 postupujících','Osmifinále','Čtvrtfinále','Semifinále','O 3. místo','Finále'];
  let users=data.users||[], matches=data.matches||[];
  let active=users.filter(x=>x.approved&&x.paid).length, waiting=users.length-active, finished=matches.filter(x=>x.effective_status=='finished').length;
  let toConfirm=matches.filter(m=>(m.effective_status=='locked'||new Date(m.start_time)<=new Date())&&!m.score).slice(0,18);
  let placeholders=matches.filter(m=>m.home=='TBD'||m.away=='TBD'||/TBD|postup|Doplní/i.test(m.info||''));
  return `<div class=card><div class=admin-summary><div class=mini><b>${users.length}</b><span>hráčů celkem</span></div><div class=mini><b>${active}</b><span>aktivních</span></div><div class=mini><b>${waiting}</b><span>čeká</span></div><div class=mini><b>${finished}/${matches.length}</b><span>vyhodnoceno</span></div></div></div>
  <div class=card><div class=admin-tabs><button id=tab-todo class="btn admin-tab active" onclick="setAdminTab('todo')">K vyřešení</button><button id=tab-users class="btn admin-tab" onclick="setAdminTab('users')">Hráči</button><button id=tab-settings class="btn admin-tab" onclick="setAdminTab('settings')">Nastavení</button><button id=tab-phases class="btn admin-tab" onclick="setAdminTab('phases')">Fáze</button><button id=tab-import class="btn admin-tab" onclick="setAdminTab('import')">Import</button><button id=tab-all class="btn admin-tab" onclick="setAdminTab('all')">Zápasy</button></div>
  <div id=admin-todo class="admin-panel active"><div class=title>Co je potřeba vyřešit</div>${toConfirm.length?toConfirm.map(m=>`<div class=todo-match><b>${esc(m.home_flag||'')} ${esc(m.home)} vs ${esc(m.away_flag||'')} ${esc(m.away)}</b><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString('cs-CZ')}</div><div class=admin-actions><button class="btn good small" onclick="result('${m.id}')">Zadat výsledek</button><button class="btn small" onclick="setStatus('${m.id}','open')">Znovu otevřít</button></div></div>`).join(''):'<div class=notice>Teď není žádný zápas k vyhodnocení.</div>'}${placeholders.length?`<div class=title style="margin-top:18px">Doplnit týmy ve fázích</div>${placeholders.slice(0,8).map(m=>`<div class=todo-match><b>${esc(m.phase)} • ${new Date(m.start_time).toLocaleDateString('cs-CZ')}</b><div class=grid2><select id="kh_${m.id}" class=input>${data.teamOptions.map(t=>`<option value="${esc(t)}" ${t==m.home?'selected':''}>${esc(t)}</option>`).join('')}</select><select id="ka_${m.id}" class=input>${data.teamOptions.map(t=>`<option value="${esc(t)}" ${t==m.away?'selected':''}>${esc(t)}</option>`).join('')}</select></div><button class="btn good full" onclick="quickTeams('${m.id}','${esc(m.start_time)}','${esc(m.phase)}')">Uložit týmy</button></div>`).join('')}`:''}</div>
  <div id=admin-users class=admin-panel><div class=title>Hráči, kontakty a platby</div><div class=admin-list>${users.map(u=>`<div class=admin-row><div class=rank><div class=grow><b>${esc(u.first)} ${esc(u.last)}</b><div class=note>Veřejně: <b>${displayUser(u)}</b> • ${esc(u.email||'bez e-mailu')}<br>Platba: <b>${esc(u.payment_note||'')}</b></div><span class="role ${u.role}">${roleLabel(u.role)}</span> ${u.approved&&u.paid?'<span class="role player">aktivní</span>':'<span class="role admin">čeká</span>'}</div><div class=points>${u.points||0} b</div></div><div class=admin-actions><button class="btn good small" onclick="approve('${u.id}')">Aktivovat</button><button class="btn small" onclick="deactivate('${u.id}')">Deaktivovat</button><button class="btn small" onclick="role('${u.id}','player')">Tipér</button><button class="btn small" onclick="role('${u.id}','admin')">Admin</button><button class="btn danger small" onclick="delUser('${u.id}')">Smazat</button></div></div>`).join('')}</div></div>
  <div id=admin-settings class=admin-panel><div class=title>Nastavení soutěže a plateb</div><input id=compName class=input value="${esc(data.settings.competition_name||'FIFA World Cup 2026')}" placeholder="Název soutěže"><input id=compSub class=input value="${esc(data.settings.competition_subtitle||'MS ve fotbale 2026')}" placeholder="Podtitulek"><div class=setting-grid><input id=af class=input type=number value="${data.settings.admin_fee||0}" placeholder="Poplatek adminovi"><input id=gf class=input type=number value="${data.settings.game_fee||0}" placeholder="Vklad do hry"></div><input id=bank class=input value="${esc(data.settings.bank_account||'')}" placeholder="Bankovní účet"><input id=access class=input value="${esc(data.settings.access_code||'TIP2026')}" placeholder="Vstupní kód"><textarea id=rulesText class=input placeholder="Pravidla">${esc(data.settings.rules_html||'')}</textarea><button id=saveSettingsBtn class="btn primary full" onclick=saveSettings()>Uložit nastavení</button><div id=saveNote class="notice ok save-note">Nastavení uloženo.</div><button class="btn good full" style="margin-top:10px" onclick=recalc()>Přepočítat body</button></div>
  <div id=admin-phases class=admin-panel><div class=title>Doplnění vyřazovací fáze</div>${placeholders.length?placeholders.map(m=>`<div class=phase-row><b>${esc(m.phase)} • ${new Date(m.start_time).toLocaleDateString('cs-CZ')}</b><select id="kh_${m.id}" class=input>${data.teamOptions.map(t=>`<option value="${esc(t)}" ${t==m.home?'selected':''}>${esc(t)}</option>`).join('')}</select><select id="ka_${m.id}" class=input>${data.teamOptions.map(t=>`<option value="${esc(t)}" ${t==m.away?'selected':''}>${esc(t)}</option>`).join('')}</select><button class="btn good" onclick="quickTeams('${m.id}','${esc(m.start_time)}','${esc(m.phase)}')">Uložit</button></div>`).join(''):'<div class=notice>Žádný zápas k doplnění.</div>'}</div>
  <div id=admin-import class=admin-panel><div class=title>Přidat / importovat zápasy</div><select id=phaseIn class=input>${phasesList.map(x=>`<option>${x}</option>`).join('')}</select><div class=grid2><input id=homeTeam class=input list=teams placeholder="Domácí"><input id=awayTeam class=input list=teams placeholder="Hosté"></div><datalist id=teams>${data.teamOptions.map(t=>`<option value="${esc(t)}">`).join('')}</datalist><input id=startTime class=input type=datetime-local><button class="btn primary full" onclick=addMatch()>Přidat zápas</button><hr style="border:0;border-top:1px solid var(--line);margin:16px 0"><p class=note>Formát: 2026-06-11 21:00; Skupina A; Mexiko; Jihoafrická republika</p><textarea id=bulk class=input></textarea><button class="btn primary full" onclick=imp()>Importovat</button></div>
  <div id=admin-all class=admin-panel><div class=title>Pokročilá správa zápasů</div><button class="btn good full" onclick=resetSchedule()>Obnovit výchozí rozpis MS 2026</button>${matches.map(m=>`<div class=match><div class=match-head><b>${esc(m.home_flag||'')} ${esc(m.home)} vs ${esc(m.away_flag||'')} ${esc(m.away)}</b>${badge(m)}</div><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString('cs-CZ')} ${m.score?'• '+esc(m.score):''}</div><div class=admin-actions><button class="btn small" onclick='editMatch(${JSON.stringify(m).replace(/'/g,"&#39;")})'>Upravit</button><button class="btn small" onclick="setStatus('${m.id}','open')">Otevřít</button><button class="btn small" onclick="setStatus('${m.id}','locked')">Zamknout</button><button class="btn good small" onclick="result('${m.id}')">Výsledek</button><button class="btn small" onclick="setStatus('${m.id}','finished')">Dohráno</button></div></div>`).join('')}</div></div>`;
}
async function refreshSilent(force=false){
  if(!me)return;
  if(Date.now()<editingUntil)return;
  try{data=await api('/app');me=(await api('/me')).user;let sig=renderSignature();if(force||sig!==__lastRenderSignature){render()}}catch(e){}
}

function render(){if(!me){root.innerHTML=loginScreen();return}let pages={home,tips,rank,rules,profile,bets:betsPage,admin};root.innerHTML=topbar()+`<main class=app>${(pages[page]||home)()}</main>`+nav();__lastRenderSignature=renderSignature();startRealtime()}
load();
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(regs=>Promise.all(regs.map(r=>r.unregister()))).catch(()=>{})}
</script></body></html>
