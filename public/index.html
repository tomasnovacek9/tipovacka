<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tipovačka</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="wrap">
    <section class="card hero">
      <div>
        <p class="eyebrow">Cloudflare Pages + D1</p>
        <h1>Tipovačka</h1>
        <p id="apiStatus" class="muted">Kontroluji API…</p>
      </div>
      <div id="userBox" class="userbox"></div>
    </section>

    <section id="loginCard" class="card">
      <h2>Přihlášení</h2>
      <form id="loginForm">
        <label>E-mail nebo uživatelské jméno
          <input name="login" autocomplete="username" required placeholder="admin">
        </label>
        <label>Heslo
          <input name="password" type="password" autocomplete="current-password" required placeholder="••••••••">
        </label>
        <button type="submit">Přihlásit</button>
        <p id="loginMsg" class="msg"></p>
      </form>
    </section>

    <section id="appCard" class="card hidden">
      <h2>Domů</h2>
      <p>API funguje a uživatel je přihlášený.</p>
      <button id="logoutBtn" class="secondary">Odhlásit</button>
    </section>

    <section class="card small">
      <h2>Diagnostika</h2>
      <pre id="debug">Načítám…</pre>
    </section>
  </main>
  <script src="/app.js" defer></script>
</body>
</html>
