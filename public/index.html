    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0%,rgba(39,209,91,.18),transparent 28%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;padding-bottom:104px}.app{max-width:1040px;margin:0 auto}.hide{display:none!important}button,input,select,textarea{font:inherit}.top{position:sticky;top:0;z-index:8;background:linear-gradient(180deg,var(--bg),rgba(8,13,18,.84));backdrop-filter:blur(18px);padding:12px 14px 8px;border-bottom:1px solid var(--line)}.topbar{display:flex;align-items:center;gap:12px;max-width:1040px;margin:auto}.brand{display:flex;align-items:center;gap:10px;min-width:0}.brand img{width:46px;height:46px;border-radius:14px;box-shadow:0 10px 24px rgba(0,0,0,.22)}.brand b{display:block;font-size:18px}.brand span{display:block;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.spacer{flex:1}.pill{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:999px;padding:8px 12px;font-weight:800}.hero{margin:14px;padding:18px;border-radius:32px;background:linear-gradient(135deg,rgba(18,27,36,.98),rgba(13,20,26,.94));box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:150px}.hero:before{content:"";position:absolute;inset:-60px -80px auto auto;width:260px;height:260px;border-radius:50%;background:rgba(39,209,91,.20);filter:blur(22px)}.hero-row{display:flex;gap:16px;align-items:center}.world{margin-left:auto;width:118px;max-height:118px;object-fit:contain;filter:drop-shadow(0 14px 28px rgba(0,0,0,.35))}.big{font-size:34px;line-height:1;font-weight:950;letter-spacing:-.04em}.sub{color:var(--muted);margin-top:8px;line-height:1.45}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 14px}.card{background:linear-gradient(180deg,var(--card),var(--panel));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin:12px 14px}.mini{margin:0;padding:14px}.mini b{font-size:24px}.mini span{display:block;color:var(--muted);font-size:12px}.title{font-size:21px;font-weight:950;letter-spacing:-.02em;margin-bottom:12px}.note{font-size:13px;color:var(--muted);line-height:1.45}.input{width:100%;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:16px;padding:13px;margin:6px 0;outline:none}.input:focus{border-color:rgba(39,209,91,.75);box-shadow:0 0 0 4px rgba(39,209,91,.13)}textarea.input{min-height:120px}.btn{border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:var(--panel2);color:var(--text);font-weight:900;cursor:pointer}.btn:hover{transform:translateY(-1px)}.btn.primary,.btn.active{background:linear-gradient(180deg,var(--green2),var(--green));color:#07100a;border-color:rgba(124,255,91,.55)}.btn.danger{background:rgba(255,91,107,.14);color:#ff8a96}.btn.good{background:rgba(39,209,91,.14);color:var(--green2)}.btn.small{padding:8px 10px;border-radius:12px;font-size:12px}.full{width:100%}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.notice{border:1px solid rgba(246,193,75,.35);background:rgba(246,193,75,.11);color:#ffd987;border-radius:18px;padding:12px}.ok{border-color:rgba(39,209,91,.35);background:rgba(39,209,91,.12);color:var(--green2)}.bad{border-color:rgba(255,91,107,.35);background:rgba(255,91,107,.12);color:#ff9aa4}.login{min-height:100vh;display:grid;place-items:center;padding:18px}.login-card{width:100%;max-width:470px;background:linear-gradient(180deg,var(--card),var(--panel));border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);padding:20px}.login-logo{display:block;width:92px;height:92px;border-radius:24px;margin:0 auto 12px}.center{text-align:center}.tabs,.phase-filter{display:flex;gap:8px;overflow:auto;padding:0 14px 6px}.tabs .btn,.phase-filter .btn{white-space:nowrap}.match{border:1px solid var(--line);border-radius:24px;padding:14px;margin:12px 0;background:linear-gradient(180deg,var(--panel2),var(--panel))}.match-head{display:flex;gap:8px;align-items:center;justify-content:space-between}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900}.open{background:rgba(39,209,91,.14);color:var(--green2)}.locked{background:rgba(246,193,75,.14);color:#ffd987}.done{background:rgba(148,163,184,.16);color:#cbd5e1}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:16px 0}.team{text-align:center;font-weight:950}.flag{font-size:32px;margin-bottom:4px}.score{font-size:26px;font-weight:950;color:var(--green2);min-width:52px;text-align:center}.exact{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}.stepper{display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:center}.stepper button{padding:10px 12px}.stepper-value{text-align:center;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:10px;font-weight:950}.saved-tip{margin-top:10px;border:1px solid rgba(39,209,91,.30);background:rgba(39,209,91,.10);color:var(--green2);border-radius:16px;padding:10px;text-align:center;font-weight:900}.bottom{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(980px,calc(100% - 16px));display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px;background:rgba(16,24,33,.82);border:1px solid var(--line);backdrop-filter:blur(20px);box-shadow:var(--shadow);border-radius:26px;z-index:20}.bottom button{border:0;background:transparent;color:var(--muted);border-radius:18px;padding:8px 2px;font-size:11px;font-weight:900}.bottom .on{background:rgba(39,209,91,.14);color:var(--green2)}.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(180deg,var(--green2),var(--green));display:grid;place-items:center;color:#07100a;font-weight:950}.rank{display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding:12px 0}.rank:last-child{border-bottom:0}.grow{flex:1;min-width:0}.points{font-weight:950;font-size:18px;color:var(--green2)}.medal{font-size:28px;width:36px;text-align:center}.table{width:100%;border-collapse:collapse}.table td,.table th{border-bottom:1px solid var(--line);padding:10px 6px;text-align:left}.right{text-align:right!important}.public-name{font-weight:950}.role{display:inline-flex;border-radius:999px;border:1px solid var(--line);padding:4px 8px;font-size:12px;font-weight:900}.role.admin{color:#ffd987}.role.player{color:var(--green2)}.admin-list{display:grid;gap:10px}.admin-row{border:1px solid var(--line);border-radius:18px;padding:12px;background:var(--panel2)}.admin-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.others{margin-top:10px;background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:10px}.others-row{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:7px 0}.others-row:last-child{border-bottom:0}.win{color:var(--green2)}.exact-hit{color:#ffd987}.theme-toggle{min-width:44px}.muted{color:var(--muted)}

/* v23 – profi sport/betting inspired dark UI */
:root{--bg:#06090d;--panel:#0b1118;--panel2:#111a23;--card:#0f1720;--green:#27d15b;--green2:#75ff57;--text:#f8fbff;--muted:#8b98a8;--line:rgba(124,255,91,.12);--radius:24px;--shadow:0 18px 50px rgba(0,0,0,.42)}
body{background:radial-gradient(circle at 18% -8%,rgba(39,209,91,.20),transparent 30%),linear-gradient(180deg,#05080c,#081018 46%,#05080c);}
.top{padding:8px 10px 7px;border-bottom:1px solid rgba(124,255,91,.14);box-shadow:0 12px 36px rgba(0,0,0,.24)}
.topbar{height:62px;grid-template-columns:auto minmax(0,1fr) auto;gap:10px}
.wc-brand{height:50px;border-radius:18px;padding:6px 10px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.10)}
.wc-brand img{width:42px;height:42px}.wc-brand span{font-size:11px;line-height:1.05;max-width:72px;white-space:normal;text-transform:uppercase;letter-spacing:.02em;color:#dce6ee}
.top-center{padding:0 4px}.top-center b{font-size:19px;font-weight:1000}.top-center span{font-size:12px;color:#a7b4c2}.tip-mark{width:50px;height:50px;border-radius:17px;object-fit:cover}.logout{display:none}
.hero{min-height:auto;margin:12px 12px 8px;padding:16px 16px;border-radius:28px;background:linear-gradient(135deg,rgba(14,22,30,.97),rgba(6,10,14,.96));border:1px solid rgba(124,255,91,.14);box-shadow:0 18px 56px rgba(0,0,0,.38)}
.hero:before{width:190px;height:190px;inset:-50px -60px auto auto;background:rgba(39,209,91,.18)}.big{font-size:29px}.sub{font-size:13px;max-width:560px}.world{width:78px;max-height:78px;opacity:.92}
.cards{margin:0 12px;gap:10px}.card{margin:10px 12px;padding:14px;border-radius:24px;background:linear-gradient(180deg,rgba(18,27,36,.96),rgba(11,17,24,.98));border:1px solid rgba(124,255,91,.10);box-shadow:0 14px 38px rgba(0,0,0,.28)}.mini{padding:13px}.mini b{color:var(--green2)}
.title{font-size:18px;margin-bottom:10px}.note,.sub{color:#93a1af}.notice{border-radius:18px}
.match{position:relative;margin:10px 0;padding:12px;border-radius:22px;background:linear-gradient(180deg,rgba(18,28,37,.98),rgba(10,16,22,.98));border:1px solid rgba(255,255,255,.08);box-shadow:0 12px 34px rgba(0,0,0,.25)}
.match:before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:linear-gradient(180deg,var(--green2),var(--green));opacity:.85}.match-head{padding-left:6px}.badge{padding:4px 9px;font-size:11px}.teams{margin:13px 0;grid-template-columns:minmax(0,1fr) 58px minmax(0,1fr)}.team{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:10px 6px;min-height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center}.flag{font-size:30px}.score{font-size:21px;background:rgba(124,255,91,.10);border:1px solid rgba(124,255,91,.16);border-radius:16px;padding:10px 4px;color:var(--text)}
.exact{background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:8px;margin-top:8px}.stepper-value{background:#05090d}.btn{border-radius:15px}.btn.primary,.btn.active{background:linear-gradient(180deg,#86ff64,#27d15b);color:#041208}.btn:disabled{opacity:.45;filter:grayscale(.4)}.saved-tip{border-radius:16px}
.rank{border-bottom:1px solid rgba(255,255,255,.07)}.medal{font-size:30px}.avatar{background:linear-gradient(180deg,#86ff64,#27d15b);box-shadow:0 8px 24px rgba(39,209,91,.18)}.points{color:#86ff64}.role{border-color:rgba(124,255,91,.15);background:rgba(124,255,91,.06)}
.bottom{bottom:9px;width:min(720px,calc(100% - 16px));grid-template-columns:repeat(5,1fr);padding:7px;border-radius:28px;background:rgba(8,13,18,.90);border:1px solid rgba(124,255,91,.15)}.bottom button{height:54px;border-radius:20px;color:#8291a2}.bottom .on{color:#86ff64;background:linear-gradient(180deg,rgba(124,255,91,.18),rgba(39,209,91,.08))}.nav-ico svg{width:25px;height:25px}.nav-label{font-size:9px;color:#86ff64}.tabs,.phase-filter{padding-left:12px;padding-right:12px}.input{background:#0a1118;border-color:rgba(255,255,255,.08)}
@media(max-width:740px){.topbar{grid-template-columns:auto minmax(0,1fr) auto}.wc-brand span{display:none}.wc-brand{padding:5px 7px}.tip-mark{width:46px;height:46px}.top-center b{font-size:17px}.top-center span{font-size:11px}.big{font-size:26px}.world{width:64px}.cards{grid-template-columns:repeat(3,1fr)}.mini span{font-size:10px}.mini b{font-size:20px}.bottom button{height:52px}.nav-label{display:none}.bottom .on .nav-label{display:block;position:absolute;bottom:6px}}

<body>
<div id="root"></div>
<script>
const API="/api";
let tok=localStorage.tip_token||"",me=null,data=null,page="home",msg="",filter="all",phase="all",betsFilter="all",timer=null;
const esc=s=>String(s??"").replace(/[&<>\"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));
const norm=s=>String(s||"").trim();
function setTheme(t){document.documentElement.dataset.theme=t;localStorage.tip_theme=t}
setTheme("dark");
async function api(p,o={}){let h={"content-type":"application/json"};if(tok)h.authorization="Bearer "+tok;let r=await fetch(API+p,{...o,headers:h});let txt=await r.text();let j={};try{j=txt?JSON.parse(txt):{}}catch{throw Error("Server nevrátil JSON")};if(!r.ok)throw Error(j.error||"Chyba API");return j}
async function load(silent=false){try{if(tok){me=(await api('/me')).user;data=await api('/app')}else{me=null;data=null}}catch(e){if(!silent){msg=e.message}localStorage.removeItem('tip_token');tok='';me=null;data=null}render()}
async function refreshSilent(){if(!me)return;try{data=await api('/app');me=(await api('/me')).user;render()}catch(e){}}
function startRealtime(){clearInterval(timer);timer=setInterval(refreshSilent,5000)}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&me)refreshSilent()});
function go(p){page=p;render()}function out(){localStorage.removeItem('tip_token');tok='';me=null;data=null;render()}
function pageTitle(){return ({home:'Přehled',tips:'Zápasy a tipy',rank:'Pořadí',bets:'Tipy všech',admin:'Admin'})[page]||'Přehled'}
const navIcon={home:'<svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M6.5 10.5V20h11v-9.5"/><path d="M10 20v-5h4v5"/></svg>',tips:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="m12 4 2.4 5.2 5.6.7-4.1 3.8 1 5.5L12 16.4 7.1 19.2l1-5.5L4 9.9l5.6-.7L12 4Z"/></svg>',rank:'<svg viewBox="0 0 24 24"><path d="M7 5h10v3a5 5 0 0 1-10 0V5Z"/><path d="M8 21h8"/><path d="M12 13v8"/><path d="M7 7H4a3 3 0 0 0 3 3"/><path d="M17 7h3a3 3 0 0 1-3 3"/></svg>',bets:'<svg viewBox="0 0 24 24"><path d="M7 4h10a2 2 0 0 1 2 2v14H5V6a2 2 0 0 1 2-2Z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>',admin:'<svg viewBox="0 0 24 24"><path d="M12 3 20 6v6c0 5-3.4 8-8 9-4.6-1-8-4-8-9V6l8-3Z"/><path d="M9 12l2 2 4-5"/></svg>'};
function topbar(){return `<div class=top><div class=topbar><div class=wc-brand title="FIFA World Cup 2026"><img src="/worldcup2026-logo.png" alt="World Cup"><span>FIFA<br>World Cup<br>2026</span></div><div class=top-center><b>${esc(pageTitle())}</b><span>${me?'Přihlášen: '+esc(displayUser(me))+' • '+esc(me.role):'Tipovačka MS 2026'}</span></div><img class=tip-mark src="/app-icon.png" alt="TIP"></div></div>`}
function nav(){if(!me)return'';let admin=['admin','superadmin'].includes(me.role);let items=[['home','Start'],['tips','Zápasy'],['rank','Žebříček'],['bets','Tipy'],['admin','Admin']];return `<div class=bottom>${items.map(i=>i[0]=='admin'&&!admin?'':`<button aria-label="${i[1]}" title="${i[1]}" class="${page==i[0]?'on':''}" onclick="go('${i[0]}')"><span class=nav-ico>${navIcon[i[0]]}</span><span class=nav-label>${page==i[0]?i[1]:''}</span></button>`).join('')}</div>`}
function loginScreen(){return `${topbar()}<div class=login><div class=login-card><img class=login-logo src="/app-icon.png"><h1 class=center>Tipovačka MS 2026</h1><p class="note center">Přihlášení jménem, příjmením a heslem. V aplikaci se veřejně zobrazuje jen přezdívka.</p>${msg?`<div class="notice bad">${esc(msg)}</div>`:''}<input id=loginFirst class=input placeholder="Jméno"><input id=loginLast class=input placeholder="Příjmení"><input id=lp class=input type=password placeholder="Heslo"><button class="btn primary full" onclick=login()>Přihlásit</button><button class="btn full" onclick="document.getElementById('reg').classList.toggle('hide')">Registrace</button><div id=reg class=hide><div class=grid2><input id=first class=input placeholder="Jméno"><input id=last class=input placeholder="Příjmení"></div><input id=nick class=input placeholder="Přezdívka veřejně v tabulce"><div class=grid2><input id=email class=input placeholder="E-mail"><input id=phone class=input placeholder="Telefon"></div><input id=rp class=input type=password placeholder="Heslo"><input id=code class=input placeholder="Vstupní kód od admina"><button class="btn primary full" onclick=register()>Registrovat</button></div><p class=note>Admin po registraci uvidí jméno, příjmení, kontakt a údaj do platby. Ostatní hráči vidí jen přezdívku.</p></div></div>`}
async function login(){try{msg='';let full=(norm(loginFirst.value)+' '+norm(loginLast.value)).trim();let r=await api('/auth/login',{method:'POST',body:JSON.stringify({name:full,password:lp.value})});tok=r.token;localStorage.tip_token=tok;await load()}catch(e){msg=e.message;render()}}
async function register(){try{msg='';let r=await api('/auth/register',{method:'POST',body:JSON.stringify({first:first.value,last:last.value,nick:nick.value,email:email.value,phone:phone.value,password:rp.value,code:code.value})});tok=r.token;localStorage.tip_token=tok;await load()}catch(e){msg=e.message;render()}}
function hero(t,s){return `<section class=hero><div class=hero-row><div><div class=big>${t}</div><div class=sub>${s}</div></div><img class=world src="/worldcup2026-logo.png"></div></section>`}
function badge(m){let st=m.effective_status;return st=='open'?`<span class="badge open">lze tipovat</span>`:st=='finished'?`<span class="badge done">vyhodnoceno</span>`:`<span class="badge locked">zamčeno</span>`}
function dateKey(dt){let d=new Date(dt),n=new Date();let t=new Date(n.getFullYear(),n.getMonth(),n.getDate()).getTime();let x=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();return x==t?'today':x==t+86400000?'tomorrow':'other'}
function left(m){let d=new Date(m.start_time)-new Date();if(d<=0)return'uzamčeno';let s=Math.floor(d/1000),days=Math.floor(s/86400);s%=86400;let h=Math.floor(s/3600);s%=3600;let min=Math.floor(s/60);return days?`${days}d ${h}h ${min}m`:`${h}h ${min}m`}
function displayUser(u){return esc(u.nick||u.public_name||u.full_name||'?')}function av(u){let n=(u.nick||u.public_name||u.full_name||'?').slice(0,2).toUpperCase();return `<div class=avatar>${esc(n)}</div>`}
function home(){let p=data.pool||{};return hero('Tipovačka','MS 2026 • tipy • body • pořadí v reálném čase')+`<div class=cards><div class="card mini"><b>${p.players||0}</b><span>aktivních hráčů</span></div><div class="card mini"><b>${p.game||0} Kč</b><span>bank hry</span></div><div class="card mini"><b>${data.matches.length}</b><span>zápasů</span></div></div><div class=card>${me.role!='player'?`<div class="notice ok">Jsi admin. Admin netipuje a není v pořadí.</div>`:me.approved&&me.paid?`<div class="notice ok">✅ Účet je aktivní. Můžeš tipovat.</div>`:`<div class=notice>⏳ Účet čeká na aktivaci adminem po platbě.<br><b>Uveď do platby:</b> ${esc(me.payment_note||'TIP-'+me.nick)}</div>`}</div><div class=card><div class=title>Rychlé informace</div><p>Veřejně se zobrazuje tvoje přezdívka <b>${displayUser(me)}</b>. Jméno, příjmení, telefon a e-mail vidí jen admin.</p><p class=note>Automatická aktualizace běží každých 5 sekund a také při návratu do aplikace.</p></div>`}
function phases(){return ['all',...Array.from(new Set((data.matches||[]).map(m=>m.phase))).filter(Boolean)]}function filtered(){let arr=[...(data.matches||[])];if(filter=='today')arr=arr.filter(m=>dateKey(m.start_time)=='today');if(filter=='tomorrow')arr=arr.filter(m=>dateKey(m.start_time)=='tomorrow');if(filter=='missing')arr=arr.filter(m=>!data.bets.find(b=>b.match_id==m.id)&&m.effective_status=='open');if(filter=='open')arr=arr.filter(m=>m.effective_status=='open');if(filter=='locked')arr=arr.filter(m=>m.effective_status=='locked');if(filter=='finished')arr=arr.filter(m=>m.effective_status=='finished');if(phase!='all')arr=arr.filter(m=>m.phase==phase);return arr}
function scoreStepper(id,val,lock){return `<div class=stepper><button class=btn ${lock?'disabled':''} ${lock?'disabled':''} onclick="step('${id}',-1)" ${lock?'disabled':''}>−</button><div id="${id}" class=stepper-value>${val??0}</div><button class=btn onclick="step('${id}',1)" ${lock?'disabled':''}>+</button></div>`}
function step(id,delta){let el=document.getElementById(id);let v=Math.max(0,Number(el.textContent||0)+delta);el.textContent=v}
async function bet(id){try{let h=Number(document.getElementById('h_'+id).textContent),a=Number(document.getElementById('a_'+id).textContent);await api('/bets',{method:'POST',body:JSON.stringify({matchId:id,homeGoals:h,awayGoals:a})});await refreshSilent()}catch(e){alert(e.message)}}
function scoreClass(x,m){if(!m.score)return'';let [h,a]=m.score.split(':').map(Number);if(Number(x.home_goals)==h&&Number(x.away_goals)==a)return'exact-hit';let pick=h>a?'1':h<a?'2':'X';return x.pick==pick?'win':''}
function otherBetsHtml(m){let arr=(data.publicBets||[]).filter(x=>x.match_id==m.id);if(m.effective_status=='open')return `<div class=note>Tipy ostatních se zobrazí po uzamčení zápasu.</div>`;return `<div class=others><b>Tipy ostatních</b>${arr.length?arr.map(x=>`<div class=others-row><span>${esc(x.nick||x.public_name)}</span><b class="${scoreClass(x,m)}">${x.home_goals}:${x.away_goals}</b></div>`).join(''):`<div class=note>Nikdo zatím netipoval.</div>`}</div>`}
function tips(){let arr=filtered();return hero('Zápasy','Vyber zápas, nastav skóre a potvrď tip.')+`<div class=tabs>${[['all','Vše'],['today','Dnes'],['tomorrow','Zítra'],['missing','Netipnuté'],['open','Otevřené'],['locked','Zamčené'],['finished','Vyhodnocené']].map(x=>`<button class="btn ${filter==x[0]?'active':''}" onclick="filter='${x[0]}';render()">${x[1]}</button>`).join('')}</div><div class=phase-filter><select class=input onchange="phase=this.value;render()">${phases().map(p=>`<option value="${esc(p)}" ${phase==p?'selected':''}>${p=='all'?'Všechny skupiny a fáze':esc(p)}</option>`).join('')}</select></div><div class=card>${arr.length?arr.map(m=>{let b=data.bets.find(x=>x.match_id==m.id)||{};let lock=m.effective_status!='open'||!me.approved||!me.paid||me.role!='player';return `<div class=match><div class=match-head><div>${badge(m)}</div><div class=note>${new Date(m.start_time).toLocaleString('cs-CZ')} • ${esc(m.phase)} • ${left(m)}</div></div><div class=teams><div class=team><div class=flag>${esc(m.home_flag||'')}</div>${esc(m.home)}</div><div class=score>${m.score?esc(m.score):'VS'}</div><div class=team><div class=flag>${esc(m.away_flag||'')}</div>${esc(m.away)}</div></div><div class=exact>${scoreStepper('h_'+m.id,b.home_goals??0,lock)}<b>:</b>${scoreStepper('a_'+m.id,b.away_goals??0,lock)}</div><button class="btn primary full" ${lock?'disabled':''} onclick="bet('${m.id}')">${b.match_id?'Upravit tip':'Potvrdit tip'}</button>${b.match_id?`<div class=saved-tip>✓ Tvůj tip: ${b.home_goals}:${b.away_goals}</div>`:''}${otherBetsHtml(m)}</div>`}).join(''):'<div class=notice>Pro filtr nejsou zápasy.</div>'}</div>`}
function rank(){let top=data.ranking||[];return hero('Žebříček','TOP 3, body a trefené výsledky.')+`<div class=card>${top.length?top.map((u,i)=>`<div class=rank><div class=medal>${i==0?'🥇':i==1?'🥈':i==2?'🥉':i+1}</div>${av(u)}<div class=grow><div class=public-name>${displayUser(u)}</div><div class=note>${u.evaluated_count||0} vyhodnoceno • přesně ${u.hit_3||0}× • vítěz ${u.hit_1||0}×</div></div><div class=points>${u.points} b</div></div>`).join(''):'<div class=notice>Zatím nejsou vyhodnocené tipy.</div>'}</div>`}
function betsPage(){let ms=(data.matches||[]).filter(m=>m.effective_status!='open');if(betsFilter=='mine')ms=ms.filter(m=>data.bets.find(b=>b.match_id==m.id));return hero('Tipy','Tipy ostatních po uzamčení zápasu.')+`<div class=tabs><button class="btn ${betsFilter=='all'?'active':''}" onclick="betsFilter='all';render()">Vše</button><button class="btn ${betsFilter=='mine'?'active':''}" onclick="betsFilter='mine';render()">Moje zápasy</button></div><div class=card>${ms.length?ms.map(m=>`<div class=match><b>${esc(m.home_flag)} ${esc(m.home)} vs ${esc(m.away_flag)} ${esc(m.away)}</b><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString('cs-CZ')} ${m.score?'• výsledek '+esc(m.score):''}</div>${otherBetsHtml(m)}</div>`).join(''):'<div class=notice>Zatím není žádný zamčený zápas.</div>'}</div>`}
async function approve(id){await api('/admin/approve',{method:'POST',body:JSON.stringify({userId:id})});await refreshSilent()}async function deactivate(id){await api('/admin/deactivate',{method:'POST',body:JSON.stringify({userId:id})});await refreshSilent()}async function role(id,r){await api('/admin/role',{method:'POST',body:JSON.stringify({userId:id,role:r})});await refreshSilent()}async function delUser(id){if(confirm('Smazat hráče i jeho tipy?')){await api('/admin/delete-user',{method:'POST',body:JSON.stringify({userId:id})});await refreshSilent()}}async function setStatus(id,st){await api('/admin/status',{method:'POST',body:JSON.stringify({matchId:id,status:st})});await refreshSilent()}async function result(id){let score=prompt('Výsledek např. 2:1');if(score){await api('/admin/result',{method:'POST',body:JSON.stringify({matchId:id,score})});await refreshSilent()}}async function editMatch(m){let home=prompt('Domácí tým',m.home);if(!home)return;let away=prompt('Hostující tým',m.away);if(!away)return;let start_time=prompt('Čas ve formátu 2026-06-11T21:00',m.start_time);if(!start_time)return;let ph=prompt('Fáze/skupina',m.phase)||m.phase;await api('/admin/edit-match',{method:'POST',body:JSON.stringify({matchId:m.id,home,away,start_time,phase:ph})});await refreshSilent()}async function addMatch(){await api('/admin/add-match',{method:'POST',body:JSON.stringify({phase:phaseIn.value,home:homeTeam.value,away:awayTeam.value,start_time:startTime.value})});await refreshSilent()}async function imp(){await api('/admin/import',{method:'POST',body:JSON.stringify({text:bulk.value})});await refreshSilent();alert('Import hotový')}async function saveSettings(){await api('/admin/settings',{method:'POST',body:JSON.stringify({admin_fee:+af.value||0,game_fee:+gf.value||0,bank_account:bank.value,access_code:access.value,rules_html:rulesText.value})});await refreshSilent();alert('Uloženo')}async function recalc(){await api('/admin/recalc',{method:'POST'});await refreshSilent();alert('Přepočítáno')}
function admin(){if(!['admin','superadmin'].includes(me.role))return hero('Admin','Bez oprávnění');let phasesList=['Skupina A','Skupina B','Skupina C','Skupina D','Skupina E','Skupina F','Skupina G','Skupina H','Skupina I','Skupina J','Skupina K','Skupina L','32 postupujících','Osmifinále','Čtvrtfinále','Semifinále','O 3. místo','Finále'];return hero('Admin','Ruční správa hráčů, plateb, zápasů a výsledků.')+`<div class=card><div class=title>Nastavení</div><div class=grid2><input id=af class=input type=number value="${data.settings.admin_fee||0}" placeholder="Poplatek adminovi"><input id=gf class=input type=number value="${data.settings.game_fee||0}" placeholder="Vklad do hry"></div><input id=bank class=input value="${esc(data.settings.bank_account||'')}" placeholder="Bankovní účet"><input id=access class=input value="${esc(data.settings.access_code||'TIP2026')}" placeholder="Vstupní kód"><textarea id=rulesText class=input placeholder="Pravidla">${esc(data.settings.rules_html||'')}</textarea><button class="btn primary full" onclick=saveSettings()>Uložit nastavení</button></div><div class=card><button class="btn good full" onclick=recalc()>Přepočítat body</button></div><div class=card><div class=title>Přidat zápas</div><select id=phaseIn class=input>${phasesList.map(x=>`<option>${x}</option>`).join('')}</select><div class=grid2><input id=homeTeam class=input list=teams placeholder="Domácí"><input id=awayTeam class=input list=teams placeholder="Hosté"></div><datalist id=teams>${data.teamOptions.map(t=>`<option value="${esc(t)}">`).join('')}</datalist><input id=startTime class=input type=datetime-local><button class="btn primary full" onclick=addMatch()>Přidat zápas</button></div><div class=card><div class=title>Import zápasů</div><p class=note>Formát řádku: 2026-06-11 21:00; Skupina A; Mexiko; Jihoafrická republika</p><textarea id=bulk class=input></textarea><button class="btn primary full" onclick=imp()>Importovat</button></div><div class=card><div class=title>Hráči, kontakty a platby</div><div class=admin-list>${data.users.map(u=>`<div class=admin-row><div class=rank>${av(u)}<div class=grow><b>${esc(u.first)} ${esc(u.last)}</b><div class=note>Veřejně: <b>${displayUser(u)}</b> • ${esc(u.email||'bez e-mailu')} • ${esc(u.phone||'bez telefonu')}<br>Platba: <b>${esc(u.payment_note||'')}</b></div><span class="role ${u.role}">${esc(u.role)}</span> ${u.approved&&u.paid?'<span class="role player">aktivní</span>':'<span class="role admin">čeká</span>'}</div><div class=points>${u.points||0} b</div></div><div class=admin-actions><button class="btn good small" onclick="approve('${u.id}')">Aktivovat</button><button class="btn small" onclick="deactivate('${u.id}')">Deaktivovat</button><button class="btn small" onclick="role('${u.id}','player')">Hráč</button><button class="btn small" onclick="role('${u.id}','admin')">Admin</button><button class="btn danger small" onclick="delUser('${u.id}')">Smazat</button></div></div>`).join('')}</div></div><div class=card><div class=title>Správa zápasů</div>${data.matches.map(m=>`<div class=match><div class=match-head><b>${esc(m.home_flag||'')} ${esc(m.home)} vs ${esc(m.away_flag||'')} ${esc(m.away)}</b>${badge(m)}</div><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString('cs-CZ')} ${m.score?'• '+esc(m.score):''}</div><div class=admin-actions><button class="btn small" onclick='editMatch(${JSON.stringify(m).replace(/'/g,"&#39;")})'>Upravit</button><button class="btn small" onclick="setStatus('${m.id}','open')">Otevřít</button><button class="btn small" onclick="setStatus('${m.id}','locked')">Zamknout</button><button class="btn good small" onclick="result('${m.id}')">Výsledek</button><button class="btn small" onclick="setStatus('${m.id}','finished')">Dohráno</button></div></div>`).join('')}</div>`}
function render(){if(!me){document.getElementById('root').innerHTML=loginScreen();return}let pages={home,tips,rank,bets:betsPage,admin};document.getElementById('root').innerHTML=topbar()+`<div class=app>${(pages[page]||home)()}</div>`+nav();startRealtime()}
load();if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
</body>
</html>
