
<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tipovačka</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f4f7fb;color:#101828;padding-bottom:86px}
.app{max-width:520px;margin:0 auto}.top{padding:16px;display:flex;justify-content:space-between;align-items:center}.hello{font-size:22px;font-weight:900}.sub{font-size:13px;color:#667085}.card{background:white;margin:12px 14px;padding:16px;border-radius:22px;box-shadow:0 10px 26px rgba(16,24,40,.08);border:1px solid #e5e7eb}.hero{margin:8px 14px 14px;padding:18px;border-radius:26px;background:linear-gradient(135deg,#0f172a,#2563eb);color:white}.big{font-size:32px;font-weight:950}.title{font-size:18px;font-weight:900;margin-bottom:10px}.input{width:100%;box-sizing:border-box;border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin:6px 0}.btn{border:0;border-radius:14px;padding:12px 13px;font-weight:900;background:#e8f0ff;color:#1d4ed8}.btn.primary{background:#2563eb;color:white}.btn.good{background:#dcfce7;color:#166534}.btn.danger{background:#fee2e2;color:#991b1b}.btn.dark{background:#111827;color:white}.full{width:100%}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:16px;padding:11px}.ok{background:#ecfdf3;border-color:#bbf7d0;color:#027a48}.info{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}.bottom{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(500px,calc(100% - 16px));background:white;border:1px solid #e5e7eb;border-radius:24px;box-shadow:0 12px 30px rgba(16,24,40,.14);display:grid;grid-template-columns:repeat(5,1fr);padding:7px}.bottom button{border:0;background:transparent;border-radius:16px;padding:8px 1px;font-size:11px;font-weight:900;color:#667085}.bottom button.active{background:#e8f0ff;color:#1d4ed8}.ico{display:block;font-size:18px}.rank{display:flex;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid #e5e7eb}.rank:last-child{border-bottom:0}.avatar{width:42px;height:42px;border-radius:50%;background:#2563eb;color:white;display:flex;align-items:center;justify-content:center;font-weight:900}.grow{flex:1}.name{font-weight:900}.note{font-size:13px;color:#667085}.points{font-weight:950;font-size:18px}.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin:12px 0}.team{text-align:center;font-weight:900}.flag{font-size:32px}.vs{background:#f2f4f7;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center}.tip{border:0;border-radius:15px;padding:12px;background:#e8f0ff;color:#1d4ed8;font-weight:900}.tip.active{background:#2563eb;color:white}.tip:disabled{opacity:.45}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.login-card{background:white;width:100%;max-width:430px;border-radius:26px;padding:18px;box-shadow:0 18px 44px rgba(16,24,40,.14)}.hide{display:none}.table{width:100%;border-collapse:collapse}.table td,.table th{border-bottom:1px solid #e5e7eb;padding:9px 4px;text-align:left}.right{text-align:right!important}
</style>
</head>
<body>
<div id="root"></div>
<script>
const API="/api";let S={me:null,data:null,page:"home"};
const $=q=>document.querySelector(q);
async function req(p,o={}){const t=localStorage.getItem("token");const h={"content-type":"application/json"};if(t)h.authorization="Bearer "+t;const r=await fetch(API+p,{...o,headers:h});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||"Chyba");return d}
async function load(){try{S.me=(await req("/me")).user;S.data=await req("/app");S.page=(location.hash||"#home").replace("#","");render()}catch(e){localStorage.removeItem("token");S.me=null;render()}}
function go(p){S.page=p;location.hash=p;render()}onhashchange=()=>{S.page=(location.hash||"#home").replace("#","");render()}
function nav(){const a=S.page,ad=S.me&&["admin","superadmin"].includes(S.me.role);const it=[["home","🏠","Domů"],["tips","🏒","Tipy"],["rank","🏆","Pořadí"],["archive","📦","Archiv"],["admin","⚙️","Admin"]];return `<div class=bottom>${it.map(i=>i[0]=="admin"&&!ad?"":`<button class="${a==i[0]?"active":""}" onclick="go('${i[0]}')"><span class=ico>${i[1]}</span>${i[2]}</button>`).join("")}</div>`}
function top(t,s){return `<div class=top><div><div class=hello>${t}</div><div class=sub>${s}</div></div><div class=avatar>${S.me?.avatar||"?"}</div></div>`}
function loginPage(){return `<div class=login><div class=login-card><h1>Tipovačka</h1><p class=note>Vyber soutěž, zaplať poplatek, tipuj zápasy a sleduj pořadí.</p><div id=log><input id=le class=input value="admin@demo.cz"><input id=lp class=input type=password value="admin123"><button class="btn primary full" onclick=login()>Přihlásit</button><button class="btn full" onclick="document.getElementById('reg').classList.toggle('hide')">Registrace</button></div><div id=reg class=hide><input id=rn class=input placeholder="Jméno"><input id=re class=input placeholder="E-mail"><input id=rp class=input type=password placeholder="Heslo"><button class="btn primary full" onclick=register()>Registrovat</button></div><p class=note>První admin: admin@demo.cz / admin123</p></div></div>`}
async function login(){try{const r=await req("/auth/login",{method:"POST",body:JSON.stringify({email:$("#le").value,password:$("#lp").value})});localStorage.setItem("token",r.token);await load()}catch(e){alert(e.message)}}
async function register(){try{const r=await req("/auth/register",{method:"POST",body:JSON.stringify({name:$("#rn").value,email:$("#re").value,password:$("#rp").value})});localStorage.setItem("token",r.token);await load()}catch(e){alert(e.message)}}
function logout(){localStorage.removeItem("token");S.me=null;render()}
function home(){const d=S.data,pay=d.settings.admin_fee+d.settings.game_fee;return top("Tipovačka",d.season.name)+`<section class=hero><div class=big>${d.season.name}</div><div>${d.season.description||"Soukromá tipovací soutěž"}<br>${d.pool.players} hráčů • bank ${d.pool.game} Kč</div></section><section class=card>${S.me.approved&&S.me.paid?`<div class="notice ok">✅ Účet aktivní.</div>`:`<div class=notice>⏳ Zaplať ${pay} Kč. Admin tě aktivuje.</div>`}</section><section class=card><div class=title>O co se hraje</div><table class=table>${d.settings.split.map((x,i)=>`<tr><td>${i+1}. místo</td><td>${x}%</td><td class=right>${Math.round(d.pool.game*x/100)} Kč</td></tr>`).join("")}</table></section><section class=card><button class="btn full" onclick=logout()>Odhlásit</button></section>`}
async function setBet(mid,p){try{await req("/bets",{method:"POST",body:JSON.stringify({matchId:mid,pick:p})});await load()}catch(e){alert(e.message)}}
function tips(){const d=S.data;return top("Tipy","Tipuje se jen 1 / X / 2")+d.matches.map(m=>{const b=d.bets.find(x=>x.match_id==m.id),locked=m.status!="open"||!S.me.approved||!S.me.paid;return `<section class=card><div class=title>${m.phase}</div><div class=note>${new Date(m.start_time).toLocaleString("cs-CZ")}</div><div class=teams><div class=team><div class=flag>${m.home_flag||"🏒"}</div>${m.home}</div><div class=vs>VS</div><div class=team><div class=flag>${m.away_flag||"🏒"}</div>${m.away}</div></div><div class=grid3>${["1","X","2"].map(p=>`<button ${locked?"disabled":""} class="tip ${b?.pick==p?"active":""}" onclick="setBet('${m.id}','${p}')">${p}</button>`).join("")}</div><p class=note>${m.score?`Výsledek: ${m.score}`:m.info||""}</p></section>`}).join("")}
function rank(){const d=S.data;return top("Pořadí","Archivované soutěže zůstávají uložené")+`<section class=card>${d.ranking.map((u,i)=>`<div class=rank><div>${i+1}.</div><div class=avatar>${u.avatar}</div><div class=grow><div class=name>${u.name}</div><div class=note>${u.email}</div></div><div class=points>${u.points}</div></div>`).join("")}</section>`}
function archive(){const d=S.data;return top("Archiv","Staré a budoucí soutěže")+`<section class=card>${d.seasons.map(s=>`<div class=rank><div class=avatar>${s.sport=="football"?"⚽":"🏒"}</div><div class=grow><div class=name>${s.name}</div><div class=note>${s.description||""}<br>${s.status}${s.active?" • aktivní":""}</div></div></div>`).join("")}</section>`}
async function approve(id){try{await req("/admin/approve",{method:"POST",body:JSON.stringify({userId:id})});await load()}catch(e){alert(e.message)}}async function setSeason(id){try{await req("/admin/season",{method:"POST",body:JSON.stringify({seasonId:id})});await load()}catch(e){alert(e.message)}}async function createSeason(){try{await req("/admin/create-season",{method:"POST",body:JSON.stringify({name:$("#newName").value,description:$("#newDesc").value,sport:$("#newSport").value})});await load()}catch(e){alert(e.message)}}async function archiveSeason(){try{await req("/admin/archive",{method:"POST"});await load()}catch(e){alert(e.message)}}async function syncApi(){try{await req("/admin/sync",{method:"POST"});await load();alert("Synchronizace hotová.")}catch(e){alert(e.message)}}async function proposal(id,action){try{await req("/admin/proposal",{method:"POST",body:JSON.stringify({proposalId:id,action})});await load()}catch(e){alert(e.message)}}async function saveSettings(){try{await req("/admin/settings",{method:"POST",body:JSON.stringify({admin_fee:+$("#af").value,game_fee:+$("#gf").value,split:[$("#s1").value,$("#s2").value,$("#s3").value].map(Number),api_league_id:$("#league").value,api_season:$("#season").value})});await load()}catch(e){alert(e.message)}}
function admin(){const d=S.data;return top("Admin","Soutěže, platby, API")+`<section class=card><div class=title>Soutěže</div>${d.seasons.map(s=>`<div class=rank><div class=avatar>${s.sport=="football"?"⚽":"🏒"}</div><div class=grow><div class=name>${s.name}</div><div class=note>${s.status}${s.active?" • aktivní":""}</div></div><button class="btn ${s.active?"good":"primary"}" onclick="setSeason('${s.id}')">${s.active?"Aktivní":"Zapnout"}</button></div>`).join("")}<button class="btn dark full" onclick=archiveSeason()>Ukončit aktivní soutěž do archivu</button></section><section class=card><div class=title>Nová soutěž</div><input id=newName class=input placeholder="MS ve fotbale 2026"><input id=newDesc class=input placeholder="O co jde"><select id=newSport class=input><option value=hockey>Hokej</option><option value=football>Fotbal</option></select><button class="btn primary full" onclick=createSeason()>Vytvořit</button></section><section class=card><div class=title>Nastavení</div><input id=af class=input type=number value="${d.settings.admin_fee}"><input id=gf class=input type=number value="${d.settings.game_fee}"><div class=grid3><input id=s1 class=input value="${d.settings.split[0]}"><input id=s2 class=input value="${d.settings.split[1]}"><input id=s3 class=input value="${d.settings.split[2]}"></div><input id=league class=input placeholder="API league id" value="${d.settings.api_league_id||""}"><input id=season class=input placeholder="API season" value="${d.settings.api_season||"2026"}"><button class="btn primary full" onclick=saveSettings()>Uložit</button></section><section class=card><button class="btn primary full" onclick=syncApi()>Načíst z API</button></section><section class=card><div class=title>Čekající uživatelé</div>${d.pending.map(u=>`<div class=rank><div class=avatar>${u.avatar}</div><div class=grow><div class=name>${u.name}</div><div class=note>${u.email}</div></div><button class="btn good" onclick="approve('${u.id}')">Aktivovat</button></div>`).join("")||`<div class="notice ok">Nikdo nečeká.</div>`}</section><section class=card><div class=title>Návrhy z API</div>${d.proposals.map(p=>`<div class="notice info"><b>${p.text}</b><div class=grid2><button class="btn good" onclick="proposal('${p.id}','accept')">Potvrdit</button><button class="btn danger" onclick="proposal('${p.id}','reject')">Zamítnout</button></div></div>`).join("")||`<div class="notice ok">Žádné návrhy.</div>`}</section>`}
function render(){if(!S.me){document.getElementById("root").innerHTML=loginPage();return}const pages={home,tips,rank,archive,admin};document.getElementById("root").innerHTML=`<div class=app>${(pages[S.page]||home)()}</div>`+nav()}load();
</script></body></html>
