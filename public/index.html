<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tipovačka</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#101828;--muted:#667085;--line:#e5e7eb;--blue:#2563eb;--blue2:#e8f0ff;--green:#16a34a;--red:#dc2626;--shadow:0 12px 28px rgba(16,24,40,.10)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eaf1ff,#f7f9ff 260px,#f4f7fb);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);padding-bottom:92px}button,input,select{font:inherit}button{cursor:pointer}.app{max-width:520px;margin:0 auto}.top{padding:16px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;gap:11px;align-items:center}.logo,.avatar{width:46px;height:46px;border-radius:17px;background:linear-gradient(135deg,#2563eb,#93c5fd);display:flex;align-items:center;justify-content:center;color:white;font-weight:950}.avatar{border-radius:50%}.h1{font-size:25px;font-weight:950}.sub,.note{font-size:13px;color:var(--muted);line-height:1.35}.hero{margin:8px 14px 14px;padding:18px;border-radius:28px;color:white;background:linear-gradient(135deg,#0f172a,#1d4ed8);box-shadow:0 18px 36px rgba(15,23,42,.18)}.big{font-size:32px;font-weight:950;line-height:1.05;margin-bottom:6px}.card{background:white;margin:12px 14px;padding:16px;border-radius:24px;border:1px solid var(--line);box-shadow:var(--shadow)}.title{font-size:18px;font-weight:950;margin:0 0 12px}.input{width:100%;border:1px solid var(--line);background:#f9fafb;border-radius:16px;padding:13px 14px;margin:6px 0}.btn,.tip{border:0;border-radius:16px;padding:12px 13px;font-weight:950;background:var(--blue2);color:#1d4ed8}.btn.primary,.tip.active{background:var(--blue);color:white}.btn.good{background:#dcfce7;color:#166534}.btn.danger{background:#fee2e2;color:#991b1b}.btn.dark{background:#111827;color:white}.full{width:100%}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}.notice{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:18px;padding:12px}.ok{background:#ecfdf3;color:#027a48;border-color:#bbf7d0}.bad{background:#fef2f2;color:#991b1b;border-color:#fecaca}.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;width:min(500px,calc(100% - 16px));background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:25px;box-shadow:0 14px 34px rgba(16,24,40,.16);display:grid;grid-template-columns:repeat(5,1fr);padding:7px;gap:2px;z-index:20}.bottom button{border:0;background:transparent;color:#667085;border-radius:18px;padding:8px 2px;font-size:11px;font-weight:950}.bottom button.on{background:var(--blue2);color:#1d4ed8}.ico{display:block;font-size:19px}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:13px 0 15px}.team{text-align:center;font-weight:950}.flag{font-size:34px}.vs{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f2f4f7;color:#667085;font-weight:950}.tip:disabled{opacity:.45}.rank{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}.rank:last-child{border-bottom:0}.pos{width:34px;height:34px;border-radius:13px;background:#f2f4f7;display:flex;align-items:center;justify-content:center;font-weight:950}.grow{flex:1}.name{font-weight:950}.points{font-size:18px;font-weight:950}.table{width:100%;border-collapse:collapse}.table td,.table th{border-bottom:1px solid var(--line);padding:10px 5px;text-align:left}.right{text-align:right!important}.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.login-card{width:100%;max-width:430px;background:white;border-radius:28px;padding:18px;box-shadow:0 18px 44px rgba(16,24,40,.14);border:1px solid var(--line)}.login-logo{width:64px;height:64px;border-radius:23px;background:linear-gradient(135deg,#1d4ed8,#60a5fa);display:flex;align-items:center;justify-content:center;font-size:34px;color:white;margin-bottom:10px}h1{margin:0 0 4px;font-size:30px}.hide{display:none}.err{white-space:pre-wrap;color:#991b1b}.label{display:block;font-size:12px;font-weight:900;color:#667085;margin:9px 0 2px;text-transform:uppercase}
</style>
</head>
<body>
<div id="root"></div>
<script>
const API="/api";let S={me:null,data:null,page:"home",loading:true};
const $=q=>document.querySelector(q);
function esc(s){return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]))}
async function req(path,opts={}){const t=localStorage.getItem("tipovacka_token");const h={"content-type":"application/json"};if(t)h.authorization="Bearer "+t;const r=await fetch(API+path,{...opts,headers:h});const tx=await r.text();let d={};try{d=tx?JSON.parse(tx):{}}catch(e){throw Error("Server nevrátil JSON: "+tx.slice(0,200))}if(!r.ok)throw Error(d.error||"Chyba serveru");return d}
async function load(){S.loading=true;render();try{S.me=(await req("/me")).user;S.data=await req("/app");S.page=(location.hash||"#home").replace("#","")||"home"}catch(e){localStorage.removeItem("tipovacka_token");S.me=null;S.data=null}S.loading=false;render()}
window.onhashchange=()=>{S.page=(location.hash||"#home").replace("#","")||"home";render()}
function go(p){location.hash="#"+p;S.page=p;render()}
function nav(){const admin=S.me&&["admin","superadmin"].includes(S.me.role);const items=[["home","🏠","Domů"],["tips","🏒","Tipy"],["rank","🏆","Pořadí"],["archive","📦","Archiv"],["admin","⚙️","Admin"]];return `<nav class="bottom">${items.map(i=>i[0]=="admin"&&!admin?"":`<button class="${S.page==i[0]?'on':''}" onclick="go('${i[0]}')"><span class="ico">${i[1]}</span>${i[2]}</button>`).join("")}</nav>`}
function top(t,s){return `<div class="top"><div class="brand"><div class="logo">T</div><div><div class="h1">${t}</div><div class="sub">${s}</div></div></div><div class="avatar">${esc(S.me?.avatar||"?")}</div></div>`}
function loginPage(){return `<div class="login-wrap"><div class="login-card"><div class="login-logo">🏒</div><h1>Tipovačka</h1><div class="sub">Reálné přihlášení přes Cloudflare databázi.</div><div id="msg" class="note err"></div><label class="label">E-mail</label><input id="email" class="input" value="admin@demo.cz"><label class="label">Heslo</label><input id="pass" class="input" type="password" value="admin123"><button class="btn primary full" onclick="login()">Přihlásit</button><button class="btn full" onclick="reg.classList.toggle('hide')">Registrace</button><div id="reg" class="hide"><label class="label">Jméno</label><input id="rn" class="input"><label class="label">E-mail</label><input id="re" class="input"><label class="label">Heslo</label><input id="rp" class="input" type="password"><button class="btn primary full" onclick="register()">Registrovat</button></div><p class="note">Admin: <b>admin@demo.cz / admin123</b><br>Hráč: <b>tomas@demo.cz / 1234</b></p></div></div>`}
async function login(){try{msg.textContent="";const r=await req("/auth/login",{method:"POST",body:JSON.stringify({email:email.value,password:pass.value})});localStorage.setItem("tipovacka_token",r.token);await load()}catch(e){msg.textContent=e.message}}
async function register(){try{msg.textContent="";const r=await req("/auth/register",{method:"POST",body:JSON.stringify({name:rn.value,email:re.value,password:rp.value})});localStorage.setItem("tipovacka_token",r.token);await load()}catch(e){msg.textContent=e.message}}
function logout(){localStorage.removeItem("tipovacka_token");S.me=null;S.data=null;render()}
function home(){let d=S.data,pay=d.settings.admin_fee+d.settings.game_fee;return top("Tipovačka",esc(d.season.name))+`<section class="hero"><div class="big">${esc(d.season.name)}</div><div>${esc(d.season.description||"Soukromá tipovací soutěž")}<br>${d.pool.players} hráčů • bank ${d.pool.game} Kč</div></section><section class="card">${S.me.approved&&S.me.paid?`<div class="notice ok">✅ Účet aktivní. Můžeš tipovat.</div>`:`<div class="notice">⏳ Zaplať ${pay} Kč. Admin tě aktivuje.</div>`}</section><section class="card"><div class="title">O co se hraje</div><table class="table">${d.settings.split.map((x,i)=>`<tr><td>${i+1}. místo</td><td>${x}%</td><td class="right">${Math.round(d.pool.game*x/100)} Kč</td></tr>`).join("")}</table></section><section class="card"><button class="btn full" onclick="logout()">Odhlásit</button></section>`}
async function setBet(mid,p){try{await req("/bets",{method:"POST",body:JSON.stringify({matchId:mid,pick:p})});await load()}catch(e){alert(e.message)}}
function tips(){let d=S.data;return top("Tipy","Tipuje se jen 1 / X / 2")+(d.matches.length?d.matches.map(m=>{let b=d.bets.find(x=>x.match_id==m.id),lock=m.status!="open"||!S.me.approved||!S.me.paid;return `<section class="card"><div class="title">${esc(m.phase||"Zápas")}</div><div class="note">${m.start_time?new Date(m.start_time).toLocaleString("cs-CZ"):""}</div><div class="teams"><div class="team"><div class="flag">${esc(m.home_flag||"🏒")}</div>${esc(m.home)}</div><div class="vs">VS</div><div class="team"><div class="flag">${esc(m.away_flag||"🏒")}</div>${esc(m.away)}</div></div><div class="grid3">${["1","X","2"].map(p=>`<button ${lock?"disabled":""} class="tip ${b?.pick==p?"active":""}" onclick="setBet('${m.id}','${p}')">${p}</button>`).join("")}</div><p class="note">${esc(m.info||"")} ${m.score?`<b>Výsledek: ${esc(m.score)}</b>`:""}</p></section>`}).join(""):`<section class="card"><div class="notice">Zatím nejsou zápasy.</div></section>`)}
function rank(){let d=S.data;return top("Pořadí","Body po potvrzení výsledků")+`<section class="card">${d.ranking.map((u,i)=>`<div class="rank"><div class="pos">${i+1}</div><div class="avatar">${esc(u.avatar)}</div><div class="grow"><div class="name">${esc(u.name)}</div><div class="note">${esc(u.email)}</div></div><div class="points">${u.points}</div></div>`).join("")}</section>`}
function archive(){let d=S.data;return top("Archiv","Soutěže")+`<section class="card">${d.seasons.map(s=>`<div class="rank"><div class="avatar">${s.sport=="football"?"⚽":"🏒"}</div><div class="grow"><div class="name">${esc(s.name)}</div><div class="note">${esc(s.description||"")}<br>${esc(s.status)}${s.active?" • aktivní":""}</div></div></div>`).join("")}</section>`}
async function approve(id){await req("/admin/approve",{method:"POST",body:JSON.stringify({userId:id})});load()}async function setSeason(id){await req("/admin/season",{method:"POST",body:JSON.stringify({seasonId:id})});load()}async function archiveSeason(){await req("/admin/archive",{method:"POST"});load()}async function createSeason(){await req("/admin/create-season",{method:"POST",body:JSON.stringify({name:newName.value,description:newDesc.value,sport:newSport.value})});load()}async function saveSettings(){await req("/admin/settings",{method:"POST",body:JSON.stringify({admin_fee:+af.value,game_fee:+gf.value,split:[s1.value,s2.value,s3.value].map(Number),api_league_id:league.value,api_season:season.value})});alert("Uloženo");load()}async function syncApi(){try{let r=await req("/admin/sync",{method:"POST"});alert("Hotovo. Načteno: "+(r.imported||0));load()}catch(e){alert(e.message)}}async function addMatch(){await req("/admin/add-match",{method:"POST",body:JSON.stringify({phase:phase.value,home:homeTeam.value,away:awayTeam.value,start_time:startTime.value})});load()}
function admin(){let d=S.data;if(!["admin","superadmin"].includes(S.me.role))return top("Admin","Bez oprávnění")+`<section class="card">Nemáš oprávnění.</section>`;return top("Admin","Soutěže, uživatelé, API")+`<section class="card"><div class="title">Soutěže</div>${d.seasons.map(s=>`<div class="rank"><div class="avatar">${s.sport=="football"?"⚽":"🏒"}</div><div class="grow"><div class="name">${esc(s.name)}</div><div class="note">${esc(s.status)}${s.active?" • aktivní":""}</div></div><button class="btn ${s.active?"good":"primary"}" onclick="setSeason('${s.id}')">${s.active?"Aktivní":"Zapnout"}</button></div>`).join("")}<button class="btn dark full" onclick="archiveSeason()">Ukončit aktivní soutěž do archivu</button></section><section class="card"><div class="title">Nová soutěž</div><input id="newName" class="input" placeholder="MS ve fotbale 2026"><input id="newDesc" class="input" placeholder="O co jde"><select id="newSport" class="input"><option value="hockey">Hokej</option><option value="football">Fotbal</option></select><button class="btn primary full" onclick="createSeason()">Vytvořit</button></section><section class="card"><div class="title">Nastavení</div><input id="af" class="input" type="number" value="${d.settings.admin_fee}"><input id="gf" class="input" type="number" value="${d.settings.game_fee}"><div class="grid3"><input id="s1" class="input" value="${d.settings.split[0]}"><input id="s2" class="input" value="${d.settings.split[1]}"><input id="s3" class="input" value="${d.settings.split[2]}"></div><input id="league" class="input" placeholder="API league id" value="${esc(d.settings.api_league_id||"")}"><input id="season" class="input" placeholder="API season" value="${esc(d.settings.api_season||"2026")}"><button class="btn primary full" onclick="saveSettings()">Uložit</button></section><section class="card"><button class="btn primary full" onclick="syncApi()">Načíst z API</button></section><section class="card"><div class="title">Ručně přidat zápas</div><input id="phase" class="input" placeholder="Fáze"><input id="homeTeam" class="input" placeholder="Domácí"><input id="awayTeam" class="input" placeholder="Hosté"><input id="startTime" class="input" type="datetime-local"><button class="btn primary full" onclick="addMatch()">Přidat</button></section><section class="card"><div class="title">Čekající uživatelé</div>${d.pending.map(u=>`<div class="rank"><div class="avatar">${esc(u.avatar)}</div><div class="grow"><div class="name">${esc(u.name)}</div><div class="note">${esc(u.email)}</div></div><button class="btn good" onclick="approve('${u.id}')">Aktivovat</button></div>`).join("")||`<div class="notice ok">Nikdo nečeká.</div>`}</section>`}
function render(){if(S.loading)return root.innerHTML=`<div class="login-wrap"><div class="login-card"><h1>Tipovačka</h1><p>Načítám…</p></div></div>`;if(!S.me)return root.innerHTML=loginPage();const pages={home,tips,rank,archive,admin};root.innerHTML=`<div class="app">${(pages[S.page]||home)()}</div>`+nav()}load();
</script>
</body>
</html>
