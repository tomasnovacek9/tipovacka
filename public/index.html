<!doctype html><html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#2563eb"><link rel="manifest" href="/manifest.json"><title>Tipovačka</title><style>
body{margin:0;background:#f4f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:#101828;padding-bottom:92px}.app{max-width:900px;margin:auto}.hero{margin:14px;padding:20px;border-radius:28px;background:linear-gradient(135deg,#0f172a,#2563eb);color:white;position:relative;overflow:hidden;min-height:116px;padding-right:148px}.hero-logo{position:absolute;right:16px;top:12px;width:104px;max-height:112px;object-fit:contain;filter:drop-shadow(0 8px 18px rgba(0,0,0,.25))}.big{font-size:34px;font-weight:950}.card{background:white;margin:12px 14px;padding:16px;border-radius:22px;box-shadow:0 10px 26px #0001}.input{width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:14px;padding:12px;margin:6px 0}.btn{border:0;border-radius:14px;padding:12px;font-weight:900;background:#e8f0ff;color:#1d4ed8}.btn.primary{background:#2563eb;color:white}.btn.good{background:#dcfce7;color:#166534}.btn.danger{background:#fee2e2;color:#991b1b}.btn.dark{background:#111827;color:white}.full{width:100%}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.notice{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:16px;padding:12px}.ok{background:#ecfdf3;color:#027a48;border-color:#bbf7d0}.bad{background:#fef2f2;color:#991b1b;border-color:#fecaca}.note{font-size:13px;color:#667085}.title{font-size:21px;font-weight:950;margin-bottom:10px}.match{border:1px solid #eee;border-radius:18px;padding:13px;margin:10px 0;background:#fbfcff}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin:12px 0}.team{text-align:center;font-weight:900}.flag{font-size:28px}.score{font-size:28px;font-weight:950}.badge{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.open{background:#ecfdf3;color:#027a48}.locked{background:#fff7ed;color:#c2410c}.done{background:#f2f4f7;color:#475467}.rank{display:flex;align-items:center;gap:12px;border-bottom:1px solid #eee;padding:11px 0}.avatar{width:42px;height:42px;border-radius:50%;background:#2563eb;color:white;display:flex;align-items:center;justify-content:center;font-weight:900}.grow{flex:1}.points{font-weight:950;font-size:18px}.bottom{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(870px,calc(100% - 16px));background:white;border-radius:24px;box-shadow:0 12px 30px #0002;display:grid;grid-template-columns:repeat(5,1fr);padding:7px}.bottom button{border:0;background:white;border-radius:16px;padding:8px 2px;font-size:11px;font-weight:900;color:#667085}.bottom .on{background:#e8f0ff;color:#1d4ed8}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.login-card{background:white;width:100%;max-width:430px;border-radius:26px;padding:18px;box-shadow:0 18px 44px #0002}.hide{display:none}.table{width:100%;border-collapse:collapse}.table td,.table th{border-bottom:1px solid #eee;padding:9px 4px}.right{text-align:right}.center{text-align:center}textarea.input{min-height:120px}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 14px}.exact{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;margin-top:8px}.count{font-weight:950;color:#2563eb}.phase-filter{display:flex;gap:6px;overflow:auto;padding:8px 14px}.phase-filter button{white-space:nowrap}.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.statbox{background:#f8fafc;border:1px solid #eef2f7;border-radius:14px;padding:8px;text-align:center}.statbox b{display:block;font-size:17px}.others{background:#f8fafc;border-radius:16px;padding:10px;margin-top:10px}.others-row{display:flex;justify-content:space-between;border-bottom:1px solid #e5e7eb;padding:7px 0}.others-row:last-child{border-bottom:0}.stepper{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}.stepper button{border:0;border-radius:14px;background:#e8f0ff;color:#1d4ed8;font-weight:950;font-size:20px;padding:12px}.stepper-value{text-align:center;background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:12px;font-weight:950;font-size:20px}.saved-tip{margin-top:8px;background:#ecfdf3;color:#027a48;border:1px solid #bbf7d0;border-radius:14px;padding:9px;font-weight:800;text-align:center}.admin-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}.small{font-size:12px;padding:8px}@media(max-width:700px){.tabs,.statgrid{grid-template-columns:1fr 1fr}.admin-actions{grid-template-columns:1fr 1fr}.hero{padding-right:112px}.hero-logo{width:82px;right:12px}.table{font-size:13px}}
</style></head><body><div id="root"></div><script>
const API="/api";let tok=localStorage.tip_v14||"",me=null,data=null,page="home",msg="",filter="all",phase="all",betsFilter="all";
const $=id=>document.getElementById(id), esc=s=>String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
async function api(p,o={}){let h={"content-type":"application/json"};if(tok)h.authorization="Bearer "+tok;let r=await fetch(API+p,{...o,headers:h}),t=await r.text(),j={};try{j=t?JSON.parse(t):{}}catch{throw Error("Server nevrátil JSON: "+t.slice(0,120))}if(!r.ok)throw Error(j.error||"Chyba API");return j}
async function refresh(){if(tok){try{data=await api("/app");me=(await api("/me")).user}catch(e){}}}
async function load(){try{me=(await api("/me")).user;data=await api("/app")}catch(e){localStorage.removeItem("tip_v14");tok="";me=null;data=null}render()}
setInterval(async()=>{if(me){await refresh(); if(["tips","bets","rank","admin","home"].includes(page))render()}},5000);
setInterval(()=>{if(me&&page=="tips")render()},1000);
document.addEventListener("visibilitychange",()=>{if(!document.hidden&&me)load()});
function go(p){page=p;render()}function out(){localStorage.removeItem("tip_v14");tok="";me=null;data=null;render()}
function av(u){return `<div class=avatar>${esc(u.initials||"?")}</div>`}
function nav(){if(!me)return"";let admin=["admin","superadmin"].includes(me.role),it=[["home","🏠","Domů"],["tips","⚽","Tipy"],["rank","🏆","Pořadí"],["bets","📋","Tipy všech"],["admin","⚙️","Admin"]];return `<div class=bottom>${it.map(i=>i[0]=="admin"&&!admin?"":`<button class="${page==i[0]?"on":""}" onclick="go('${i[0]}')">${i[1]}<br>${i[2]}</button>`).join("")}</div>`}
function loginScreen(){return `<div class=login><div class=login-card><h1>Tipovačka MS 2026</h1><p class=note>Přihlášení jménem, příjmením a heslem.</p>${msg?`<div class="notice bad">${esc(msg)}</div>`:""}<input id=loginFirst class=input placeholder="Jméno"><input id=loginLast class=input placeholder="Příjmení"><input id=lp class=input type=password placeholder="Heslo"><button class="btn primary full" onclick=login()>Přihlásit</button><button class="btn full" onclick="reg.classList.toggle('hide')">Registrace</button><div id=reg class=hide><input id=code class=input placeholder="Vstupní kód"><input id=first class=input placeholder="Jméno"><input id=last class=input placeholder="Příjmení"><input id=rp class=input type=password placeholder="Heslo"><button class="btn primary full" onclick=register()>Registrovat</button></div><p class=note>Admin: jméno <b>admin</b>, příjmení prázdné, heslo <b>admiN9</b>.</p></div></div>`}
async function login(){try{msg="";let full=((loginFirst.value||"").trim()+" "+(loginLast.value||"").trim()).trim();let r=await api("/auth/login",{method:"POST",body:JSON.stringify({name:full,password:lp.value})});tok=r.token;localStorage.tip_v14=tok;await load()}catch(e){msg=e.message;render()}}
async function register(){try{msg="";let r=await api("/auth/register",{method:"POST",body:JSON.stringify({first:first.value,last:last.value,password:rp.value,code:code.value})});tok=r.token;localStorage.tip_v14=tok;await load()}catch(e){msg=e.message;render()}}
function hero(t,s){return `<div class=hero><img class=hero-logo src="/worldcup2026-logo.png" alt="FIFA World Cup 2026"><div class=big>${t}</div><div>${s}</div></div>`}
function dateKey(dt){let d=new Date(dt),now=new Date();return d.toDateString()==now.toDateString()?"today":d.toDateString()==new Date(now.getTime()+86400000).toDateString()?"tomorrow":"other"}
function left(m){let d=new Date(m.start_time)-new Date();if(d<=0)return"uzamčeno";let sec=Math.floor(d/1000),days=Math.floor(sec/86400);sec%=86400;let h=Math.floor(sec/3600);sec%=3600;let min=Math.floor(sec/60);sec%=60;return days>0?`${days}d ${h}h ${min}m ${sec}s`:`${h}h ${min}m ${sec}s`}
function badge(m){return m.effective_status=="open"?`<span class="badge open">lze tipovat</span>`:m.effective_status=="finished"?`<span class="badge done">dohráno</span>`:`<span class="badge locked">zamčeno</span>`}
function home(){let p=data.pool,pay=(data.settings.admin_fee||0)+(data.settings.game_fee||0);return hero("Tipovačka",`${esc(data.season.name)}<br>Přihlášen: ${esc(me.full_name)}<br>${p.players} hráčů • bank ${p.game} Kč`)+`<div class=card>${me.role!="player"?`<div class=notice>Jsi admin. Admin netipuje a není v pořadí.</div>`:me.approved&&me.paid?`<div class="notice ok">✅ Účet aktivní.</div>`:`<div class=notice>⏳ Čekáš na aktivaci po zaplacení.</div>`}</div><div class=card><div class=title>Platba</div>${data.settings.bank_account?`Celkem <b>${pay} Kč</b><br>Účet: <b>${esc(data.settings.bank_account)}</b><br>Poznámka: <b>${esc(me.full_name)}</b>`:`<span class=note>Admin zatím nedoplnil účet a částku.</span>`}</div><div class=card><button class="btn full" onclick=out()>Odhlásit</button></div>`}
function phases(){return ["all",...new Set((data.matches||[]).map(m=>m.phase).filter(Boolean))]}
function filtered(){let a=data.matches||[];if(filter=="today")a=a.filter(m=>dateKey(m.start_time)=="today");if(filter=="tomorrow")a=a.filter(m=>dateKey(m.start_time)=="tomorrow");if(filter=="open")a=a.filter(m=>m.effective_status=="open");if(filter=="missing")a=a.filter(m=>m.effective_status=="open"&&!data.bets.find(b=>b.match_id==m.id));if(phase!="all")a=a.filter(m=>m.phase==phase);return a}
function stepValue(id,delta){let el=$(id);if(!el)return;let v=parseInt(el.value||"0",10);v=Math.max(0,v+delta);el.value=v;let box=$("box_"+id);if(box)box.textContent=v}
function scoreStepper(id,val,disabled){val=(val==null||val==="")?0:val;return `<div class=stepper><button type=button ${disabled?"disabled":""} onclick="stepValue('${id}',-1)">−</button><input id="${id}" type=hidden value="${val}"><div id="box_${id}" class=stepper-value>${val}</div><button type=button ${disabled?"disabled":""} onclick="stepValue('${id}',1)">+</button></div>`}
async function bet(id){try{let h=$("h_"+id)?.value,a=$("a_"+id)?.value;if(h===""||a===""){alert("Zadej přesný výsledek.");return}await api("/bets",{method:"POST",body:JSON.stringify({matchId:id,homeGoals:h,awayGoals:a})});await load();alert("Tip uložen.")}catch(e){alert(e.message)}}
function otherBetsHtml(m){let arr=(data.publicBets||[]).filter(x=>x.match_id==m.id);if(m.effective_status=="open")return `<div class=note>Tipy ostatních se zobrazí po uzamčení zápasu.</div>`;return `<div class=others><b>Tipy ostatních</b>${arr.length?arr.map(x=>`<div class=others-row><span>${esc(x.full_name)}</span><b>${x.home_goals}:${x.away_goals}</b></div>`).join(""):`<div class=note>Nikdo zatím netipoval.</div>`}</div>`}
function tips(){let a=filtered(),ph=phases();return hero("Tipy","Tipuje se pouze přesný výsledek. Tipy ostatních uvidíš až po uzamčení zápasu.")+`<div class=tabs><button class=btn onclick="filter='all';render()">Vše</button><button class=btn onclick="filter='today';render()">Dnes</button><button class=btn onclick="filter='tomorrow';render()">Zítra</button><button class=btn onclick="filter='missing';render()">Netipnuté</button></div><div class=phase-filter>${ph.map(p=>`<button class="btn ${phase==p?'primary':''}" onclick="phase='${p}';render()">${p=="all"?"Všechny fáze":esc(p)}</button>`).join("")}</div><div class=card>${a.length?a.map(m=>{let b=data.bets.find(x=>x.match_id==m.id)||{},lock=m.effective_status!="open"||!me.approved||!me.paid||me.role!="player";return `<div class=match>${badge(m)} <span class=note>${new Date(m.start_time).toLocaleString("cs-CZ")} • ${esc(m.phase)} • <span class=count>${left(m)}</span></span><div class=teams><div class=team><div class=flag>${esc(m.home_flag||"")}</div>${esc(m.home)}</div><div class=score>${m.score?esc(m.score):"VS"}</div><div class=team><div class=flag>${esc(m.away_flag||"")}</div>${esc(m.away)}</div></div><div class=exact>${scoreStepper("h_"+m.id,b.home_goals??0,lock)}<b>:</b>${scoreStepper("a_"+m.id,b.away_goals??0,lock)}</div><button class="btn primary full" ${lock?"disabled":""} onclick="bet('${m.id}')">${b.match_id?"Upravit tip":"Potvrdit tip"}</button>${b.match_id?`<div class=saved-tip>✓ Tip uložen: ${b.home_goals}:${b.away_goals}</div>`:""}${otherBetsHtml(m)}</div>`}).join(""):`<div class=notice>Pro filtr nejsou zápasy.</div>`}</div>`}
function rank(){return hero("Pořadí","1b = trefený vítěz/remíza, 3b = přesný výsledek.")+`<div class=card><table class=table><thead><tr><th>#</th><th>Hráč</th><th class=center>Tipy</th><th class=center>1b</th><th class=center>3b</th><th class=right>Body</th></tr></thead><tbody>${data.ranking.map((u,i)=>`<tr><td>${i+1}</td><td><b>${esc(u.full_name)}</b></td><td class=center>${u.tips_count}</td><td class=center>${u.hit_1}</td><td class=center>${u.hit_3}</td><td class=right><b>${u.points}</b></td></tr>`).join("")||"<tr><td colspan=6>Zatím nejsou hráči.</td></tr>"}</tbody></table></div>`}
function betsPage(){let ms=(data.matches||[]).filter(m=>m.effective_status!="open");if(betsFilter=="mine")ms=ms.filter(m=>data.bets.find(b=>b.match_id==m.id));return hero("Tipy všech","Zobrazují se jen u uzamčených nebo dohraných zápasů.")+`<div class=tabs><button class="btn ${betsFilter=='all'?'primary':''}" onclick="betsFilter='all';render()">Vše</button><button class="btn ${betsFilter=='mine'?'primary':''}" onclick="betsFilter='mine';render()">Jen moje</button><button class=btn onclick="betsFilter='all';filter='missing';go('tips')">Netipnuté</button><button class=btn onclick="go('rank')">Pořadí</button></div><div class=card>${ms.length?ms.map(m=>`<div class=match><b>${esc(m.home_flag)} ${esc(m.home)} vs ${esc(m.away_flag)} ${esc(m.away)}</b><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString("cs-CZ")} ${m.score?"• výsledek "+esc(m.score):""}</div>${otherBetsHtml(m)}</div>`).join(""):"<div class=notice>Zatím není žádný uzamčený zápas.</div>"}</div>`}
function rules(){return hero("Pravidla","Admin je může upravit v administraci.")+`<div class=card>${data.settings.rules_html||"<p>Pravidla zatím nejsou nastavena.</p>"}</div>`}
async function approve(id){await api("/admin/approve",{method:"POST",body:JSON.stringify({userId:id})});await load()}
async function deactivate(id){await api("/admin/deactivate",{method:"POST",body:JSON.stringify({userId:id})});await load()}
async function delUser(id){if(confirm("Opravdu smazat hráče i jeho tipy?")){await api("/admin/delete-user",{method:"POST",body:JSON.stringify({userId:id})});await load()}}
async function role(id,role){await api("/admin/role",{method:"POST",body:JSON.stringify({userId:id,role})});await load()}
async function saveSettings(){await api("/admin/settings",{method:"POST",body:JSON.stringify({admin_fee:+af.value||0,game_fee:+gf.value||0,split:[s1.value,s2.value,s3.value].map(Number),bank_account:bank.value,access_code:access.value,rules_html:rulesText.value})});await load();alert("Uloženo")}
async function addMatch(){await api("/admin/add-match",{method:"POST",body:JSON.stringify({phase:phaseIn.value,home:homeTeam.value,away:awayTeam.value,start_time:startTime.value})});await load()}
async function result(id){let score=prompt("Výsledek např. 4:2");if(!score)return;await api("/admin/result",{method:"POST",body:JSON.stringify({matchId:id,score})});await load()}
async function setStatus(id,status){await api("/admin/status",{method:"POST",body:JSON.stringify({matchId:id,status})});await load()}
async function imp(){await api("/admin/import",{method:"POST",body:JSON.stringify({text:bulk.value})});await load();alert("Import hotový")}
async function recalc(){await api("/admin/recalc",{method:"POST"});await load();alert("Přepočítáno")}
function admin(){if(!["admin","superadmin"].includes(me.role))return hero("Admin","Bez oprávnění");return hero("Admin","Zápasy, výsledky, role a hráči.")+`<div class=card><div class=title>Nastavení</div><input id=af class=input type=number value="${data.settings.admin_fee||""}" placeholder="Poplatek adminovi"><input id=gf class=input type=number value="${data.settings.game_fee||""}" placeholder="Poplatek do hry"><input id=bank class=input value="${esc(data.settings.bank_account||"")}" placeholder="Účet"><input id=access class=input value="${esc(data.settings.access_code)}" placeholder="Vstupní kód"><div class=grid3><input id=s1 class=input value="${data.settings.split[0]}"><input id=s2 class=input value="${data.settings.split[1]}"><input id=s3 class=input value="${data.settings.split[2]}"></div><textarea id=rulesText class=input placeholder="Pravidla">${esc(data.settings.rules_html||"")}</textarea><button class="btn primary full" onclick=saveSettings()>Uložit</button></div><div class=card><button class="btn good full" onclick=recalc()>Přepočítat body</button></div><div class=card><div class=title>Přidat / doplnit zápas</div><select id=phaseIn class=input>${["Skupina A","Skupina B","Skupina C","Skupina D","Skupina E","Skupina F","Skupina G","Skupina H","Skupina I","Skupina J","Skupina K","Skupina L","Round of 32","Osmifinále","Čtvrtfinále","Semifinále","O 3. místo","Finále"].map(x=>`<option>${x}</option>`).join("")}</select><input id=homeTeam class=input list=teams placeholder="Domácí"><input id=awayTeam class=input list=teams placeholder="Hosté"><datalist id=teams>${data.teamOptions.map(t=>`<option value="${esc(t)}">`).join("")}</datalist><input id=startTime class=input type=datetime-local><button class="btn primary full" onclick=addMatch()>Přidat zápas</button></div><div class=card><div class=title>Import / aktualizace rozpisu</div><p class=note>Formát: datum čas; fáze; domácí; hosté. Duplicity se přeskočí.</p><textarea id=bulk class=input placeholder="2026-06-11 21:00; Skupina A; Mexiko; Jihoafrická republika"></textarea><button class="btn primary full" onclick=imp()>Importovat / aktualizovat</button></div><div class=card><div class=title>Správa zápasů</div>${data.matches.map(m=>`<div class=match><b>${esc(m.home_flag||"")} ${esc(m.home)} vs ${esc(m.away_flag||"")} ${esc(m.away)}</b><div class=note>${esc(m.phase)} • ${new Date(m.start_time).toLocaleString("cs-CZ")} • ${esc(m.status)} ${m.score?"• "+esc(m.score):""}</div><div class=admin-actions><button class="btn small" onclick="setStatus('${m.id}','open')">Otevřít</button><button class="btn small" onclick="setStatus('${m.id}','locked')">Zamknout</button><button class="btn good small" onclick="result('${m.id}')">Výsledek</button><button class="btn small" onclick="setStatus('${m.id}','finished')">Dohráno</button></div></div>`).join("")}</div><div class=card><div class=title>Hráči a role</div>${data.users.map(u=>`<div class=rank>${av(u)}<div class=grow><b>${esc(u.full_name)}</b><div class=note>${esc(u.role)} ${u.paid?"• aktivní":"• čeká"} • ${u.points} b</div></div><div class=admin-actions><button class="btn good small" onclick="approve('${u.id}')">Aktivovat</button><button class="btn small" onclick="deactivate('${u.id}')">Deaktivovat</button><button class="btn small" onclick="role('${u.id}','player')">Hráč</button><button class="btn small" onclick="role('${u.id}','admin')">Admin</button><button class="btn danger small" onclick="delUser('${u.id}')">Smazat</button></div></div>`).join("")}</div>`}
function render(){if(!me)return root.innerHTML=loginScreen();let pages={home,tips,rank,bets:betsPage,rules,admin};root.innerHTML=`<div class=app>${(pages[page]||home)()}</div>`+nav()}
load();if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}
</script></body></html>
