<!doctype html><html lang="cs"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>API test</title><body style="font-family:Arial;background:#081018;color:white;padding:20px"><h1>API test</h1><pre id=o>Testuji...</pre><button onclick="run()">Znovu otestovat</button><script>
async function t(name,url,opt){try{let r=await fetch(url,opt);let txt=await r.text();let json;try{json=JSON.parse(txt)}catch(e){return name+': CHYBA - server vrátil HTML/text místo JSON\n'+txt.slice(0,160)}return name+': '+r.status+' '+JSON.stringify(json)}catch(e){return name+': '+e.message}}
async function run(){let a=[];a.push(await t('/api','/api'));a.push(await t('/api/health','/api/health'));a.push(await t('admin login','/api/auth/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({name:'Admin',first:'Admin',last:'',password:'admiN9'})}));o.textContent=a.join('\n\n')}
run();</script></body></html>
